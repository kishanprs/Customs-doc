/* ═══════════════ VALIDATION ═══════════════ */
function validate() {
  const missing = [];
  const admin = isEffectiveAdmin();
  T().fields.forEach(f => {
    if (f.k === "appNo" && !admin) return; // appNo is admin-only — user1 can generate without it
    if (f.req && !S.vals[f.k]?.trim()) missing.push(f.label);
  });
  if (T().hasPI && !S.piImageDataUrl) missing.push("Proforma Invoice PDF / image");
  if (admin && missing.length) {
    // Admin only fills the Application No.; everything else should already
    // be present from a loaded draft, so a clearer nudge is more useful
    // than the raw field-name list.
    return ["the rest of the letter — load a draft from the Drafts tab first, then add the Application No."];
  }
  return missing;
}

function setStatus(msg, kind) {
  const el = document.getElementById("statusMsg");
  if (el) el.innerHTML = `<div class="status ${kind}">${esc(msg)}</div>`;
}

/* ═══════════════ LOG A DOCUMENT ═══════════════ */
// Identifies "the same letter" for log de-duplication purposes: same letter
// type, same field values, same PI description/image. If this hasn't
// changed since the last time it was logged, generating both a Word doc and
// a PDF for one sitting should produce one log row, not two.
function fingerprintCurrentLetter() {
  return JSON.stringify({
    typeId: S.typeId,
    vals: S.vals,
    piGoodsDesc: S.piGoodsDesc,
    // Identify the PI image by length+a cheap hash-ish slice rather than the
    // full data URL, which would make the fingerprint unnecessarily huge.
    piImageSig: S.piImageDataUrl ? S.piImageDataUrl.length + ":" + S.piImageDataUrl.slice(-64) : null,
  });
}

let _lastLoggedFingerprint = null;

function logDocument(format = "pdf") {
  const fingerprint = fingerprintCurrentLetter();
  const emailSnapshot = (S.currentDraftEmails || []).map(e => ({
    savedName: e.name || e.originalName,       // actual filename in the email folder
    originalName: e.originalName || e.name,    // human-readable display name
    savedAt: e.savedAt || null,
  }));

  if (fingerprint === _lastLoggedFingerprint) {
    // Same letter as the last thing logged (e.g. Word just downloaded, now
    // generating the PDF for that identical letter) — don't add a second row,
    // but do fold in the newly-generated format and any newly-attached
    // emails into the existing row, and keep the saved-to-folder copies current.
    const rows = loadLog();
    if (rows[0]) {
      rows[0].formats = Array.from(new Set([...(rows[0].formats || []), format]));
      const existingNames = new Set((rows[0].attachedEmails || []).map(e => e.savedName || e.name));
      emailSnapshot.forEach(e => { if (!existingNames.has(e.savedName)) (rows[0].attachedEmails = rows[0].attachedEmails || []).push(e); });
      saveLog(rows);
    }
    autoSaveLogToFolder();
    autoSaveArchiveToFolder();
    return;
  }

  const type = T();
  const v = S.vals;
  const clearanceOf = type.id === "A" ? combinedRawMaterial(v) : (S.piGoodsDesc || "");
  const row = {
    dateGenerated:  new Date().toISOString().slice(0,10),
    dateOnLetter:   v.date || "",
    docName:        buildDocName(type, v),
    importedFrom:   v.importedFrom || "",
    manufacturerOf: type.id === "A" ? (v.mfrOf || "") : "",
    invoiceNumber:  v.invoiceNumber || "",
    invoiceDate:    v.invoiceDate || "",
    appNo:          v.appNo || "",
    value:          v.value || "",
    clearanceOf,
    rawMaterialName: type.id === "A" ? (v.rawMaterialName || "") : "",
    rawMaterialQty:  type.id === "A" ? (v.rawMaterialQty || "") : "",
    letterType:     type.name,
    formats:        [format],
    attachedEmails: emailSnapshot,
    piTableRows:    type.id === "B" ? (S.piTableRows || []) : [],
  };

  // Working log: newest entries on top; the user can delete rows from this
  // or clear it entirely.
  const rows = loadLog();
  rows.unshift(row);
  saveLog(rows);
  autoSaveLogToFolder(); // fire-and-forget; no-op if no folder connected

  // Permanent archive: every generated document, forever — nothing in the
  // app's UI ever removes a row from this, so it can restore the working
  // log if it's ever cleared by mistake.
  appendToArchive({ ...row });

  _lastLoggedFingerprint = fingerprint;
}

/* ═══════════════ PDF (print) ═══════════════ */
async function handlePDF() {
  const missing = validate();
  if (missing.length) { setStatus("Please fill in: " + missing.join(", "), "warn"); return; }
  logDocument("pdf");
  updateDocName();
  const docName = buildDocName(T(), S.vals);

  if (isEffectiveAdmin() && S.currentDraftId) {
    completeDraft(S.currentDraftId, docName);
  }

  // Try auto-saving a real PDF copy to the connected PDF output folder
  // first. If that succeeds, there's no need to also open the browser's
  // Print dialog — the file is already saved where it needs to be.
  let savedToOutput = false;
  if (isEffectiveAdmin()) {
    setStatus("Generating PDF…", "ok");
    const blob = await buildLetterPdfBlob();
    if (blob) savedToOutput = await saveCompletedPdfToFolder(blob, docName);
  }

  if (savedToOutput) {
    setStatus(
      `Logged. Saved as PDF: ${docName}.pdf (in the completed PDF letters folder).` +
      (S.currentDraftId ? " Draft marked as completed." : ""),
      "ok"
    );
    S.formLocked = true;
    renderGenerate();
    return;
  }

  // Fallback: no PDF folder connected (or PDF generation failed) — print the
  // main window directly (not a popup or iframe). Chrome uses the
  // TOP-LEVEL document's title for the "Save as PDF" suggested filename —
  // when printing happens inside an iframe or a separate popup, that title
  // can be ignored in favor of the outer page's title, which is exactly the
  // bug this caused before. Printing window.print() on this same document,
  // after setting document.title, is the one approach guaranteed to control
  // the filename, since there's no cross-document ambiguity about which
  // title applies.
  //
  // Visual isolation (showing only the letter, not the rest of the app) is
  // handled entirely by the @media print stylesheet via the
  // .print-letter-only class, using individual display:none rules on each
  // sibling section — not a blanket `body * { visibility:hidden }`, which is
  // what caused the earlier blank-second-page bug (it keeps every hidden
  // element's layout height reserved instead of removing it).
  const originalTitle = document.title;
  document.title = docName;
  document.body.classList.add("print-letter-only");

  const restore = () => {
    document.body.classList.remove("print-letter-only");
    document.title = originalTitle;
    window.removeEventListener("afterprint", restore);
    // Lock the form only once printing is done — locking (which re-renders
    // the tab) any earlier would tear out the #letterPaper DOM mid-print.
    S.formLocked = true;
    if (S.view === "generate") renderGenerate();
  };
  window.addEventListener("afterprint", restore);
  // Fallback in case afterprint doesn't fire in some browser/driver combos.
  setTimeout(restore, 60000);

  setStatus(`Logged. The print dialog should open in a moment — choose "Save as PDF". The filename is already set to: ${docName}. The page shows just a page number at the bottom; no date/URL/filename. (On an older Chrome/Edge version you may still see those — turn off "Headers and footers" under "More settings" in the dialog; it remembers that choice afterwards.)`, "ok");

  setTimeout(() => window.print(), 50);
}

// Batch-generate Word or PDF copies for every pending draft of the current
// letter type that already has an Application No. filled in. Reuses the
// same generation/save logic as the single-letter buttons, just looped —
// each draft is loaded into the form in turn, generated, saved to the
// connected output folder, and marked completed, before moving to the next.
async function saveAllDraftsAs(kind) {
  if (!isEffectiveAdmin()) return;
  const eligible = loadDraftMeta().filter(d => d.status === "pending" && d.typeId === S.typeId && d.appNo && d.appNo.trim());
  if (!eligible.length) return;
  const label = kind === "docx" ? "Word document" : "PDF";
  if (!confirm(`Generate ${label}s for ${eligible.length} pending draft${eligible.length!==1?"s":""} with an Application No. filled in? Each will be saved to the connected output folder and marked as completed.`)) return;

  setStatus(`Generating ${eligible.length} ${label}${eligible.length!==1?"s":""}…`, "ok");

  let success = 0, failed = 0;
  for (const meta of eligible) {
    try {
      const ok = await loadDraftIntoForm(meta.id);
      if (!ok) { failed++; continue; }
      updateDocName();
      updatePaper();
      if (validate().length) { failed++; continue; } // skip drafts missing required fields rather than generate an incomplete document
      // Let the browser actually paint the updated #letterPaper before the
      // PDF path screenshots it via html2canvas.
      await new Promise(r => setTimeout(r, 60));

      const docName = buildDocName(T(), S.vals);
      if (kind === "docx") {
        const blob = await buildDocxBlob();
        logDocument("docx");
        const saved = await saveCompletedLetterToFolder(blob, docName);
        if (saved) { await completeDraft(meta.id, docName); success++; } else failed++;
      } else {
        logDocument("pdf");
        const blob = await buildLetterPdfBlob();
        if (blob) {
          const saved = await saveCompletedPdfToFolder(blob, docName);
          if (saved) { await completeDraft(meta.id, docName); success++; } else failed++;
        } else failed++;
      }
    } catch (err) {
      console.error("Batch save failed for draft", meta.id, err);
      failed++;
    }
  }

  // Return to a blank, unlocked new-draft state afterward.
  S.currentDraftId = null; S.currentDraftEmails = [];
  S.vals = {}; S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = ""; S.piTableRows = []; S.currentPiMeta = null;
  S.formLocked = false;

  setStatus(
    `Batch ${label} generation done: ${success} saved` + (failed ? `, ${failed} failed — check the output folder connection and try those individually.` : ".") ,
    failed ? "warn" : "ok"
  );
  renderGenerate();
}

/* ═══════════════════════════════════════════
   REAL .DOCX GENERATION
   Loads the embedded original template (as a zip), substitutes the
   {{PLACEHOLDER}} tokens directly inside word/document.xml, swaps the
   PI snip image bytes for Type B, and re-zips as a genuine .docx file
   — so formatting, spacing, fonts, and margins are byte-identical to
   the source Word document.
═══════════════════════════════════════════ */
function b64ToUint8Array(b64) {
  const raw = atob(b64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function buildDocxBlob() {
  const type = T();
  const v = S.vals;
  const templateB64 = TEMPLATE_DOCX_B64[type.id];
  const zipBytes = b64ToUint8Array(templateB64);
  const zip = await JSZip.loadAsync(zipBytes);

  let xml = await zip.file("word/document.xml").async("string");

  const replacements = {
    "{{DATE}}": fmtDate(v.date),
    "{{APP_NO}}": v.appNo || "",
    "{{VALUE}}": v.value || "",
    "{{IMPORTED_FROM}}": v.importedFrom || "",
    "{{INVOICE_NO_DATE}}": buildInvoiceRef(v),
  };
  // The recipient address is entered as free-form multi-line text but the
  // Word template has 4 fixed paragraph slots (matching the original fixed
  // letter text it replaced) — split into up to 4 lines; if the address has
  // fewer, the remaining slots are just blank lines; if it somehow has more,
  // the overflow gets folded into the last slot rather than silently dropped.
  const addrLines = String(v.recipientAddress || "").split("\n").map(s => s.trim()).filter(Boolean);
  for (let i = 0; i < 4; i++) replacements[`{{RECIPIENT_ADDRESS_L${i+1}}}`] = addrLines[i] || "";
  if (addrLines.length > 4) {
    replacements["{{RECIPIENT_ADDRESS_L4}}"] = addrLines.slice(3).join(", ");
  }
  if (type.id === "A") {
    replacements["{{RAW_MATERIAL}}"] = combinedRawMaterial(v);
    replacements["{{MANUFACTURER_OF}}"] = v.mfrOf || "";
  }

  for (const [token, value] of Object.entries(replacements)) {
    xml = xml.split(token).join(escXml(value));
  }

  if (type.id === "B") {
    // Swap the placeholder PI image bytes for the real cropped table image
    if (S.piImageBytes) {
      zip.file("word/media/image1.png", S.piImageBytes);
    }
    // Resize the image's drawing extent to match the real image's aspect ratio,
    // keeping a fixed sensible width so it never overflows the page margins.
    const TARGET_WIDTH_EMU = 5943600; // ~6.49in, matches original template width
    const ratio = S.piAspectRatio || (3877310 / 5943600);
    const targetHeight = Math.round(TARGET_WIDTH_EMU * ratio);
    xml = xml.split("{{PI_CX}}").join(String(TARGET_WIDTH_EMU));
    xml = xml.split("{{PI_CY}}").join(String(targetHeight));
  }

  zip.file("word/document.xml", xml);

  const blob = await zip.generateAsync({
    type: "blob",
    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  });
  return blob;
}

// Save the completed Word doc blob to the admin's chosen output folder for

async function saveCompletedLetterToFolder(blob, docName) {
  const type = T();
  const getHandle = type.id === "A" ? getOutputAFolderHandle : getOutputBFolderHandle;
  const handle = await getHandle();

// Renders the on-screen letter preview into an actual PDF file (via
// html2canvas + jsPDF), so a real PDF can be auto-saved to a folder the
// same way the Word copy is — the browser's own Print dialog only lets the
// person save a PDF wherever they choose each time, with nothing left for
// the app to store or reopen later.
async function buildLetterPdfBlob() {
  if (typeof html2canvas === "undefined" || !window.jspdf) {
    console.warn("html2canvas/jsPDF not available (offline or blocked by network) — skipping auto-saved PDF copy.");
    return null;
  }
  const el = document.getElementById("letterPaper");
  if (!el) return null;
  try {
    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
    const { jsPDF } = window.jspdf;
    const pxToMm = 25.4 / 96; // canvas px (at CSS 96dpi baseline) -> mm
    const widthMm = canvas.width / 2 * pxToMm;   // /2 to undo the scale:2 above
    const heightMm = canvas.height / 2 * pxToMm;
    const doc = new jsPDF({
      orientation: heightMm >= widthMm ? "portrait" : "landscape",
      unit: "mm",
      format: [widthMm, heightMm],
    });
    doc.addImage(canvas.toDataURL("image/jpeg", 0.95), "JPEG", 0, 0, widthMm, heightMm);
    return doc.output("blob");
  } catch (err) {
    console.error("PDF generation failed:", err);
    return null;
  }
}

async function handleWord() {
  const missing = validate();
  if (missing.length) { setStatus("Please fill in: " + missing.join(", "), "warn"); return; }

  setStatus("Generating Word document…", "ok");
  try {
    const blob = await buildDocxBlob();
    logDocument("docx");
    const docName = buildDocName(T(), S.vals);

    // Admin: save a copy to the type-specific completed-letters folder, and
    // mark the originating draft (if any) as completed.
    let savedToOutput = false;
    if (isEffectiveAdmin()) {
      savedToOutput = await saveCompletedLetterToFolder(blob, docName);
      if (S.currentDraftId) await completeDraft(S.currentDraftId, docName);
    }

    // Only fall back to a browser download when there's no connected folder
    // to save into (or the save failed) — otherwise the file is already
    // sitting in the right place, and a second downloaded copy is unwanted.
    if (!savedToOutput) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileSafe(docName) + ".docx";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    setStatus(
      (savedToOutput
        ? `Logged. Saved as Word: ${docName}.docx (in the completed letters folder).`
        : `Logged. Downloaded: ${docName}.docx`) +
      (isEffectiveAdmin() && S.currentDraftId ? " — draft marked as completed." : ""),
      "ok"
    );
    S.formLocked = true;
    renderGenerate();
  } catch (err) {
    console.error(err);
    setStatus("Could not generate the Word document. Please try again.", "warn");
  }
}

// Manually link a saved requester email to a draft — used when the
// automatic linking (attaching an email while that draft is open) didn't
// happen, e.g. the email was uploaded before any draft existed, or for a
// different draft than intended. Available to both admin and User1.
// Passing draftId = null unlinks the email instead.
async function linkEmailToDraft(emailSavedName, draftId) {
  const emails = loadEmailMeta();
  const email = emails.find(e => e.name === emailSavedName);
  if (!email) return;

  if (!draftId) {
    email.linkedDraftId = null;
    saveEmailMeta(emails);
    renderEmails();
    return;
  }

  const draftData = await readDraftFromFolder(draftId);
  if (!draftData) {
    alert("Could not open that draft from the shared folder — make sure it's still connected and the draft file hasn't been moved or deleted.");
    return;
  }

  const entry = { name: email.name, originalName: email.originalName || email.name, savedAt: email.savedAt || null, size: email.size || null };
  draftData.attachedEmails = draftData.attachedEmails || [];
  if (!draftData.attachedEmails.some(e => e.name === entry.name)) draftData.attachedEmails.push(entry);

  const handle = await getDraftFolderHandle();
  if (!handle) { alert("The shared draft folder isn't connected in this browser."); return; }
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    const fileHandle = await handle.getFileHandle(makeDraftFilename(draftId), { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(draftData, null, 0));
    await writable.close();
  } catch (err) {
    console.error("Could not update the draft file with the linked email:", err);
    alert("Could not save the link — check the shared folder connection and try again.");
    return;
  }

  // Keep the local draft-meta email count (used for the 📧 N badge) in sync.
  const allMeta = loadDraftMeta();
  const meta = allMeta.find(d => d.id === draftId);
  if (meta) { meta.emailCount = draftData.attachedEmails.length; saveDraftMeta(allMeta); }

  email.linkedDraftId = draftId;
  saveEmailMeta(emails);

  // If this is the draft currently open in the Generate form, refresh its
  // in-memory attached-emails list too, so it's reflected immediately.
  if (S.currentDraftId === draftId) S.currentDraftEmails = draftData.attachedEmails;

  renderEmails();
}

          : `<table class="log"><thead><tr><th>Original filename</th><th>Saved as</th><th>Saved</th><th>Size</th><th>Linked letter</th></tr></thead><tbody>
            ${emails.map((e, i) => {
              const draftMeta = e.linkedDraftId ? loadDraftMeta().find(d => d.id === e.linkedDraftId) : null;
              const linkText = draftMeta
                ? (draftMeta.status === "completed"
                    ? `✓ ${esc(draftMeta.completedDocName || draftMeta.draftName)}`
                    : `⏳ ${esc(draftMeta.draftName)} (pending)`)
                : `<select class="email-link-select" data-email-idx="${i}" style="font-size:11.5px;padding:3px 6px;max-width:220px;">
                    <option value="">— not linked — link to a draft…</option>
                    ${availableDrafts.map(d => `<option value="${esc(d.id)}">${d.status==="completed" ? "✓ " : "⏳ "}${esc(d.draftName || "Unnamed draft")}${d.status==="completed" ? " (completed)" : " (pending)"}</option>`).join("")}
                  </select>`;
              return `<tr>
              <td>${esc(e.originalName || e.name)}</td>
              <td style="font-family:monospace;font-size:11px;">${esc(e.name)}</td>
              <td>${esc(e.savedAt ? new Date(e.savedAt).toLocaleString() : "")}</td>
              <td>${esc(e.size ? (e.size/1024).toFixed(1) + " KB" : "")}</td>
              <td style="font-size:11.5px;">${linkText}</td>
            </tr>`;
            }).join("")}
          </tbody></table>`}
      </div>
    </div>
  `;

  // Drag & drop
  const zone = document.getElementById("emailDropZone");
  const fileInput = document.getElementById("emailFileInput");

  zone.onclick = (e) => { if (e.target !== fileInput) fileInput.click(); };
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.style.borderColor = "var(--accent)"; zone.style.background = "var(--accent-soft)"; });
  zone.addEventListener("dragleave", () => { zone.style.borderColor = "var(--border-soft)"; zone.style.background = "var(--surface-alt)"; });
  zone.addEventListener("drop", async e => {
    e.preventDefault(); zone.style.borderColor = "var(--border-soft)"; zone.style.background = "var(--surface-alt)";
    const files = Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.(msg|eml)$/i));
    if (files.length) await handleEmailFiles(files);
  });
  fileInput.addEventListener("change", async e => {
    const files = Array.from(e.target.files);
    if (files.length) await handleEmailFiles(files);
  });

  // Manual "link to draft" dropdowns (shown only for emails not already linked)
  root.querySelectorAll(".email-link-select").forEach(sel => {
    sel.onchange = () => {
      const email = emails[+sel.dataset.emailIdx];
      sel.disabled = true;
      linkEmailToDraft(email.name, sel.value || null);
    };
  });

  const clearHistoryBtn = document.getElementById("btnClearEmailHistory");
  if (clearHistoryBtn) clearHistoryBtn.onclick = () => {
    const archiveNote = "A permanent record (original filename, saved name, date, size, and linked letter) is kept separately in the email archive Excel sheet, so this history can always be reconstructed even after clearing it here.";
    if (confirm(`Clear all ${emails.length} requester email record${emails.length!==1?"s":""} from this list?\n\n${archiveNote}\n\nNote: this only clears the list shown here — the actual saved email files in the connected folder are not deleted.`)) {
      saveEmailMeta([]);
      S.savedEmails = [];
      renderEmails();
    }
  };
}

async function handleEmailFiles(files, draftId = null) {
  const statusEl = document.getElementById("emailStatus");
  if (statusEl) statusEl.innerHTML = `<div class="status ok">Saving ${files.length} file${files.length!==1?"s":""}…</div>`;
  let saved = 0;
  for (const file of files) {
    const result = await saveEmailFile(file, draftId);
    if (result) saved++;
  }
  if (statusEl) statusEl.innerHTML = `<div class="status ${saved > 0 ? "ok" : "warn"}">${saved} of ${files.length} email${files.length!==1?"s":""} saved${saved > 0 && (draftId || S.currentDraftId) ? " and linked to current draft" : ""}.${saved > 0 ? "" : " Check your email save folder connection."}</div>`;
  renderEmails();
}

/* ═══════════════ SUPPLIER PI TAB (both roles) ═══════════════ */

// Opens (downloads) a saved Proforma Invoice PDF from the connected
// Supplier PI folder, matched by its actual saved filename.
async function openSavedSupplierPi(savedName, originalName) {
  const handle = await getSupplierPiFolderHandle();
  if (!handle) { alert("The Supplier PI folder isn't connected in this browser. Connect it from Settings (admin) first."); return; }
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    const fileHandle = await handle.getFileHandle(savedName);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href = url; a.download = originalName || file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  } catch (err) {
    console.error("Could not open saved Supplier PI:", err);
    alert("Could not find this PDF in the Supplier PI folder — it may have been moved, renamed, or deleted since.");
  }
}

async function renderSupplierPI() {
  const root = document.getElementById("viewRoot");
  const admin = isEffectiveAdmin();
  const piHandle = await getSupplierPiFolderHandle();
  const piFolderConnected = !!piHandle;
  const allPi = loadSupplierPiMeta();
  const allDrafts = loadDraftMeta();

  // Group by linked draft/letter so re-uploading a new PI for the same
  // letter shows up as version history (current vs superseded) rather than
  // a flat, disconnected list.
  const groups = new Map();
  allPi.forEach(p => {
    const key = p.linkedDraftId || "(unlinked)";
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(p);
  });
  groups.forEach(list => list.sort((a, b) => (a.savedAt||"").localeCompare(b.savedAt||""))); // oldest first within a group

  const groupList = Array.from(groups.entries())
    .map(([key, list]) => ({ key, list, latestAt: list[list.length-1].savedAt || "" }))
    .sort((a, b) => (b.latestAt||"").localeCompare(a.latestAt||"")); // newest group activity first

  root.innerHTML = `
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px;">
        <div style="font-size:13.5px;color:var(--muted);">${allPi.length} Proforma Invoice PDF${allPi.length!==1?"s":""} saved</div>
        ${!admin ? (piFolderConnected
          ? `<span style="font-size:12px;color:var(--muted);">📁 Saved to "<strong style="color:var(--ink);">${esc(piHandle.name)}</strong>"</span>`
          : `<span style="font-size:12px;color:var(--muted);">📁 Waiting for the admin to connect a save folder.</span>`) : ""}
      </div>
      <p style="font-size:12.5px;color:var(--muted);margin:0 0 16px;">Every Proforma Invoice attached to a Machine Parts letter is saved here automatically, linked to that letter. Attaching a new PI for the same letter doesn't overwrite the old one — it's kept as a "Superseded" version so there's a full history.</p>

      ${allPi.length === 0
        ? `<div class="log-empty">No Proforma Invoices saved yet — attach one on a Machine Parts letter in the Generate tab.</div>`
        : groupList.map(g => {
            const draftMeta = g.key !== "(unlinked)" ? allDrafts.find(d => d.id === g.key) : null;
            const letterLabel = draftMeta
              ? (draftMeta.status === "completed" ? `✓ ${esc(draftMeta.completedDocName || draftMeta.draftName)}` : `⏳ ${esc(draftMeta.draftName)} (pending)`)
              : `<span style="color:var(--muted);">Not linked to a letter</span>`;
            const reversed = [...g.list].reverse(); // newest first for display
            return `
            <div style="border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:10px;">
              <div style="font-size:12.5px;font-weight:700;margin-bottom:8px;">${letterLabel}</div>
              <div style="display:flex;flex-direction:column;">
                ${reversed.map((p, idx) => `
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:12.5px;padding:7px 0;${idx < reversed.length - 1 ? "border-bottom:1px solid var(--line);" : ""}">
                    <div>
                      📄 ${esc(p.originalName)}
                      ${idx === 0 && reversed.length > 1 ? `<span style="font-size:10px;background:#2d6636;color:#fff;padding:1px 6px;border-radius:4px;margin-left:6px;">Current</span>` : ""}
                      ${idx > 0 ? `<span style="font-size:10px;background:#8a5c10;color:#fff;padding:1px 6px;border-radius:4px;margin-left:6px;">Superseded</span>` : ""}
                      <div style="color:var(--muted);font-size:11px;margin-top:2px;">${p.savedAt ? esc(new Date(p.savedAt).toLocaleString()) : ""}${p.size ? " &middot; " + (p.size/1024).toFixed(1) + " KB" : ""}</div>
                    </div>
                    <button class="btn-ghost pi-open-btn" data-pi-name="${esc(p.name)}" data-pi-orig="${esc(p.originalName)}" style="font-size:11.5px;">View PDF</button>
                  </div>`).join("")}
              </div>
            </div>`;
          }).join("")}
    </div>
  `;

  root.querySelectorAll(".pi-open-btn").forEach(btn => {
    btn.onclick = () => openSavedSupplierPi(btn.dataset.piName, btn.dataset.piOrig);
  });
}

/* ═══════════════ REQUESTED MATERIALS AND PARTS (admin only) ═══════════════ */
async function renderMaterials() {
  const root = document.getElementById("viewRoot");
  const allRows = loadLog();

  const MF = S.materialsFilters || { search: "", supplier: "", year: "", sort: "newest" };
  S.materialsFilters = MF;

  const allSuppliers = [...new Set(allRows.map(r => r.importedFrom).filter(Boolean))].sort();
  const allYears = [...new Set(allRows.map(r => (r.dateGenerated||"").slice(0,4)).filter(Boolean))].sort().reverse();

  const term = MF.search.trim().toLowerCase();

  function rawMatches(r) {
    if (MF.supplier && r.importedFrom !== MF.supplier) return false;
    if (MF.year && !(r.dateGenerated||"").startsWith(MF.year)) return false;
    if (!term) return true;
    const hay = [r.clearanceOf, r.rawMaterialName, r.rawMaterialQty, r.rawMaterial, r.importedFrom, r.appNo, r.docName].map(x => String(x||"").toLowerCase()).join(" ");
    return hay.includes(term);
  }
  function mpMatches(r) {
    if (MF.supplier && r.importedFrom !== MF.supplier) return false;
    if (MF.year && !(r.dateGenerated||"").startsWith(MF.year)) return false;
    if (!term) return true;
    const headerHay = [r.importedFrom, r.appNo, r.docName].map(x => String(x||"").toLowerCase()).join(" ");
    if (headerHay.includes(term)) return true;
    return (r.piTableRows||[]).some(row => String(row.description||"").toLowerCase().includes(term));
  }

  function applySort(list, valueOf) {
    const sorted = [...list];
    if (MF.sort === "oldest") sorted.sort((a,b) => (a.dateGenerated||"").localeCompare(b.dateGenerated||""));
    else if (MF.sort === "supplier") sorted.sort((a,b) => (a.importedFrom||"").localeCompare(b.importedFrom||""));
    else if (MF.sort === "value-high") sorted.sort((a,b) => valueOf(b) - valueOf(a));
    else if (MF.sort === "value-low") sorted.sort((a,b) => valueOf(a) - valueOf(b));
    else sorted.sort((a,b) => (b.dateGenerated||"").localeCompare(a.dateGenerated||"")); // newest (default)
    return sorted;
  }

  const rawRowsAll = allRows.filter(r => r.letterType === "Raw Material" && rawMatches(r));

  // ── Combine raw materials across letters (same idea as Machine Parts below) ──
  const mergeMap = loadMergeMap();
  const rawInstances = rawRowsAll.map(r => ({
    canon: canonicalPartName(r.clearanceOf || r.rawMaterialName || r.rawMaterial || "Unspecified", mergeMap, "raw"),
    rawDesc: String(r.clearanceOf || r.rawMaterialName || r.rawMaterial || "").trim(),
    value: r.value || "",
    supplier: r.importedFrom || "",
    appNo: r.appNo || "",
    date: r.dateGenerated || "",
    docName: r.docName || "",
  }));
  const rawGroupsMap = new Map();
  rawInstances.forEach(inst => {
    const key = normalizePartKey(inst.canon);
    if (!rawGroupsMap.has(key)) rawGroupsMap.set(key, { canon: inst.canon, variants: new Set(), totals: {}, instances: [] });
    const g = rawGroupsMap.get(key);
    g.variants.add(inst.rawDesc);
    g.instances.push(inst);
    const { currency, amount } = parseValue(inst.value);
    if (amount) g.totals[currency] = (g.totals[currency] || 0) + amount;
  });
  const rawGroupMostRecent = g => g.instances.reduce((m, i) => (i.date > m ? i.date : m), "");
  const rawGroupEarliest = g => g.instances.reduce((m, i) => (m === "" || i.date < m) ? i.date : m, "");
  const rawGroupFirstSupplier = g => [...new Set(g.instances.map(i => i.supplier))].filter(Boolean).sort()[0] || "";
  // Rough cross-currency magnitude for the "value" sort only — mixing USD +
  // SGD + GBP by raw number isn't a real converted total, just a way to
  // order groups by roughly how much business they represent.
  const rawGroupMagnitude = g => Object.values(g.totals).reduce((a, b) => a + b, 0);
  let rawGroupList = Array.from(rawGroupsMap.values());
  if (MF.sort === "oldest") rawGroupList.sort((a,b) => rawGroupEarliest(a).localeCompare(rawGroupEarliest(b)));
  else if (MF.sort === "supplier") rawGroupList.sort((a,b) => rawGroupFirstSupplier(a).localeCompare(rawGroupFirstSupplier(b)));
  else if (MF.sort === "value-low") rawGroupList.sort((a,b) => rawGroupMagnitude(a) - rawGroupMagnitude(b));
  else if (MF.sort === "value-high") rawGroupList.sort((a,b) => rawGroupMagnitude(b) - rawGroupMagnitude(a));
  else rawGroupList.sort((a,b) => rawGroupMostRecent(b).localeCompare(rawGroupMostRecent(a))); // newest (default)

  const mpRowsAll = allRows.filter(r => r.letterType === "Machine Parts" && r.piTableRows && r.piTableRows.length && mpMatches(r));
  const mpRowsNoTable = allRows.filter(r => r.letterType === "Machine Parts" && (!r.piTableRows || !r.piTableRows.length) && mpMatches(r)).length;

  // ── Combine parts/materials across letters & PIs ──
  // A physical part shows up once per PI it was ordered on; this rolls all
  // of those up into one row per part with a summed total quantity, plus
  // which app numbers/suppliers/dates contributed to that total. A manual
  // merge map (see canonicalPartName) lets an admin fold in variants that
  // didn't auto-combine because a later PI phrased the description slightly
  // differently. (mergeMap itself was already loaded above, for Raw Materials.)
  const partInstances = [];
  mpRowsAll.forEach(r => {
    (r.piTableRows || []).forEach(row => {
      partInstances.push({
        canon: canonicalPartName(row.description, mergeMap, "mp"),
        rawDesc: String(row.description || "").trim(),
        qty: parseQty(row.quantity),
        qtyDisplay: cleanQtyDisplay(row.quantity) || "1",
        supplier: r.importedFrom || "",
        appNo: r.appNo || "",
        date: r.dateGenerated || "",
        docName: r.docName || "",
      });
    });
  });
  const partGroupsMap = new Map();
  partInstances.forEach(inst => {
    const key = normalizePartKey(inst.canon);
    if (!partGroupsMap.has(key)) partGroupsMap.set(key, { canon: inst.canon, variants: new Set(), totalQty: 0, instances: [] });
    const g = partGroupsMap.get(key);
    g.variants.add(inst.rawDesc);
    g.totalQty += inst.qty;
    g.instances.push(inst);
  });
  const mostRecentDate = g => g.instances.reduce((m, i) => (i.date > m ? i.date : m), "");
  const earliestDate = g => g.instances.reduce((m, i) => (m === "" || i.date < m) ? i.date : m, "");
  const firstSupplier = g => [...new Set(g.instances.map(i => i.supplier))].filter(Boolean).sort()[0] || "";
  let partGroupList = Array.from(partGroupsMap.values());
  if (MF.sort === "oldest") partGroupList.sort((a,b) => earliestDate(a).localeCompare(earliestDate(b)));
  else if (MF.sort === "supplier") partGroupList.sort((a,b) => firstSupplier(a).localeCompare(firstSupplier(b)));
  else if (MF.sort === "value-low") partGroupList.sort((a,b) => a.totalQty - b.totalQty);
  else if (MF.sort === "value-high") partGroupList.sort((a,b) => b.totalQty - a.totalQty);
  else partGroupList.sort((a,b) => mostRecentDate(b).localeCompare(mostRecentDate(a))); // newest (default)

  const activeFilters = !!(MF.search || MF.supplier || MF.year);

  root.innerHTML = `
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <div style="font-size:14px;font-weight:700;">Materials &amp; Parts ${activeFilters ? "— filtered view" : ""}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <input type="text" id="matSearch" class="dash-filter" placeholder="Search materials, parts, supplier, app no…" value="${esc(MF.search)}" style="flex:1 1 220px;min-width:200px;">
          <select id="matSupplier" class="dash-filter" style="flex:1 1 140px;min-width:120px;">
            <option value="">All suppliers</option>
            ${allSuppliers.map(s => `<option value="${esc(s)}" ${MF.supplier===s?"selected":""}>${esc(s)}</option>`).join("")}
          </select>
          <select id="matYear" class="dash-filter" style="flex:1 1 120px;min-width:110px;">
            <option value="">All time</option>
            ${allYears.map(y => `<option value="${y}" ${MF.year===y?"selected":""}>${y}</option>`).join("")}
          </select>
          <select id="matSort" class="dash-filter" style="flex:1 1 140px;min-width:130px;">
            <option value="newest" ${MF.sort==="newest"?"selected":""}>Newest first</option>
            <option value="oldest" ${MF.sort==="oldest"?"selected":""}>Oldest first</option>
            <option value="supplier" ${MF.sort==="supplier"?"selected":""}>Supplier A–Z</option>
            <option value="value-high" ${MF.sort==="value-high"?"selected":""}>Value: high to low</option>
            <option value="value-low" ${MF.sort==="value-low"?"selected":""}>Value: low to high</option>
          </select>
          ${activeFilters ? `<button class="btn-ghost" id="matClear" style="font-size:12px;">✕ Clear</button>` : ""}
        </div>
      </div>
    </div>

    <div class="panel" style="margin-top:16px;">
      <div class="panel-title">Requested Raw Materials — combined by material ${activeFilters ? `(${rawGroupList.length} material${rawGroupList.length!==1?"s":""} across ${rawRowsAll.length} letter${rawRowsAll.length!==1?"s":""})` : ""}</div>
      <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.6;">
        Combines the same raw material ordered across different letters into one row with a running total by currency, plus which app numbers/suppliers/dates contributed to it.
        If the same material didn't auto-combine (e.g. it was worded slightly differently on a later letter), tick two or more rows below and use <strong>Merge selected</strong> to fold them into one — this is remembered for next time. Each combined row's variant tags can be un-merged individually with their ✕.
      </p>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
        <button id="btnMergeRaw" class="btn-secondary" style="font-size:12px;padding:6px 14px;" disabled>Merge selected into one material…</button>
        <span id="mergeRawSelectCount" style="font-size:11.5px;color:var(--muted);"></span>
      </div>
      <div class="logwrap">
        ${rawGroupList.length === 0 ? `<div class="log-empty">${activeFilters ? "No Raw Material letters match this search/filter." : "No Raw Material letters yet."}</div>` : `
        <table class="log"><thead><tr>
          <th style="width:26px;"></th><th>Raw material</th><th>Total value (by currency)</th><th>Supplier(s)</th><th>App no. &amp; date breakdown</th>
        </tr></thead><tbody>
          ${rawGroupList.map((g, i) => {
            const suppliers = [...new Set(g.instances.map(x => x.supplier).filter(Boolean))];
            const hi = term && (String(g.canon).toLowerCase().includes(term) || [...g.variants].some(v => v.toLowerCase().includes(term)));
            const detailsList = g.instances.slice()
              .sort((a, b) => (b.date||"").localeCompare(a.date||""))
              .map(x => `${esc(x.appNo || "—")} &middot; ${esc(x.supplier || "—")} &middot; ${esc(x.date || "—")} &middot; ${esc(x.value || "—")}`)
              .join("<br>");
            const variantChips = g.variants.size > 1
              ? `<div style="margin-top:5px;">${[...g.variants].map(v => `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--chip-bg);border-radius:10px;padding:2px 8px;font-size:10.5px;margin:2px 4px 0 0;">${esc(v)} <button class="chip-unmerge" data-unmerge-variant="${esc(v)}" data-unmerge-kind="raw" title="Split this description back out on its own" style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0;line-height:1;">✕</button></span>`).join("")}</div>`
              : "";
            return `<tr${hi ? ' style="background:var(--highlight-bg);"' : ""}>
              <td><input type="checkbox" class="rawMergeCheck" data-raw-idx="${i}"></td>
              <td>${esc(g.canon)}${variantChips}</td>
              <td>${esc(fmtCurrencyTotals(g.totals))}</td>
              <td>${esc(suppliers.join(", ") || "—")}</td>
              <td style="font-size:11.5px;line-height:1.6;">${detailsList}</td>
            </tr>`;
          }).join("")}
        </tbody></table>`}
      </div>
    </div>

    <div class="panel" style="margin-top:16px;">
      <div class="panel-title">Requested Machine Parts — combined by part ${activeFilters ? `(${partGroupList.length} part${partGroupList.length!==1?"s":""} across ${mpRowsAll.length} letter${mpRowsAll.length!==1?"s":""})` : ""}</div>
      <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.6;">
        Extracted automatically from each Machine Parts letter's attached Proforma Invoice table, then combined so the same part ordered across different letters/PIs shows one total quantity. Real invoice layouts vary a lot between suppliers, so extraction is a best-effort read, not a guaranteed-accurate one — <strong>double-check against the original PDF</strong> (open it from the Supplier PI tab) before relying on it.
        ${mpRowsNoTable > 0 ? `<br>${mpRowsNoTable} Machine Parts letter${mpRowsNoTable!==1?"s":""} had no readable table extracted (older letters, or a PI layout the reader couldn't parse) and aren't included below.` : ""}
        <br>If the same part didn't auto-combine (e.g. its description was written slightly differently on a later PI), tick two or more rows below and use <strong>Merge selected</strong> to fold them into one — this is remembered for next time. Each combined row's variant tags can be un-merged individually with their ✕.
      </p>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
        <button id="btnMergeParts" class="btn-secondary" style="font-size:12px;padding:6px 14px;" disabled>Merge selected into one part…</button>
        <span id="mergeSelectCount" style="font-size:11.5px;color:var(--muted);"></span>
      </div>
      <div class="logwrap">
        ${partGroupList.length === 0 ? `<div class="log-empty">${activeFilters ? "No Machine Parts match this search/filter." : "No Machine Parts with a readable PI table yet."}</div>` : `
        <table class="log"><thead><tr>
          <th style="width:26px;"></th><th>Part / description</th><th>Total qty</th><th>Supplier(s)</th><th>App no. &amp; date breakdown</th>
        </tr></thead><tbody>
          ${partGroupList.map((g, i) => {
            const suppliers = [...new Set(g.instances.map(x => x.supplier).filter(Boolean))];
            const hi = term && (String(g.canon).toLowerCase().includes(term) || [...g.variants].some(v => v.toLowerCase().includes(term)));
            const detailsList = g.instances.slice()
              .sort((a, b) => (b.date||"").localeCompare(a.date||""))
              .map(x => `${esc(x.appNo || "—")} &middot; ${esc(x.supplier || "—")} &middot; ${esc(x.date || "—")} &middot; qty ${esc(x.qtyDisplay)}`)
              .join("<br>");
            const variantChips = g.variants.size > 1
              ? `<div style="margin-top:5px;">${[...g.variants].map(v => `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--chip-bg);border-radius:10px;padding:2px 8px;font-size:10.5px;margin:2px 4px 0 0;">${esc(v)} <button class="chip-unmerge" data-unmerge-variant="${esc(v)}" data-unmerge-kind="mp" title="Split this description back out on its own" style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0;line-height:1;">✕</button></span>`).join("")}</div>`
              : "";
            return `<tr${hi ? ' style="background:var(--highlight-bg);"' : ""}>
              <td><input type="checkbox" class="partMergeCheck" data-part-idx="${i}"></td>
              <td>${esc(g.canon)}${variantChips}</td>
              <td>${g.totalQty.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
              <td>${esc(suppliers.join(", ") || "—")}</td>
              <td style="font-size:11.5px;line-height:1.6;">${detailsList}</td>
            </tr>`;
          }).join("")}
        </tbody></table>`}
      </div>
    </div>
  `;

  const searchEl = document.getElementById("matSearch");
  let searchDebounce;
  searchEl.oninput = () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      S.materialsFilters = { ...MF, search: searchEl.value };
      renderMaterials();
    }, 250);
  };
  document.getElementById("matSupplier").onchange = e => { S.materialsFilters = { ...MF, supplier: e.target.value }; renderMaterials(); };
  document.getElementById("matYear").onchange = e => { S.materialsFilters = { ...MF, year: e.target.value }; renderMaterials(); };
  document.getElementById("matSort").onchange = e => { S.materialsFilters = { ...MF, sort: e.target.value }; renderMaterials(); };
  const clearBtn = document.getElementById("matClear");
  if (clearBtn) clearBtn.onclick = () => { S.materialsFilters = { search:"", supplier:"", year:"", sort: MF.sort }; renderMaterials(); };

  // ── Merge / unmerge controls (Raw Materials + Machine Parts) ──
  function wireMergeSection(kind, groupList, checkboxClass, mergeBtnId, countElId, nameNoun) {
    const mergeBtn = document.getElementById(mergeBtnId);
    const mergeCountEl = document.getElementById(countElId);
    const checkEls = Array.from(root.querySelectorAll("." + checkboxClass));
    function updateMergeButtonState() {
      const checked = checkEls.filter(c => c.checked);
      if (mergeBtn) mergeBtn.disabled = checked.length < 2;
      if (mergeCountEl) mergeCountEl.textContent = checked.length > 0 ? `${checked.length} selected` : "";
    }
    checkEls.forEach(c => { c.onchange = updateMergeButtonState; });
    updateMergeButtonState();

    if (mergeBtn) mergeBtn.onclick = () => {
      const selectedGroups = checkEls.filter(c => c.checked).map(c => groupList[+c.dataset[kind === "raw" ? "rawIdx" : "partIdx"]]);
      if (selectedGroups.length < 2) return;
      const defaultName = selectedGroups[0].canon;
      const chosen = prompt(
        `Merge these ${selectedGroups.length} ${nameNoun} into one combined name:\n` +
        selectedGroups.map(g => `• ${g.canon}`).join("\n") +
        `\n\nName to use for the combined ${nameNoun.replace(/s$/, "")}:`,
        defaultName
      );
      if (chosen === null) return; // cancelled
      const finalName = chosen.trim() || defaultName;
      const map = loadMergeMap();
      selectedGroups.forEach(g => {
        map[mergeMapKey(g.canon, kind)] = finalName; // covers re-merging an already-merged group
        g.variants.forEach(v => { map[mergeMapKey(v, kind)] = finalName; });
      });
      saveMergeMap(map);
      renderMaterials();
    };
  }
  wireMergeSection("raw", rawGroupList, "rawMergeCheck", "btnMergeRaw", "mergeRawSelectCount", "materials");
  wireMergeSection("mp", partGroupList, "partMergeCheck", "btnMergeParts", "mergeSelectCount", "parts");

  root.querySelectorAll("[data-unmerge-variant]").forEach(btn => {
    btn.onclick = () => {
      const variant = btn.dataset.unmergeVariant;
      const kind = btn.dataset.unmergeKind || "mp";
      const map = loadMergeMap();
      delete map[mergeMapKey(variant, kind)];
      saveMergeMap(map);
      renderMaterials();
    };
  });
}

// Disconnects the global parent folder link plus every individually-linked
// subfolder underneath it (drafts, emails, Supplier PI, Word/PDF output,
// change log, archive) — used by the "Disconnect all subfolders" button in
// Settings. Nothing on disk is touched; this only clears the in-browser
// folder-access links, exactly like disconnecting each one by hand would.
async function disconnectAllSubfolders() {
  await disconnectFolder(GLOBAL_PARENT_FOLDER_KEY);
  for (const key of Object.keys(GLOBAL_SUBFOLDER_MAP)) {
    await disconnectFolder(key);
  }
}

// Deletes every draft_*.json file from the connected shared drafts folder
// (if one is connected). Needed alongside clearing DRAFT_META_KEY below —
// otherwise the next automatic folder sync (syncDraftsFromFolder(), which
// runs whenever admin opens the Drafts or Generate tab) would just
// rediscover the files still sitting in the folder and silently repopulate
// the "cleared" pending/completed drafts list right back.
async function deleteAllDraftFilesFromFolder() {
  const handle = await getDraftFolderHandle();
  if (!handle) return;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    for await (const [name] of handle.entries()) {
      if (name.startsWith("draft_") && name.endsWith(".json")) {
        try { await handle.removeEntry(name); } catch (err) { console.error(`Could not remove draft file "${name}":`, err); }
      }
    }
  } catch (err) {
    console.error("Could not clear the drafts folder:", err);
  }
}

// Wipes every piece of application *content* (letters/change log, its
// archive, the email archive, the drafts index and the actual draft files
// in the shared folder — so pending drafts are truly gone for both admin
// and User1, not just hidden until the next sync — saved-email metadata,
// Supplier PI records, merged material/part groupings, the recipient
// address book, and cached FX rates) so the app looks freshly installed on
// the Dashboard, Materials & Parts, Change log, Drafts, and Generate Letter
// pages. Deliberately leaves the admin PIN, theme preference, and connected
// folders untouched (folders are reset via the separate "Disconnect all
// subfolders" button; files in other connected folders, like saved emails,
// Supplier PI PDFs, and completed Word/PDF letters, are not deleted).
async function clearAllAppContent() {
  // Remove the actual draft files from the shared folder first (if
  // connected) — see deleteAllDraftFilesFromFolder() above for why this
  // has to happen alongside clearing the local drafts index.
  await deleteAllDraftFilesFromFolder();

  const contentKeys = [
    STORAGE_KEY, ARCHIVE_LOG_KEY, EMAIL_ARCHIVE_LOG_KEY,
    DRAFT_META_KEY, EMAIL_META_KEY, SUPPLIER_PI_META_KEY,
    MATERIAL_MERGE_MAP_KEY, SAVED_ADDRESSES_KEY, FX_CACHE_KEY,
  ];
  contentKeys.forEach(k => { try { localStorage.removeItem(k); } catch { /* ignore */ } });

  // Any draft that was open in the Generate form (admin or User1) is gone
  // too now — fully reset the form's in-memory state (same reset the
  // "Clear form" button does) so it doesn't keep showing stale field
  // values or trying to edit/save against a draft (and its PI/emails)
  // that no longer exists, and so the pending-drafts badge resets
  // immediately.
  S.vals = {};
  S.piImageDataUrl = null;
  S.piImageBytes = null;
  S.piStatus = "";
  S.piGoodsDesc = "";
  S.piTableRows = [];
  S.currentPiMeta = null;
  S.currentDraftId = null;
  S.currentDraftEmails = [];
  S.formLocked = false;
  S.pendingDraftCount = 0;
}

// Shorten a label for chart axes/legends while keeping the full text in a
// tooltip (title attribute) placed by the caller.
function truncateLabel(s, n = 12) {
  const str = String(s || "");
  return str.length > n ? str.slice(0, n - 1) + "…" : str;
}

// Group a set of log rows into buckets over time (day/week/month/year),
// summing the parsed monetary value separately for Raw Material and
// Machine Parts letters — this feeds the "value spent" line chart.
// NOTE: amounts are combined across currencies for the line's height; hover
// a point to see the exact per-currency breakdown for that bucket.
function buildTimeBuckets(rows, period, opts = {}) {
  const now = new Date();
  const nowDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  let n, anchor = nowDay;
  if (period === "day") {
    const from = opts.dayFrom ? new Date(opts.dayFrom + "T00:00:00") : null;
    const to = opts.dayTo ? new Date(opts.dayTo + "T00:00:00") : null;
    if (from && to && !isNaN(from) && !isNaN(to) && to >= from) {
      anchor = to;
      n = Math.max(1, Math.min(366, Math.round((to - from) / 86400000) + 1));
    } else {
      n = 14; // default: last 14 days ending today
    }
  } else if (period === "week") {
    n = Math.max(2, Math.min(104, parseInt(opts.weekCount, 10) || 12));
  } else if (period === "month") {
    n = Math.max(2, Math.min(60, parseInt(opts.monthCount, 10) || 12));
  } else if (period === "year") {
    n = Math.max(2, Math.min(40, parseInt(opts.yearCount, 10) || 6));
  } else if (period === "all") {
    // Span every year present in the data (year-granularity, like "year" but
    // without capping to the last 6) so nothing gets cut off. Always at
    // least 2 buckets — a single bucket renders as one disconnected dot with
    // no visible line, which reads as "no data" even though it isn't.
    const years = rows.map(r => new Date(r.dateGenerated || "")).filter(d => !isNaN(d)).map(d => d.getFullYear());
    const minYear = years.length ? Math.min(...years) : nowDay.getFullYear();
    n = Math.max(2, Math.min(40, nowDay.getFullYear() - minYear + 1));
  } else {
    n = 12;
  }

  function labelFor(d) {
    if (period === "day" || period === "week") return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
    if (period === "month") return d.toLocaleDateString("en-GB", { month: "short", year: "2-digit" });
    return String(d.getFullYear());
  }

  const buckets = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(anchor);
    if (period === "day") d.setDate(d.getDate() - i);
    else if (period === "week") d.setDate(d.getDate() - i * 7);
    else if (period === "month") d.setMonth(d.getMonth() - i);
    else d.setFullYear(d.getFullYear() - i);
    buckets.push({ d, label: labelFor(d), aTotals: {}, bTotals: {}, a: 0, b: 0 });
  }

  function indexFor(rowDate) {
    if (period === "day") {
      const diff = Math.floor((anchor - new Date(rowDate.getFullYear(), rowDate.getMonth(), rowDate.getDate())) / 86400000);
      const idx = n - 1 - diff;
      return idx >= 0 && idx < n ? idx : -1;
    }
    if (period === "week") {
      const diff = Math.floor((anchor - rowDate) / (7 * 86400000));
      const idx = n - 1 - diff;
      return idx >= 0 && idx < n ? idx : -1;
    }
    if (period === "month") {
      const diff = (anchor.getFullYear() - rowDate.getFullYear()) * 12 + (anchor.getMonth() - rowDate.getMonth());
      const idx = n - 1 - diff;
      return idx >= 0 && idx < n ? idx : -1;
    }
    const diff = anchor.getFullYear() - rowDate.getFullYear();
    const idx = n - 1 - diff;
    return idx >= 0 && idx < n ? idx : -1;
  }

  rows.forEach(r => {
    const d = new Date(r.dateGenerated || "");
    if (isNaN(d)) return;
    const idx = indexFor(d);
    if (idx < 0) return;
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    const bucket = buckets[idx];
    if (r.letterType === "Raw Material") { bucket.a += amount; bucket.aTotals[currency] = (bucket.aTotals[currency]||0)+amount; }
    else if (r.letterType === "Machine Parts") { bucket.b += amount; bucket.bTotals[currency] = (bucket.bTotals[currency]||0)+amount; }
  });

  return buckets;
}

// SVG line chart: two series (Raw Material / Machine Parts value) over time.
function buildLineChartSvg(buckets, colorA, colorB) {
  const n = buckets.length;
  if (n === 0 || buckets.every(b => !b.a && !b.b)) {
    return `<div style="text-align:center;color:var(--muted);padding:44px 10px;font-size:12.5px;">No value data for this period</div>`;
  }
  const w = 620, h = 170, padL = 44, padR = 12, padT = 14, padB = 22;
  const gridColor = themeColor("--line", "#eee");
  const labelColor = themeColor("--muted", "#999");
  const maxVal = Math.max(1, ...buckets.map(b => b.a), ...buckets.map(b => b.b));
  const stepX = n > 1 ? (w - padL - padR) / (n - 1) : 0;
  const x = i => padL + i * stepX;
  const y = v => padT + (1 - v / maxVal) * (h - padT - padB);
  const pathFor = key => buckets.map((b, i) => `${i === 0 ? "M" : "L"} ${x(i).toFixed(1)} ${y(b[key]).toFixed(1)}`).join(" ");

  const gridLines = [0, 0.5, 1].map(f => {
    const gy = padT + (1 - f) * (h - padT - padB);
    return `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${w - padR}" y2="${gy.toFixed(1)}" stroke="${gridColor}" stroke-width="1"/>
      <text x="${padL - 6}" y="${(gy + 3).toFixed(1)}" text-anchor="end" font-size="8" fill="${labelColor}">${Math.round(maxVal * f).toLocaleString()}</text>`;
  }).join("");

  const showEvery = Math.max(1, Math.ceil(n / 8));
  const xLabels = buckets.map((b, i) => {
    if (i % showEvery !== 0 && i !== n - 1) return "";
    return `<text x="${x(i).toFixed(1)}" y="${h - 6}" text-anchor="middle" font-size="8" fill="${labelColor}">${esc(b.label)}</text>`;
  }).join("");

  const dotsFor = (key, totalsKey, color) => buckets.map((b, i) =>
    `<circle class="line-dot" cx="${x(i).toFixed(1)}" cy="${y(b[key]).toFixed(1)}" r="2.6" fill="${color}"><title>${esc(b.label)}: ${esc(fmtCurrencyTotals(b[totalsKey]))}</title></circle>`
  ).join("");

  return `
    <svg class="line-chart-svg" viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="xMidYMid meet">
      ${gridLines}
      <g class="line-series line-series-a">
        <path class="line-path" d="${pathFor("a")}" fill="none" stroke="${colorA}" stroke-width="2"/>
        ${dotsFor("a", "aTotals", colorA)}
      </g>
      <g class="line-series line-series-b">
        <path class="line-path" d="${pathFor("b")}" fill="none" stroke="${colorB}" stroke-width="2"/>
        ${dotsFor("b", "bTotals", colorB)}
      </g>
      ${xLabels}
    </svg>`;
}

// Vertical column (bar) chart for a single value series, e.g. top
// suppliers/materials by imported value.
function buildColumnChart(items, color, emptyMsg = "No data for this filter") {
  if (!items.length) {
    return `<div style="text-align:center;color:var(--muted);padding:44px 10px;font-size:12.5px;">${esc(emptyMsg)}</div>`;
  }
  const maxVal = Math.max(1, ...items.map(it => it.sum));
  return `
    <div style="display:flex;align-items:flex-end;gap:8px;height:150px;padding-bottom:34px;position:relative;">
      ${items.map(it => {
        const pct = Math.max((it.sum / maxVal) * 100, it.sum ? 4 : 0);
        const barColor = it.color || color;
        // displayValue is the short number shown above the bar (e.g. "USD 5,000
        // (LKR 1,676,386)" or "12 units"); tooltip is the full hover text —
        // keep these separate so a long descriptive tooltip never gets
        // truncated into a garbled top label.
        const topLabel = it.displayValue != null ? it.displayValue : fmtCurrencyTotals(it.totals || {});
        const hoverTitle = it.tooltip != null ? it.tooltip : `${it.label}: ${topLabel}`;
        return `<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;" title="${esc(hoverTitle)}">
          <div style="font-size:9px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${esc(topLabel)}</div>
          <div class="col-bar" style="background:linear-gradient(180deg,${barColor},${barColor}bb);width:100%;max-width:36px;height:${pct}%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:9px;color:var(--muted);position:absolute;bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${esc(truncateLabel(it.label, 11))}</div>
        </div>`;
      }).join("")}
    </div>`;
}

// Donut/pie chart — kept from the original implementation, reused here for
// the "most imported from — supplier by value" chart.
function buildDonut(segments, centerLabel, centerSubLabel, size = 130) {
  const sum = segments.reduce((s, x) => s + x.value, 0);
  const r = 40, cx = 50, cy = 50, strokeW = 17;
  const circumference = 2 * Math.PI * r;
  if (sum === 0) {
    return `<div style="text-align:center;color:var(--muted);padding:30px 10px;font-size:12.5px;">No data for this filter</div>`;
  }
  let offsetAccum = 0;
  const arcs = segments.filter(s => s.value > 0).map(s => {
    const frac = s.value / sum;
    const dash = frac * circumference;
    const gap = circumference - dash;
    const rotation = -90 + (offsetAccum / circumference) * 360;
    offsetAccum += dash;
    return `<circle class="donut-arc" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${strokeW}"
      stroke-dasharray="${dash} ${gap}" transform="rotate(${rotation} ${cx} ${cy})" stroke-linecap="butt">
      <title>${esc(s.label)}: ${esc(s.tooltip != null ? s.tooltip : String(s.value))}</title>
    </circle>`;
  }).join("");
  return `
    <svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${themeColor("--surface-alt", "#f0ede4")}" stroke-width="${strokeW}" />
      ${arcs}
      <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="11" font-weight="700" fill="${themeColor("--ink", "#1a1a18")}">${esc(String(centerLabel))}</text>
      <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="6.5" fill="${themeColor("--muted", "#6b6b63")}">${esc(centerSubLabel||"total")}</text>
    </svg>`;
}

// Group filtered log rows by Application Number for the "Recent letters"
// table — one card per application, aggregating every letter generated
// under that app no (supplier, type, combined value, and every generated
// document + attached email so they can be reviewed in one popup).
// Group filtered log rows by Supplier for the "Recent letters" table — one
// card per supplier, showing the total business done with them (summed per
// currency) plus every generated document + attached email so they can be
// reviewed in one popup.
function groupRowsBySupplier(rows) {
  const map = new Map();
  rows.forEach(r => {
    const key = (r.importedFrom || "").trim() || "(unspecified supplier)";
    if (!map.has(key)) {
      map.set(key, { supplier: key, entries: [], typeCounts: {}, latestDate: r.dateGenerated || "" });
    }
    const g = map.get(key);
    g.entries.push(r);
    const t = r.letterType || "Unknown";
    g.typeCounts[t] = (g.typeCounts[t] || 0) + 1;
    if ((r.dateGenerated || "") > g.latestDate) g.latestDate = r.dateGenerated;
  });
  const groups = Array.from(map.values()).map(g => {
    const { totals, sum } = sumCurrencyTotals(g.entries);
    return { ...g, totals, sum };
  });
  groups.sort((a, b) => b.sum - a.sum); // rank by total business done, biggest first
  return groups;
}

// Groups rows by BOTH supplier AND letter type — one card per (supplier,
// type) combination — for the dashboard's "Most Requested Materials and
// Parts" table, so demand can be read at a glance per material/part type
// rather than lumped together per supplier.
function groupRowsBySupplierAndType(rows) {
  const map = new Map();
  rows.forEach(r => {
    const supplier = (r.importedFrom || "").trim() || "(unspecified supplier)";
    const type = r.letterType || "Unknown";
    const key = supplier + "||" + type;
    if (!map.has(key)) map.set(key, { supplier, type, entries: [] });
    map.get(key).entries.push(r);
  });
  const groups = Array.from(map.values()).map(g => {
    const { totals, sum } = sumCurrencyTotals(g.entries);
    return { ...g, totals, sum, typeCounts: { [g.type]: g.entries.length } };
  });
  groups.sort((a, b) => b.sum - a.sum); // rank by total business — i.e. most requested/highest demand first
  return groups;
}

// each is its own connected folder), if one was saved there. Deliberately
// does NOT gate on the row's recorded `formats` metadata first — older log
// entries (from before that tracking existed) show "format not recorded"
// even when the actual file is sitting right there in a now-connected
// folder, so the folder itself is the real source of truth here.
async function openSavedDocument(entry, kind = "docx") {
  if (!entry) return;
  const isRawMaterial = entry.letterType === "Raw Material";
  const getHandle = kind === "docx"
    ? (isRawMaterial ? getOutputAFolderHandle : getOutputBFolderHandle)
    : (isRawMaterial ? getOutputAPdfFolderHandle : getOutputBPdfFolderHandle);
  const folderHandle = await getHandle();
  if (!folderHandle) {
    alert(`The completed ${kind === "docx" ? "Word" : "PDF"} letters folder for ${entry.letterType || "this letter type"} isn't connected in this browser. Connect it from the Generate tab (admin view) first.`);
    return;
  }
  try {
    const ok = await ensureFolderPermission(folderHandle);
    if (!ok) return;
    const fileHandle = await folderHandle.getFileHandle(fileSafe(entry.docName) + "." + kind);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href = url; a.download = file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  } catch (err) {
    console.error("Could not open saved document:", err);
    alert(`Could not find this ${kind === "docx" ? "Word document" : "PDF"} in the completed-letters folder — it may have been moved, renamed, deleted, or never actually saved there (e.g. if this letter was generated before the folder was connected, or as the other format only).`);
  }
}

// Opens (downloads) an attached requester email from the connected email
// folder, matched by the actual filename it was saved under (not the
// original/display name, since a timestamp suffix is added to avoid clashes).
async function openSavedEmail(email) {
  if (!email) return;
  const folderHandle = await getEmailFolderHandle();
  if (!folderHandle) {
    alert("The email save folder isn't connected in this browser. Connect it from the Requester Emails tab first.");
    return;
  }
  const savedName = email.savedName || email.name;
  if (!savedName) { alert("This email entry doesn't have a saved filename on record."); return; }
  try {
    const ok = await ensureFolderPermission(folderHandle);
    if (!ok) return;
    const fileHandle = await folderHandle.getFileHandle(savedName);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href = url; a.download = email.originalName || file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  } catch (err) {
    console.error("Could not open saved email:", err);
    alert("Could not find this email in the save folder — it may have been moved, renamed, or deleted since.");
  }
}
