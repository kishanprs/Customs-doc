  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function makeDraftFilename(id) { return `draft_${id}.json`; }

// Auto-generate a draft name from the current form state, same pattern as doc name.
function buildDraftName() {
  const type = T();
  const v = S.vals;
  const supplier = supplierFirst(v.importedFrom);
  const desc = type.docNameFixedCategory
    || descWords(type.docNameDescField ? v[type.docNameDescField] : S.piGoodsDesc, 2);
  const parts = [type.levyCodes.join(" "), desc, supplier].filter(Boolean);
  return parts.join(" - ") || "New draft";
}

// Build the full draft payload to write to the JSON file.
function buildDraftPayload(id, existingMeta) {
  const now = new Date().toISOString();
  return {
    id,
    typeId: S.typeId,
    vals: S.vals,
    piGoodsDesc: S.piGoodsDesc,
    piImageDataUrl: (S.piImageDataUrl && S.piImageDataUrl.length < 4_000_000) ? S.piImageDataUrl : null,
    piTableRows: S.piTableRows || [],
    attachedEmails: S.currentDraftEmails || [],
    draftName: buildDraftName(),
    savedAt: now,
    savedBy: "user1",
    status: existingMeta?.status || "pending",
    completedDocName: existingMeta?.completedDocName || null,
    completedAt: existingMeta?.completedAt || null,
  };
}

// Save the current form state as a draft file to the shared OneDrive folder.
async function saveDraftToFolder(forceSave = false) {
  const handle = await getDraftFolderHandle();
  if (!handle) return null;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return null;

    // Get or create a draft ID for this form session.
    if (!S.currentDraftId) S.currentDraftId = makeDraftId();
    const id = S.currentDraftId;

    // Load existing meta for this draft if it exists, to preserve status/completedAt.
    const allMeta = loadDraftMeta();
    const existingMeta = allMeta.find(d => d.id === id) || null;

    const payload = buildDraftPayload(id, existingMeta);
    const filename = makeDraftFilename(id);

    const fileHandle = await handle.getFileHandle(filename, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(payload, null, 0));
    await writable.close();

    // Update local metadata index.
    const newMeta = {
      id,
      filename,
      draftName: payload.draftName,
      typeId: payload.typeId,
      savedAt: payload.savedAt,
      status: payload.status,
      completedDocName: payload.completedDocName,
      completedAt: payload.completedAt,
      emailCount: payload.attachedEmails.length,
      appNo: (payload.vals && payload.vals.appNo) || "",
    };
    const updated = allMeta.filter(d => d.id !== id);
    updated.unshift(newMeta);
    saveDraftMeta(updated);
    updateDraftTabBadge(); // refresh the tab badge without a full re-render

    // Show last-saved indicator in generate view if visible.
    const indicator = document.getElementById("draftSaveStatus");
    if (indicator) indicator.textContent = `Last saved ${new Date().toLocaleTimeString()}`;

    return id;
  } catch (err) {
    console.error("Draft save failed:", err);
    return null;
  }
}

// Read a single draft file from the shared folder by id.
// Loads a saved draft's data into the working form state (S). Shared by the
// Drafts-tab "Load into form"/"Continue editing" button, the Previous/Next
// navigation buttons, and the batch "Save All" flow, so all three behave
// identically. Returns true on success, false if the draft couldn't be read.
// Pass { preserveLock: true } (used by Previous/Next) to keep whatever
// locked/unlocked state the form was already in, rather than force-unlocking
// it — so stepping through drafts doesn't unexpectedly make a
// deliberately-locked letter editable again.
async function loadDraftIntoForm(id, opts = {}) {
  const { preserveLock = false } = opts;
  const data = await readDraftFromFolder(id);
  if (!data) return false;
  const admin = isEffectiveAdmin();
  S.currentDraftId = id;
  S.typeId = data.typeId;
  S.vals = { ...data.vals };
  migrateOldRawMaterialField(S.vals);
  if (!admin) delete S.vals.appNo;
  S.piGoodsDesc = data.piGoodsDesc || "";
  S.piImageDataUrl = data.piImageDataUrl || null;
  // Re-derive the actual image bytes from the saved data URL — needed so a
  // reopened Machine Parts draft still embeds its PI image when regenerated,
  // rather than silently producing a document with no image.
  S.piImageBytes = data.piImageDataUrl ? await dataUrlToUint8Array(data.piImageDataUrl) : null;
  S.piStatus = data.piImageDataUrl ? "done" : "";
  S.piTableRows = data.piTableRows || [];
  S.currentDraftEmails = data.attachedEmails || [];
  if (!preserveLock) S.formLocked = false;
  return true;
}

// Loads the oldest pending draft (the one User1 filled in longest ago) into
// the Generate form for admin, so admin mode always lands ready to add the
// Application No. and finalize, instead of a blank form — used right after
// PIN unlock, when switching from user-preview back to admin view, and when
// an admin session is resumed (e.g. a page refresh) with nothing loaded.
// A no-op if a draft is already open, so it never clobbers in-progress work.
async function autoLoadOldestPendingDraftForAdmin() {
  if (S.currentDraftId) return;
  const oldestPending = loadDraftMeta()
    .filter(d => d.status === "pending")
    .sort((a, b) => (a.savedAt||"").localeCompare(b.savedAt||""))[0];
  if (oldestPending) {
    await loadDraftIntoForm(oldestPending.id);
    S.view = "generate";
  }
}

async function readDraftFromFolder(id) {
  const handle = await getDraftFolderHandle();
  if (!handle) return null;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return null;
    const fileHandle = await handle.getFileHandle(makeDraftFilename(id));
    const file = await fileHandle.getFile();
    return JSON.parse(await file.text());
  } catch { return null; }
}

// Admin: read all pending draft files from the shared folder and refresh
// the local metadata index. Called on tab open and periodically.
async function syncDraftsFromFolder() {
  const handle = await getDraftFolderHandle();
  if (!handle) return;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    const localMeta = loadDraftMeta();
    const localIds = new Set(localMeta.map(d => d.id));
    const newMeta = [...localMeta];
    let changed = false;

    // Scan for draft files in the folder that aren't in local index yet.
    for await (const [name, fh] of handle.entries()) {
      if (!name.startsWith("draft_") || !name.endsWith(".json")) continue;
      const id = name.slice(6, -5); // strip "draft_" and ".json"
      if (localIds.has(id)) continue; // already indexed
      try {
        const file = await fh.getFile();
        const data = JSON.parse(await file.text());
        newMeta.unshift({
          id: data.id,
          filename: name,
          draftName: data.draftName || "Unnamed draft",
          typeId: data.typeId,
          savedAt: data.savedAt,
          status: data.status || "pending",
          completedDocName: data.completedDocName || null,
          completedAt: data.completedAt || null,
          emailCount: (data.attachedEmails || []).length,
          appNo: (data.vals && data.vals.appNo) || "",
        });
        changed = true;
      } catch {}
    }

    if (changed) {
      saveDraftMeta(newMeta);
      updateDraftTabBadge();
    }
  } catch (err) {
    console.error("Draft sync error:", err);
  }
}

// Admin: mark a draft as completed after generating the letter.
async function completeDraft(id, docName) {
  const allMeta = loadDraftMeta();
  const meta = allMeta.find(d => d.id === id);
  if (!meta) return;

  meta.status = "completed";
  meta.completedDocName = docName;
  meta.completedAt = new Date().toISOString();
  saveDraftMeta(allMeta);
  updateDraftTabBadge(); // pending count just dropped by 1

  // Also update the JSON file in the shared folder so user1 can see it's done.
  const handle = await getDraftFolderHandle();
  if (!handle) return;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    const fileHandle = await handle.getFileHandle(makeDraftFilename(id));
    const file = await fileHandle.getFile();
    const data = JSON.parse(await file.text());
    data.status = "completed";
    data.completedDocName = docName;
    data.completedAt = meta.completedAt;
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 0));
    await writable.close();
  } catch (err) {
    console.error("Draft completion update failed:", err);
  }
}

// Delete a draft — removes its file from the shared folder (if connected)
// and drops it from the local metadata index. Available to both admin and
// User1, for pending drafts as well as completed ones.
async function deleteDraft(id) {
  const meta = loadDraftMeta().find(d => d.id === id);
  const handle = await getDraftFolderHandle();
  if (handle) {
    try {
      const ok = await ensureFolderPermission(handle);
      if (ok) await handle.removeEntry(meta?.filename || makeDraftFilename(id));
    } catch (err) {
      console.error("Could not remove draft file from the shared folder (it may already be gone):", err);
    }
  }
  saveDraftMeta(loadDraftMeta().filter(d => d.id !== id));
  updateDraftTabBadge();
  if (S.currentDraftId === id) {
    S.currentDraftId = null;
    S.currentDraftEmails = [];
  }
}

// Debounced draft auto-save: 2s after last keypress.
let _draftSaveTimer = null;
function scheduleDraftSave() {
  clearTimeout(_draftSaveTimer);
  _draftSaveTimer = setTimeout(() => saveDraftToFolder(), 2000);
}

// Admin draft folder polling (every 20s).
let _draftPollTimer = null;
function startDraftPolling() {
  stopDraftPolling();
  syncDraftsFromFolder();
  _draftPollTimer = setInterval(syncDraftsFromFolder, 20000);
}
function stopDraftPolling() {
  if (_draftPollTimer) { clearInterval(_draftPollTimer); _draftPollTimer = null; }
}

// Refresh just the draft count badge in the tab bar without triggering a
// full re-render. Called after any operation that changes the draft list
// (save, sync, load) so the count is always current without a tab click.
function updateDraftTabBadge() {
  const badge = document.getElementById("draftBadgeEl");
  if (!badge) return;
  const pendingCount = loadDraftMeta().filter(d => d.status === "pending").length;
  S.pendingDraftCount = pendingCount;
  if (pendingCount > 0) {
    badge.style.cssText = "background:#2d6636;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:4px;vertical-align:middle;";
    badge.textContent = pendingCount;
  } else {
    badge.style.cssText = "";
    badge.textContent = "";
  }
}

/* ═══════════════ SUPPLIER EMAILS ═══════════════
   .msg files are saved to a user-chosen folder; metadata (name, date, size)
   is tracked in localStorage so we can list them without re-reading the folder
   every time (which requires permission re-grants on each session). */
const EMAIL_META_KEY = "morison_saved_emails_v1";

function loadEmailMeta() {
  try { return JSON.parse(localStorage.getItem(EMAIL_META_KEY) || "[]"); } catch { return []; }
}
function saveEmailMeta(emails) { localStorage.setItem(EMAIL_META_KEY, JSON.stringify(emails)); }

/* ═══════════════ SUPPLIER PI (Machine Parts) ═══════════════
   Every uploaded Proforma Invoice PDF is saved to its own folder (like
   requester emails), with a local metadata index tracking which draft/letter
   it's linked to. Uploading a new PI for a draft that already has one
   doesn't overwrite anything — it's recorded as a new entry, so the full
   history of PI versions for that letter is preserved and visible. */
const SUPPLIER_PI_META_KEY = "morison_supplier_pi_v1";

function loadSupplierPiMeta() {
  try { return JSON.parse(localStorage.getItem(SUPPLIER_PI_META_KEY) || "[]"); } catch { return []; }
}
function saveSupplierPiMeta(rows) { localStorage.setItem(SUPPLIER_PI_META_KEY, JSON.stringify(rows)); }

// Requests (and, if already granted, simply confirms) readwrite permission
// on the Supplier PI folder. This is meant to be called IMMEDIATELY off the
// user's drop/file-select gesture — i.e. before any of the PDF parsing/
// rendering work in processPI() — because requestPermission() only actually
// prompts (rather than silently no-op'ing) while the browser still considers
// the click/drop a "fresh" user activation. The PDF text extraction + canvas
// render that processPI() does can easily take a second or more, which is
// often enough for that window to close. Calling this first means the actual
// save later only ever has to *check* permission, never request it late.
async function ensureSupplierPiPermissionUpfront() {
  const handle = await getSupplierPiFolderHandle();
  if (!handle) return "not-connected";
  const ok = await ensureFolderPermission(handle);
  return ok ? "granted" : "permission-denied";
}

// Saves the ORIGINAL uploaded PI PDF (not the derived cropped table image)
// to the connected Supplier PI folder, and records it in the metadata index,
// linked to whatever draft is currently open (if any). Returns a result
// object (rather than a bare meta-or-null) so the caller can tell the user
// *why* nothing was saved instead of failing silently.
async function saveSupplierPiFile(file) {
  const handle = await getSupplierPiFolderHandle();
  if (!handle) return { ok: false, reason: "not-connected" };
  try {
    // Permission should already have been requested up front via
    // ensureSupplierPiPermissionUpfront(); here we only check it (query, not
    // request) since by this point the user gesture that triggered the
    // upload is long gone and a fresh request would just silently fail.
    const granted = (await handle.queryPermission({ mode: "readwrite" })) === "granted";
    if (!granted) return { ok: false, reason: "permission-denied" };

    const baseName = file.name.replace(/\.pdf$/i, "");
    const safeName = baseName + "_" + Date.now() + ".pdf";
    const fileHandle = await handle.getFileHandle(safeName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(await file.arrayBuffer());
    await writable.close();

    const piMeta = {
      name: safeName,
      originalName: file.name,
      savedAt: new Date().toISOString(),
      size: file.size,
      linkedDraftId: S.currentDraftId || null,
    };
    const rows = loadSupplierPiMeta();
    rows.unshift(piMeta);
    saveSupplierPiMeta(rows);
    return { ok: true, meta: piMeta };
  } catch (err) {
    console.error("Supplier PI save failed:", err);
    return { ok: false, reason: "error", error: err };
  }
}

async function saveEmailFile(file, draftId = null) {
  const handle = await getEmailFolderHandle();
  if (!handle) {
    alert("Please connect an email save folder first (in the Emails tab settings).");
    return null;
  }
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return null;
    const baseName = file.name.replace(/\.(msg|eml)$/i, "");
    const safeName = baseName + "_" + Date.now() + file.name.slice(file.name.lastIndexOf("."));
    const fileHandle = await handle.getFileHandle(safeName, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(await file.arrayBuffer());
    await writable.close();

    const emailMeta = {
      name: safeName,
      originalName: file.name,
      savedAt: new Date().toISOString(),
      size: file.size,
      linkedDraftId: draftId || S.currentDraftId || null,
    };

    const emails = loadEmailMeta();
    emails.unshift(emailMeta);
    saveEmailMeta(emails);
    S.savedEmails = emails;
    appendToEmailArchive(emailMeta);

    // Always track this email against whatever letter is currently open in
    // the Generate tab — this is what makes it show up on that letter's
    // "Recent letters" / Change log entry later, whether or not the letter
    // has ever been saved as a draft.
    S.currentDraftEmails = [...(S.currentDraftEmails || []), {
      name: safeName,
      originalName: file.name,
      savedAt: emailMeta.savedAt,
      size: file.size,
    }];

    // If there's also a saved draft, persist the link in the shared folder
    // too, so it survives across sessions/devices.
    if (S.currentDraftId || draftId) {
      await saveDraftToFolder(true);
    }

    return emailMeta;
  } catch (err) {
    console.error("Email save failed:", err);
    return null;
  }
}

/* ═══════════════ HELPERS ═══════════════ */
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}

// Resolves one of the app's theme CSS custom properties to its current
// (light or dark) computed color, for use inside SVG chart markup — SVG
// presentation attributes (stroke=/fill=) are built as plain strings here
// rather than through the stylesheet cascade, so they need the actual
// resolved color rather than a var() reference.
function themeColor(varName, fallback) {
  try {
    const v = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    return v || fallback;
  } catch { return fallback; }
}

// Escape a value for safe insertion into Word XML text content
function escXml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Parse a free-text "value" field (e.g. "EUR 23.250,00", "USD 4717.00")
// into a { currency, amount } pair so the dashboard can chart / sum it.
// Handles both European (period=thousands, comma=decimal) and US
// (comma=thousands, period=decimal) number formats heuristically.
function parseValue(str) {
  const s = String(str || "").trim();
  if (!s) return { currency: "", amount: 0 };
  const curMatch = s.match(/[A-Za-z]{2,4}/);
  const currency = curMatch ? curMatch[0].toUpperCase() : "";
  let numPart = s.replace(/[A-Za-z]/g, "").trim();
  numPart = numPart.replace(/[^0-9.,\-]/g, "");
  if (!numPart) return { currency, amount: 0 };
  const lastComma = numPart.lastIndexOf(",");
  const lastDot = numPart.lastIndexOf(".");
  let normalized;
  if (lastComma > -1 && lastDot > -1) {
    // Both present: whichever comes last is the decimal separator.
    if (lastComma > lastDot) {
      normalized = numPart.replace(/\./g, "").replace(",", ".");
    } else {
      normalized = numPart.replace(/,/g, "");
    }
  } else if (lastComma > -1) {
    // Only comma present: decimal if exactly 2 digits follow the last one.
    const digitsAfter = numPart.length - lastComma - 1;
    normalized = digitsAfter === 2 ? numPart.replace(",", ".") : numPart.replace(/,/g, "");
  } else if (lastDot > -1) {
    const digitsAfter = numPart.length - lastDot - 1;
    normalized = digitsAfter === 2 ? numPart : numPart.replace(/\./g, "");
  } else {
    normalized = numPart;
  }
  const amount = parseFloat(normalized);
  return { currency, amount: isNaN(amount) ? 0 : amount };
}

// Reads the leading number out of a Machine Parts quantity string. Handles
// clean values ("4", "2 pcs") as well as historical rows saved before the PI
// table extractor's vendor-bleed fix (e.g. "1 Adafruit", "2 URS") — those
// still had the number right at the start, just with stray text tacked on.
function parseQty(str) {
  const m = String(str || "").match(/[\d,.]+/);
  if (!m) return 1; // no readable number — still counts as one request
  const num = parseFloat(m[0].replace(/,/g, ""));
  return isNaN(num) || num <= 0 ? 1 : num;
}
// Same idea, but for display — returns just the clean leading number instead
// of a numeric total ("1 Adafruit" -> "1"), falling back to the raw string
// if nothing numeric could be found at all (so nothing just disappears).
function cleanQtyDisplay(str) {
  const s = String(str || "").trim();
  if (!s) return "";
  const m = s.match(/^([\d.,]+)/);
  return m ? m[1] : s;
}

// ── Material/part name-merge map ──────────────────────────────────────────
// PI/BOM extraction is best-effort, so the same physical item can end up
// recorded under slightly different description text across letters (a
// later invoice phrases it differently, a wrap gets joined differently,
// etc.) and won't auto-combine. This lets an admin manually tell the app
// "these all mean the same material/part", persisted locally so it applies
// from then on. Keyed by kind ("raw" or "mp") plus a normalized (trimmed/
// lowercased/whitespace-collapsed) version of the raw description -> the
// chosen canonical display name. The kind prefix keeps a Raw Material merge
// from ever bleeding into a same-named Machine Parts entry or vice versa.
const MATERIAL_MERGE_MAP_KEY = "morison_material_merge_map_v1";
function normalizePartKey(s) {
  return String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
}
function loadMergeMap() {
  try { return JSON.parse(localStorage.getItem(MATERIAL_MERGE_MAP_KEY) || "{}"); } catch { return {}; }
}
function saveMergeMap(map) {
  try { localStorage.setItem(MATERIAL_MERGE_MAP_KEY, JSON.stringify(map)); } catch { /* ignore quota/availability errors */ }
}
// Resolves a raw extracted description to its display name, applying any
// manual merge the admin has set up for it. `kind` should be "raw" (Raw
// Materials) or "mp" (Machine Parts).
function canonicalPartName(rawDesc, mergeMap, kind) {
  const key = (kind || "mp") + "::" + normalizePartKey(rawDesc);
  const mapped = mergeMap[key];
  return (mapped && mapped.trim()) || String(rawDesc || "").trim() || "Unspecified";
}
// Builds the merge-map key for a given kind + name (used when writing new
// merges, so the writer and reader always agree on the key shape).
function mergeMapKey(name, kind) {
  return (kind || "mp") + "::" + normalizePartKey(name);
}

// Format a currency-totals map back into a short display string,
// e.g. { USD: 1200, EUR: 50 } -> "USD 1,200 + EUR 50"
function fmtCurrencyTotals(totals) {
  const entries = Object.entries(totals).filter(([, v]) => v > 0);
  if (entries.length === 0) return "0";
  return entries
    .sort((a, b) => b[1] - a[1])
    .map(([cur, amt]) => `${cur ? cur + " " : ""}${amt.toLocaleString(undefined, { maximumFractionDigits: 0 })}`)
    .join(" + ");
}

// Same as fmtCurrencyTotals, but appends the LKR-converted value in
// brackets for every non-LKR amount, e.g. "USD 1,200 (LKR 392,400) + EUR 50 (LKR 16,350)".
// Falls back to "(rate unavailable)" if there's no live rate cached for that currency.
function fmtCurrencyTotalsWithLKR(totals, rates) {
  const entries = Object.entries(totals).filter(([, v]) => v > 0);
  if (entries.length === 0) return "0";
  return entries
    .sort((a, b) => b[1] - a[1])
    .map(([cur, amt]) => {
      const base = `${cur ? cur + " " : ""}${amt.toLocaleString(undefined, { maximumFractionDigits: 0 })}`;
      if (!cur || cur === "LKR") return base;
      const lkr = convertToLKR(amt, cur, rates);
      return lkr != null ? `${base} (LKR ${lkr.toLocaleString(undefined, { maximumFractionDigits: 0 })})` : `${base} (rate unavailable)`;
    })
    .join(" + ");
}

// Sum the parsed values of a set of rows, keeping per-currency subtotals
// (since invoices may be in different currencies) alongside a combined total.
function sumCurrencyTotals(rows) {
  const totals = {};
  let sum = 0;
  rows.forEach(r => {
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    totals[currency] = (totals[currency] || 0) + amount;
    sum += amount;
  });
  return { totals, sum };
}

// ── Live foreign-exchange rates for the dashboard's currency-converted
// "Total value" card. Rates are fetched with LKR as the base (free,
// no-API-key endpoint) and cached in localStorage so the dashboard renders
// instantly from the last-known rates, then refreshes in the background
// once per hour (or on demand) so figures stay current without hammering
// the API on every render.
//
// Several independent free, no-API-key providers are tried in order — if
// one is unreachable (network/firewall/DNS issues, or simply down) the next
// is tried before giving up, since "Failed to fetch" in the browser almost
// always means the request never reached the server at all (no internet, a
// blocked/unreachable host, or a browser extension blocking it) rather than
// anything wrong with the app itself. The jsDelivr / Cloudflare Pages
// mirrors are tried first since those CDN domains are widely used for other
// things too (npm packages, JS libraries) and so are far less likely to be
// blocked by a restrictive network than a niche "exchange rate" domain —
// the open.er-api.com / exchangerate-api.com pair are the same underlying
// service, so if one of those is blocked the other usually is too.
const FX_SUPPORTED_CURRENCIES = ["USD", "EUR", "GBP", "INR", "SGD"];
const FX_CACHE_KEY = "dash_fx_rates_lkr_v1";
const FX_REFRESH_INTERVAL_MS = 60 * 60 * 1000; // 1 hour
// If every provider is unreachable (offline, firewalled, DNS-blocked CDN —
// plausible on a customs office network), refreshFxRatesIfStale() re-renders
// the dashboard on failure too (so the "last attempt failed" status updates).
// Without a cooldown, that re-render calls refreshFxRatesIfStale() again
// immediately (nothing ever got cached, so it's always "stale"), which fails
// again, which re-renders again — an infinite loop that pegs the CPU and
// freezes the tab. This cooldown makes automatic retries wait a bit between
// attempts; the manual "Retry" button still bypasses it via force=true.
const FX_RETRY_COOLDOWN_MS = 60 * 1000; // 1 minute
const FX_ENDPOINTS = [
  "https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/lkr.min.json",
  "https://latest.currency-api.pages.dev/v1/currencies/lkr.min.json",
  "https://open.er-api.com/v6/latest/LKR",
  "https://api.exchangerate-api.com/v4/latest/LKR",
];
let _fxFetchInFlight = false;
// Transient (not persisted) status of the most recent fetch attempt, so the
// dashboard can tell the difference between "never tried yet", "succeeded",
// and "tried but couldn't reach any provider".
let _fxLastAttempt = { ok: null, error: "", at: null };

function getCachedFxRates() {
  try {
    const raw = localStorage.getItem(FX_CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.rates) return null;
    return parsed; // { rates: { USD, EUR, GBP, INR, SGD }, fetchedAt }
  } catch { return null; }
}

function setCachedFxRates(rates) {
  try {
    localStorage.setItem(FX_CACHE_KEY, JSON.stringify({ rates, fetchedAt: new Date().toISOString() }));
  } catch { /* ignore quota/availability errors */ }
}

// The different providers reply with different JSON shapes:
//   open.er-api.com / exchangerate-api.com:  { result?, base?, rates: { "USD": 0.0034, ... } }
//   fawazahmed0/currency-api (jsDelivr / Pages mirrors): { date, lkr: { usd: 0.0034, ... } }
// This normalizes either into a flat { USD, EUR, GBP, INR, SGD, ... } map.
function extractRatesFromFxResponse(data) {
  if (!data || typeof data !== "object") return null;
  const upper = obj => {
    const out = {};
    Object.entries(obj).forEach(([k, v]) => { out[String(k).toUpperCase()] = v; });
    return out;
  };
  if (data.rates && typeof data.rates === "object") return upper(data.rates);
  const nestedKey = Object.keys(data).find(k => k !== "date" && typeof data[k] === "object" && data[k] !== null);
  if (nestedKey) return upper(data[nestedKey]);
  return null;
}

async function fetchFxRatesFromEndpoint(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const rates = extractRatesFromFxResponse(data);
  if (!rates) throw new Error("Unexpected response shape");
  return rates;
}

// Refresh rates if the cache is missing/stale (or `force` is passed, for the
// manual retry button), trying each provider in turn. Re-renders the
// dashboard afterwards (success or failure) so it's never left showing a
// stale "Fetching…" message — only if the dashboard is still the active view.
async function refreshFxRatesIfStale(force = false) {
  const cached = getCachedFxRates();
  const isStale = !cached || (Date.now() - new Date(cached.fetchedAt).getTime()) > FX_REFRESH_INTERVAL_MS;
  const recentlyAttempted = !force && _fxLastAttempt.at && (Date.now() - new Date(_fxLastAttempt.at).getTime()) < FX_RETRY_COOLDOWN_MS;
  if ((!isStale && !force) || _fxFetchInFlight || recentlyAttempted) return;
  _fxFetchInFlight = true;

  let lastErr = null;
  for (const url of FX_ENDPOINTS) {
    try {
      const rawRates = await fetchFxRatesFromEndpoint(url);
      const rates = {};
      FX_SUPPORTED_CURRENCIES.forEach(cur => { if (rawRates[cur] != null) rates[cur] = rawRates[cur]; });
      if (Object.keys(rates).length) {
        setCachedFxRates(rates);
        _fxLastAttempt = { ok: true, error: "", at: new Date().toISOString() };
        _fxFetchInFlight = false;
        if (S.view === "dashboard") renderDashboard();
        return;
      }
      lastErr = new Error("Response had no usable currency rates");
    } catch (err) {
      lastErr = err;
      console.warn(`Live FX rate fetch failed for ${url} (will try the next provider if any):`, err);
    }
  }

  _fxFetchInFlight = false;
  _fxLastAttempt = { ok: false, error: lastErr ? String(lastErr.message || lastErr) : "Unknown error", at: new Date().toISOString() };
  console.error(
    "Live FX rate fetch failed for all providers (will keep using cached/last-known rates if any). " +
    "This is almost always a connectivity issue — no internet access, the exchange-rate service being unreachable " +
    "from this network/firewall, or a browser extension blocking the request — rather than a bug in the app. " +
    "Last error: " + lastErr
  );
  if (S.view === "dashboard") renderDashboard();
}

// rates: { USD, EUR, GBP, INR, SGD } = how many units of that currency equal 1 LKR.
function convertToLKR(amount, currency, rates) {
  if (!currency || currency === "LKR") return amount;
  if (!rates || rates[currency] == null) return null; // unsupported / rate unavailable
  return amount / rates[currency];
}
function convertFromLKR(amountLKR, targetCurrency, rates) {
  if (!targetCurrency || targetCurrency === "LKR") return amountLKR;
  if (!rates || rates[targetCurrency] == null) return null;
  return amountLKR * rates[targetCurrency];
}

// Sums a set of rows' values (in whatever currency each was written in),
// converting everything to LKR then to the requested target currency.
// Amounts in a currency we don't have a rate for are kept separately
// (`unconvertible`) rather than silently dropped or mis-added.
function computeConvertedTotal(rows, targetCurrency, rates) {
  let totalLKR = 0;
  const unconvertible = {};
  rows.forEach(r => {
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    const lkr = convertToLKR(amount, currency, rates);
    if (lkr == null) { unconvertible[currency || "?"] = (unconvertible[currency || "?"] || 0) + amount; return; }
    totalLKR += lkr;
  });
  const converted = convertFromLKR(totalLKR, targetCurrency, rates);
  return { converted, totalLKR, unconvertible };
}

function fmtMoney(amount, currency) {
  if (amount == null || isNaN(amount)) return "—";
  const decimals = Math.abs(amount) >= 1000 ? 0 : 2;
  return `${currency} ${amount.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}`;
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  if (isNaN(d)) return iso;
  const n = d.getDate();
  const sfx = (n >= 11 && n <= 13) ? "th" : ["th","st","nd","rd","th"][Math.min(n%10,4)];
  return `${n}${sfx} ${d.toLocaleString("en-US",{month:"long"})} ${d.getFullYear()}`;
}

// Combines the invoice number and date into the single phrase that appears
// in the letter and the doc, e.g. "2591 on 31st March 2026".
function buildInvoiceRef(vals) {
  const num  = (vals.invoiceNumber || "").trim();
  const date = fmtDate(vals.invoiceDate);
  if (num && date) return `${num} on ${date}`;
  if (num) return num;
  if (date) return `on ${date}`;
  return "";
}

function supplierFirst(text) {
  if (!text) return "";
  return text.trim().split(/[\s,\-]/)[0] || "";
}

function descWords(text, n=3) {
  if (!text) return "Document";
  const words = text.trim().replace(/[0-9.,]+\s*(kg|g|ml|l|nos|pcs|units?)\b/gi,"").trim().split(/\s+/).filter(Boolean);
  return words.slice(0, n).join(" ") || "Document";
}

// The Raw Material letter used to have one free-text "Raw material &
// quantity" field (e.g. "Liquid extract cocilana B.P   150,000 kg"); it's
// now two separate fields (name + quantity) for easier data entry, but the
// letter text, the Word template's {{RAW_MATERIAL}} token, the change log,
// and the Materials & Parts page all still expect that one combined string
// — recombining it here in one place keeps every one of those working
// exactly as before, just fed from two inputs instead of one.
function combinedRawMaterial(v) {
  const name = String(v.rawMaterialName || "").trim();
  const qty = String(v.rawMaterialQty || "").trim();
  if (name && qty) return `${name}   ${qty}`;
  return name || qty || "";
}

// A draft saved before the "Raw material & quantity" field was split in two
// only has the old combined `rawMaterial` value. Rather than showing blank
// Raw material / Quantity fields (and silently losing what was typed), split
// it back apart on load: first try the original placeholder's own
// convention of separating name and quantity with 2+ spaces/a tab, then fall
// back to matching a trailing "<number> <unit>" quantity at the end of the
// string. If neither is confident, the whole thing becomes the name rather
// than disappearing.
function migrateOldRawMaterialField(vals) {
  if (!vals.rawMaterial || vals.rawMaterialName || vals.rawMaterialQty) return;
  const raw = String(vals.rawMaterial).trim();
  if (!raw) return;
  const parts = raw.split(/\s{2,}|\t+/).map(s => s.trim()).filter(Boolean);
  if (parts.length >= 2) {
    vals.rawMaterialQty = parts.pop();
    vals.rawMaterialName = parts.join("  ");
    return;
  }
  const m = raw.match(/^(.*?)[\s,]+([\d.,]+\s*(?:kg|g|ml|l|nos?|pcs?|units?)?)$/i);
  if (m && m[1].trim()) {
    vals.rawMaterialName = m[1].trim();
    vals.rawMaterialQty = m[2].trim();
  } else {
    vals.rawMaterialName = raw; // couldn't confidently split — keep everything rather than lose it
  }
}

function buildDocName(type, vals) {
  const appNo = vals.appNo || "App-No";
  const levy  = type.levyCodes.join(" ");
  // Category: a fixed phrase for types like Machine Parts (always "Machine Parts",
  // regardless of what's in the PI invoice text), or derived from a typed field
  // for types like Raw Material (the actual product/material name).
  const category = type.docNameFixedCategory
    || descWords(type.docNameDescField ? vals[type.docNameDescField] : S.piGoodsDesc, 3);
  const supplier = supplierFirst(vals.importedFrom);
  // Pattern: "AppNo Levy - Category - Supplier" — no underscores, hyphen before
  // both the category and the imported-from supplier name.
  const parts = [
    [appNo, levy].filter(Boolean).join(" "),
    category,
    supplier,
  ].filter(Boolean);
  return parts.join(" - ").replace(/_/g, " ");
}

function fileSafe(name) {
  return name.replace(/[\\/:*?"<>|]/g, "-");
}

/* ═══════════════ PDF.js CONFIG ═══════════════ */
if (typeof pdfjsLib !== "undefined") {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
}

/* ═══════════════ PI PDF AUTO-CROP ═══════════════ */
/* Pulls a short description out of the first line item in the goods table,
   e.g. "SS column packed with octadecylsilyl..." -> "SS column packed".
   This mirrors how Type A's doc name comes from its raw-material text field,
   but for Type B it's read directly from the uploaded PI instead of typed. */
// Best-effort extraction of every item row from the goods table (not just
// the first item) — description + quantity, for the "Requested Materials
// and Parts" page. Real invoices vary a lot in layout, so this is a
// starting point to check against the original PDF / cropped table image
// (visible in the Supplier PI tab), not a guaranteed-accurate parse.
//
// Approach: quantity cells are almost always single-line, while a
// description often wraps across 2-3 lines plus metadata lines
// ("Batch:", "MFGR:", etc). So each quantity line is treated as the anchor
// for one item row, and every description line between one quantity's Y
// position and the next is merged into that row's description. If no
// quantity column can be found at all, falls back to one row per visual
// description line (least accurate, but still something to review).
function extractGoodsTableRows(items, viewport, tableTopY, tableBottomY) {
  try {
    const norm = items
      .map(it => ({ str: it.str, x: it.transform[4], y: viewport.height - it.transform[5] }))
      .filter(it => it.y > tableTopY && it.y < tableBottomY && it.str.trim());
    if (!norm.length) return [];

    const descHeader = norm.find(it => {
      const s = it.str.trim().toLowerCase();
      return s === "description of goods" || s === "description";
    });
    if (!descHeader) return [];
    const headerY = descHeader.y;

    // Read every header cell on this row (not just Description/Quantity),
    // sorted left-to-right, so each column's real width can be derived from
    // its actual neighbors — e.g. if the layout is Qty | Vendor | Part No. |
    // Description | ..., the Quantity column's right edge is wherever
    // Vendor starts, not some fixed guess that ends up bleeding into it
    // (previously this caused "1 Adafruit" instead of just "1").
    const headerRow = norm
      .filter(it => Math.abs(it.y - headerY) < 6)
      .sort((a, b) => a.x - b.x);
    const colBounds = headerRow.map((h, i) => ({
      text: h.str.trim().toLowerCase(),
      left: h.x - 5,
      right: (i + 1 < headerRow.length ? headerRow[i + 1].x : Infinity) - 5,
    }));

    const descCol = colBounds.find(c => c.text === "description of goods" || c.text === "description");
    const qtyCol = colBounds.find(c => c.text === "quantity" || c.text === "qty" || c.text.startsWith("qty"));
    if (!descCol) return [];

    const groupLines = arr => {
      const sorted = [...arr].sort((a, b) => (a.y - b.y) || (a.x - b.x));
      const lines = []; let cur = [], curY = null;
      for (const it of sorted) {
        if (curY === null || Math.abs(it.y - curY) < 4) { cur.push(it); curY = curY === null ? it.y : curY; }
        else { lines.push(cur); cur = [it]; curY = it.y; }
      }
      if (cur.length) lines.push(cur);
      return lines.map(line => ({ y: line[0].y, text: line.map(w => w.str.trim()).join(" ") }));
    };

    const descLines = groupLines(norm.filter(it => it.y > headerY + 5 && it.x >= descCol.left && it.x < descCol.right));
    if (!descLines.length) return [];

    let rowAnchors = null;
    if (qtyCol) {
      const qtyLines = groupLines(norm.filter(it => it.y > headerY + 5 && it.x >= qtyCol.left && it.x < qtyCol.right));
      // A genuine quantity cell is a number, optionally followed by a real
      // unit word (pcs, nos, set, kg, etc.) — not "1 Adafruit" or "2 URS".
      // A plain "any word up to 4 letters" rule used to let short vendor
      // abbreviations through (URS, IBM, TDK...) since they happen to be
      // ≤4 characters; a whitelist closes that off entirely.
      const UNIT_WORDS = /^(pcs?|units?|nos?|ea|each|sets?|box(es)?|pairs?|rolls?|sheets?|meters?|metres?|m|cm|mm|kg|g|gm|gms|kgs|l|ltr|ltrs|ml)$/i;
      rowAnchors = qtyLines
        .filter(l => {
          const t = l.text.trim();
          const m = t.match(/^([\d.,]+)\s*([a-zA-Z]*)$/);
          if (!m) return false;
          const suffix = m[2];
          return !suffix || UNIT_WORDS.test(suffix);
        })
        .map(l => ({ y: l.y, quantity: l.text.trim() }));
    }

    const rows = [];
    if (rowAnchors && rowAnchors.length) {
      rowAnchors.forEach((anchor, i) => {
        const nextY = i + 1 < rowAnchors.length ? rowAnchors[i + 1].y : Infinity;
        const description = descLines
          .filter(l => l.y >= anchor.y - 6 && l.y < nextY - 2)
          .map(l => l.text).join(" ")
          .replace(/-\s+/g, "")
          .trim();
        if (description) rows.push({ description, quantity: anchor.quantity });
      });
    } else {
      // No quantity column detected — least reliable case; one row per line.
      descLines.forEach(l => rows.push({ description: l.text, quantity: "" }));
    }
    return rows.slice(0, 50); // sanity cap
  } catch (err) {
    console.error("extractGoodsTableRows failed:", err);
    return [];
  }
}

function extractFirstGoodsDescription(items, viewport, tableTopY, tableBottomY) {
  try {
    const norm = items.map(it => ({
      str: it.str, x: it.transform[4], y: viewport.height - it.transform[5]
    }));

    // Anchor on the "Description" column header specifically, so we can skip
    // past it and read only the data row(s) below — not the header itself.
    const descHeader = norm.find(it => {
      const s = it.str.trim().toLowerCase();
      return s === "description of goods" || s === "description";
    });
    if (!descHeader) return "";

    const headerY = descHeader.y;
    const descColX = descHeader.x;
    // Find the next column's left edge on the same header row, to bound the
    // right edge of the description column (so we don't pull in HSN/Qty text).
    const nextColX = norm
      .filter(it => Math.abs(it.y - headerY) < 6 && it.x > descColX + 20)
      .reduce((min, it) => Math.min(min, it.x), Infinity);
    const rightBound = isFinite(nextColX) ? nextColX - 5 : Infinity;

    // Collect every text item inside the description column, below the header.
    const colItems = norm
      .filter(it => it.y > headerY + 5 && it.x >= descColX - 5 && it.x < rightBound && it.str.trim())
      .sort((a, b) => (a.y - b.y) || (a.x - b.x));
    if (!colItems.length) return "";

    // Group into visual lines (items within ~4pt of each other vertically).
    const lines = [];
    let current = [], currentY = null;
    for (const it of colItems) {
      if (currentY === null || Math.abs(it.y - currentY) < 4) {
        current.push(it); currentY = currentY === null ? it.y : currentY;
      } else {
        lines.push(current); current = [it]; currentY = it.y;
      }
    }
    if (current.length) lines.push(current);

    // The product name often wraps across the first 1-2 lines (e.g. a
    // hyphenated break). Join the first two lines, strip wrap-hyphens, then
    // stop before any "Batch:", "MFGR:", etc. metadata that follows on its
    // own line within the same cell.
    const joined = lines.slice(0, 2)
      .map(line => line.map(w => w.str.trim()).join(" "))
      .join(" ")
      .replace(/-\s+/g, "")
      .replace(/-(?=[A-Z])/g, "");

    const words = joined
      .split(/\s+/)
      .filter(w => w && !/^[\d.,%$:]+$/.test(w));

    return words.slice(0, 4).join(" ");
  } catch {
    return "";
  }
}

// Generalized fallback table detector: works for any tabular PDF content,
// not just invoices with "Description of Goods / HSN / Quantity" headers.
// Groups text fragments into rows by y-position, finds the longest run of
// consecutive rows that each have several distinct columns (a strong signal
// of tabular data vs. prose), and trims rows whose column count deviates
// from the run's typical column count (filters out incidental nearby lines
// that happen to also have several text fragments).
function detectTableRegionGeneralized(items, viewport) {
  const frags = items
    .map(it => ({ x: it.transform[4], y: viewport.height - it.transform[5], text: it.str.trim() }))
    .filter(f => f.text);
  frags.sort((a, b) => (a.y - b.y) || (a.x - b.x));

  const rows = [];
  let current = [], currentY = null;
  for (const f of frags) {
    if (currentY === null || Math.abs(f.y - currentY) < 3) {
      current.push(f);
      currentY = currentY === null ? f.y : currentY;
    } else {
      rows.push(current);
      current = [f];
      currentY = f.y;
    }
  }
  if (current.length) rows.push(current);

  const rowInfo = rows.map(r => ({
    y0: Math.min(...r.map(f => f.y)),
    y1: Math.max(...r.map(f => f.y)) + 10, // approximate line height
    nItems: r.length,
  }));
  rowInfo.forEach(r => { r.isRow = r.nItems >= 3; });

  const runs = [];
  let currentRun = [];
  for (const r of rowInfo) {
    if (r.isRow) currentRun.push(r);
    else { if (currentRun.length) runs.push(currentRun); currentRun = []; }
  }
  if (currentRun.length) runs.push(currentRun);

  let bestRun = runs.reduce((best, run) => run.length > best.length ? run : best, []);
  if (bestRun.length) {
    const counts = {};
    bestRun.forEach(r => { counts[r.nItems] = (counts[r.nItems] || 0) + 1; });
    const modeCount = +Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
    while (bestRun.length && Math.abs(bestRun[0].nItems - modeCount) > 2) bestRun.shift();
    while (bestRun.length && Math.abs(bestRun[bestRun.length-1].nItems - modeCount) > 2) bestRun.pop();
  }

  // Require a reasonably substantial table (at least 4 rows) to trust this
  // fallback — a couple of incidentally aligned lines elsewhere on the page
  // shouldn't be mistaken for the goods table.
  if (bestRun.length < 4) return null;
  return { top: bestRun[0].y0, bottom: bestRun[bestRun.length - 1].y1 };
}

async function processPI(file) {
  S.piStatus = "loading";
  S.piImageDataUrl = null;
  S.piImageBytes = null;
  S.piGoodsDesc = "";
  S.piSaveStatus = null;
  updatePIZone();

  // Do this FIRST, before any PDF parsing/rendering below — it needs to run
  // while the drop/file-select event's user activation is still fresh, or
  // the browser will silently refuse to prompt for folder permission later.
  const piPermStatus = await ensureSupplierPiPermissionUpfront();

  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.0 });
    const textContent = await page.getTextContent();
    const items = textContent.items;

    let tableTopY = null, tableBottomY = null, headerBaselineY = null;

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const str = item.str.trim();
      if (str === "Description" || str === "Description of Goods") {
        const headerY = viewport.height - item.transform[5];
        const nearby = items.filter(it => {
          const y = viewport.height - it.transform[5];
          return Math.abs(y - headerY) < 12 && (it.str.includes("HSN") || it.str.includes("Quantity") || it.str.includes("Sl"));
        });
        if (nearby.length >= 1) {
          headerBaselineY = headerY;
          break;
        }
      }
    }

    if (headerBaselineY !== null) {
      // Find the table's actual drawn top border line rather than estimating
      // from font metrics: scan the page's drawn path geometry for the
      // topmost point in a window just above the header text. This is exact
      // regardless of font size/invoice layout, since it reads the real
      // border instead of guessing where it probably is.
      try {
        const opList = await page.getOperatorList();
        const OPS = pdfjsLib.OPS;
        let topBorderY = null;
        for (let i = 0; i < opList.fnArray.length; i++) {
          if (opList.fnArray[i] === OPS.constructPath) {
            const coords = opList.argsArray[i][1];
            for (let j = 1; j < coords.length; j += 2) {
              const screenY = viewport.height - coords[j];
              if (screenY > headerBaselineY - 30 && screenY < headerBaselineY + 5) {
                if (topBorderY === null || screenY < topBorderY) topBorderY = screenY;
              }
            }
          }
        }
        tableTopY = topBorderY !== null ? topBorderY : headerBaselineY - 9;
      } catch {
        // If operator-list parsing fails for any reason, fall back to a
        // simple estimate rather than leaving tableTopY unset.
        tableTopY = headerBaselineY - 9;
      }
    }

    if (tableTopY !== null) {
      const totalCandidates = items
        .map(it => ({ str: it.str.trim(), y: viewport.height - it.transform[5] }))
        .filter(it => it.str === "Total" && it.y > tableTopY + 20);
      if (totalCandidates.length > 0) tableBottomY = totalCandidates[0].y + 20;
    }

    // If the known Indian-invoice column headers ("Description of Goods",
    // "HSN", "Quantity") weren't found at all — e.g. a BOM, packing list, or
    // any other tabular PDF with different column names — fall back to
    // generic structural table detection instead of guessing a fixed
    // fraction of the page (which is correct for almost no real document).
    if (tableTopY === null) {
      const generalized = detectTableRegionGeneralized(items, viewport);
      if (generalized) {
        tableTopY = generalized.top - 8;   // small margin above the header row
        tableBottomY = generalized.bottom + 8; // small margin below the last row
      }
    }

    if (tableTopY === null) tableTopY = viewport.height * 0.34;
    if (tableBottomY === null) tableBottomY = viewport.height * 0.73;

    // Auto-derive a short goods description for the doc name, the same way
    // Type A derives it from the typed raw-material field — except here we
    // pull it straight from the first line item of the uploaded PI table,
    // so nothing needs to be typed manually.
    S.piGoodsDesc = extractFirstGoodsDescription(items, viewport, tableTopY, tableBottomY);

    // Also extract every item row (not just the first) for the "Requested
    // Materials and Parts" page. This is a best-effort read of the table —
    // real invoices vary a lot in layout, so treat it as a starting point to
    // check against the original PDF/cropped table image, not gospel.
    S.piTableRows = extractGoodsTableRows(items, viewport, tableTopY, tableBottomY);

    const SCALE = 2.5;
    const vp2 = page.getViewport({ scale: SCALE });
    const cropTop    = Math.max(0, Math.floor(tableTopY * SCALE));
    const cropBottom = Math.min(vp2.height, Math.ceil(tableBottomY * SCALE));
    const cropLeft   = Math.floor(0.03 * vp2.width);
    const cropRight  = Math.floor(0.97 * vp2.width);

    const offscreen = document.createElement("canvas");
    offscreen.width = vp2.width; offscreen.height = vp2.height;
    const ctx = offscreen.getContext("2d");
    await page.render({ canvasContext: ctx, viewport: vp2 }).promise;

    // A small white margin at the top guarantees the header row/border line
    // always has clean breathing room, even if the text-based detection
    // above lands the crop a few points tighter than ideal on a given
    // invoice's layout.
    const TOP_PADDING = Math.round(10 * SCALE);

    const cropWidth  = cropRight - cropLeft;
    const cropHeight = cropBottom - cropTop;

    const canvas = document.createElement("canvas");
    canvas.width = cropWidth;
    canvas.height = cropHeight + TOP_PADDING;
    const ctx2 = canvas.getContext("2d");
    ctx2.fillStyle = "#ffffff";
    ctx2.fillRect(0, 0, canvas.width, canvas.height);
    ctx2.drawImage(offscreen, cropLeft, cropTop, cropWidth, cropHeight, 0, TOP_PADDING, cropWidth, cropHeight);

    S.piImageDataUrl = canvas.toDataURL("image/png");
    S.piAspectRatio = canvas.height / canvas.width;
    S.piImageBytes = await dataUrlToUint8Array(S.piImageDataUrl);
    S.piStatus = "done";

    // Save the original PDF (separate from the cropped table image embedded
    // in the letter) to the Supplier PI folder, linked to whatever draft is
    // currently open — this is what the Supplier PI tab lists.
    const piResult = await saveSupplierPiFile(file);
    if (piResult.ok) {
      S.currentPiMeta = piResult.meta;
      S.piSaveStatus = "saved";
    } else {
      S.currentPiMeta = null;
      S.piSaveStatus = piResult.reason;
    }
  } catch (err) {
    console.error("PI processing error:", err);
    S.piStatus = "error";
  }

  updatePIZone();
  updatePaper();
  updateDocName();
  scheduleDraftSave(); // save draft when PI image changes too
}

function dataUrlToUint8Array(dataUrl) {
  return fetch(dataUrl).then(r => r.arrayBuffer()).then(buf => new Uint8Array(buf));
}

          ${admin ? `<button id="tbLog" class="${S.view==="log"?"active":""}">Change log</button>` : ""}
          ${admin ? `<button id="tbDash" class="${S.view==="dashboard"?"active":""}">Dashboard</button>` : ""}
          ${admin ? `<button id="tbMaterials" class="${S.view==="materials"?"active":""}">Materials &amp; Parts</button>` : ""}

        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <button id="btnHelp" title="How to use this page" aria-label="How to use this page" style="font-size:14px;font-weight:700;padding:6px 11px;border-radius:7px;border:1px solid var(--border-soft);background:var(--paper);color:var(--muted);cursor:pointer;line-height:1;">

            : `<button id="btnModeToggle" style="font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid var(--border-soft);background:var(--paper);color:var(--muted);cursor:pointer;white-space:nowrap;">

               </button>`}

  document.getElementById("tbGen").onclick = () => { S.view = "generate"; render(); };
  document.getElementById("tbDrafts").onclick = () => { S.view = "drafts"; render(); };
  document.getElementById("tbEmails").onclick = () => { S.view = "emails"; render(); };
  document.getElementById("tbSupplierPi").onclick = () => { S.view = "supplierpi"; render(); };
  if (admin) {
    document.getElementById("tbLog").onclick = () => { S.view = "log"; render(); };
    document.getElementById("tbDash").onclick = () => { S.view = "dashboard"; render(); };
    document.getElementById("tbMaterials").onclick = () => { S.view = "materials"; render(); };
    document.getElementById("tbSettings").onclick = () => { S.view = "settings"; render(); };
    startDraftPolling();
  } else {
    stopDraftPolling();
  }

  document.getElementById("btnHelp").onclick = () => showHelpModal(S.view, admin);

  // Theme toggle and admin-mode/lock buttons are present on every page.
  const themeBtn = document.getElementById("btnThemeToggle");
  if (themeBtn) themeBtn.onclick = () => {
    const next = loadTheme() === "dark" ? "light" : "dark";
    saveTheme(next);
    applyTheme(next);
    render();
  };

  const modeToggleBtn = document.getElementById("btnModeToggle");
  if (modeToggleBtn) modeToggleBtn.onclick = async () => {
    if (adminSession) {
      // Session is alive — just flip the view without touching the session.
      const switchingToAdmin = S.viewingAsUser; // true means we're about to flip to admin
      S.viewingAsUser = !S.viewingAsUser;
      // If switching to user view while on an admin-only tab, go to generate.
      if (S.viewingAsUser && (S.view === "log" || S.view === "dashboard" || S.view === "settings" || S.view === "materials")) {
        S.view = "generate";
      }
      if (switchingToAdmin) await autoLoadOldestPendingDraftForAdmin();
      render();
    } else {
      // Not unlocked yet — ask for the PIN. After 5 wrong attempts, hand off
      // to the recovery-code flow (the global admin PIN) instead of just
      // letting the person keep guessing indefinitely.
      const ok = await showPinModal("Admin mode", "Enter your 4-digit PIN to unlock.", 4, checkPin, {
        maxAttempts: 5,
        onMaxAttempts: async () => {
          alert("Too many incorrect attempts. Enter the recovery code to reset the PIN.");
          const globalOk = await showPinModal("Verify identity", "Enter the recovery code.", 6, checkGlobalPin);
          if (!globalOk) return false;
          const newPinSet = await showSetPinModal();
          // A new regular PIN was just set — unlock immediately with it
          // rather than making the admin re-enter it from scratch.
          return !!newPinSet;
        },
      });
      if (ok) {
        unlockAdmin();
        S.viewingAsUser = false;
        // Land straight on the earliest pending draft (the one User1 filled
        // in longest ago) rather than a blank form, so admin always starts
        // at the front of the queue on sign-in.
        await autoLoadOldestPendingDraftForAdmin();
        render();
      }
    }
  };

  // Explicit lock button (only visible in admin session) — clears the session
  // so the next unlock requires the PIN again.
  const lockBtn = document.getElementById("btnLockSession");
  if (lockBtn) lockBtn.onclick = () => {
    if (confirm("Lock admin mode? You'll need to enter the PIN again to unlock.")) {
      lockAdmin();
      S.viewingAsUser = false;
      S.view = "generate";
      render();
    }
  };

  // Subtle PIN reset: press and hold the mode button for ~1.5s to reveal
  // the reset flow. Deliberately not a visible button or menu item — this
  // is a recovery path, not a feature to advertise.
  (function wireSubtleReset() {
    const btn = document.getElementById("btnModeToggle");
    if (!btn) return;
    let pressTimer = null;
    const start = () => { pressTimer = setTimeout(() => showResetPinFlow(), 1500); };
    const cancel = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
    btn.addEventListener("mousedown", start);
    btn.addEventListener("touchstart", start);
    ["mouseup","mouseleave","touchend","touchcancel"].forEach(evt => btn.addEventListener(evt, cancel));
  })();

  if (S.view === "generate") renderGenerate();
  else if (S.view === "drafts") renderDrafts();
  else if (S.view === "emails") renderEmails();
  else if (S.view === "supplierpi") renderSupplierPI();
  else if (S.view === "log") renderLog();
  else if (S.view === "dashboard") renderDashboard();
  else if (S.view === "materials") renderMaterials();
  else if (S.view === "settings") renderSettings();
}

          <button class="btn-ghost" id="btnPrevDraft" style="font-size:12.5px;" ${navIndex > 0 ? "" : "disabled"}>◀ Previous</button>

  });

  type.fields.forEach(f => {
    // Admin only handles the Application No.; every other fillable field
    // belongs to User1. Hide everything else from admin, and hide appNo
    // from User1, so each side only sees the field(s) relevant to them.
    if (admin && f.k !== "appNo") return;
    if (!admin && f.k === "appNo") return;

    // First time this field is touched in a fresh draft, seed it with its
    // default (currently only the recipient address uses this) so behavior
    // doesn't regress now that what used to be fixed letter text is editable.
    if (f.default && (S.vals[f.k] === undefined || S.vals[f.k] === null)) {
      S.vals[f.k] = f.default;
    }

    const wrap = document.createElement("div");
    wrap.className = "field";
    const isTextarea = f.type === "textarea";
    wrap.innerHTML = `
      <label for="f_${f.k}">${esc(f.label)}${f.k === "appNo" ? ' <span style="font-size:10px;background:#7a3b2e;color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;vertical-align:middle;">Admin only</span>' : ""}</label>
      ${isTextarea
        ? `<textarea id="f_${f.k}" rows="4" placeholder="${esc(f.ph || "")}" ${locked ? "disabled" : ""}>${esc(S.vals[f.k] || "")}</textarea>`
        : `<input type="${f.type === "date" ? "date" : "text"}" id="f_${f.k}"
            placeholder="${esc(f.ph || "")}" value="${esc(S.vals[f.k] || "")}" ${locked ? "disabled" : ""}>`}
    `;
    // The recipient address (e.g. "Additional Secretory (Medical Services),
    // Ministry of Health, ...") used to be fixed text baked into the letter;
    // it's now a normal, freely-editable field on both letter types, with a
    // small saved-address book so User1 can pick a previously-used one
    // (a different ministry/department, say) instead of retyping it, and
    // remove ones no longer needed.
    if (f.k === "recipientAddress") {
      const savedAddresses = loadSavedAddresses();
      const pickerWrap = document.createElement("div");
      pickerWrap.style.cssText = "margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start;";
      const btnLabel = savedAddresses.length
        ? `${savedAddresses.length} saved address${savedAddresses.length === 1 ? "" : "es"} — select or delete`
        : "No saved addresses yet";
      pickerWrap.innerHTML = `
        <div style="position:relative;flex:1 1 200px;min-width:180px;">
          <button type="button" id="addressPickerBtn" class="dash-filter" style="width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:6px;" ${locked || !savedAddresses.length ? "disabled" : ""}>
            <span>${esc(btnLabel)}</span><span aria-hidden="true" style="opacity:0.6;">▾</span>
          </button>
          <div id="addressPickerPanel" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:20;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-md);max-height:220px;overflow-y:auto;padding:4px;">
            ${savedAddresses.map((a, i) => `
              <div class="addr-row" data-addr-idx="${i}" style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;cursor:pointer;" title="${esc(a)}">
                <span class="addr-row-text" style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(a.split("\n")[0])}</span>
                <button type="button" class="addr-remove" data-addr-idx="${i}" title="Remove from saved addresses" ${locked ? "disabled" : ""} style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:12px;padding:3px 5px;line-height:1;flex-shrink:0;">✕</button>

      wrap.appendChild(pickerWrap);
    }
    document.getElementById("formFields").appendChild(wrap);
    wrap.querySelector("input, textarea").addEventListener("input", e => {

  // Wire up the recipient-address saved-address book: a custom dropdown

  // panel — rather than a native <select> with a separate row of removable
  // chips underneath. Addresses are stored as full multi-line strings,
  // selected/removed by index rather than value so two different addresses
  // that happen to share a first line can't collide.
  const addressPickerBtn = document.getElementById("addressPickerBtn");
  const addressPickerPanel = document.getElementById("addressPickerPanel");
  if (addressPickerBtn && addressPickerPanel) {
    addressPickerBtn.onclick = e => {

        scheduleDraftSave();

    document.addEventListener("click", () => { addressPickerPanel.style.display = "none"; }, { once: true });
  }
  const saveAddrBtn = document.getElementById("btnSaveAddress");
  if (saveAddrBtn) saveAddrBtn.onclick = () => {
    const inputEl = document.getElementById("f_recipientAddress");
    if (!inputEl || !inputEl.value.trim()) return;
    addSavedAddress(inputEl.value);
    renderGenerate(); // refresh the dropdown list to include it
  };
  document.querySelectorAll(".addr-remove").forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation(); // don't also trigger the row's select-this-address click
      const list = loadSavedAddresses();
      list.splice(+btn.dataset.addrIdx, 1);
      saveSavedAddresses(list);
      renderGenerate();
    };
  });

  if (type.hasPI && !admin) {
    updatePIZone();
    const zone = document.getElementById("piZone");
    if (locked) {
      zone.style.opacity = "0.5";
      zone.style.pointerEvents = "none";
      document.removeEventListener("paste", handlePaste);
    } else {
      zone.addEventListener("dragover", e => { e.preventDefault(); zone.style.borderColor = "var(--accent)"; });
      zone.addEventListener("dragleave", () => { zone.style.borderColor = ""; });
      zone.addEventListener("drop", e => {
        e.preventDefault(); zone.style.borderColor = "";
        const file = Array.from(e.dataTransfer.files).find(f => f.type === "application/pdf" || f.name.endsWith(".pdf"));
        const img  = Array.from(e.dataTransfer.files).find(f => f.type.startsWith("image/"));
        if (file) processPI(file);
        else if (img) loadImageFile(img);
      });
      document.removeEventListener("paste", handlePaste);
      document.addEventListener("paste", handlePaste);
    }
  } else {
    document.removeEventListener("paste", handlePaste);
  }

  if (admin) {
    document.getElementById("btnPdf").onclick  = handlePDF;
    document.getElementById("btnWord").onclick = handleWord;
  } else {
    // User1 Save Draft button — saves immediately, then locks the form
    // (greyed out, read-only) so it isn't changed by mistake after saving.
    const saveDraftBtn = document.getElementById("btnSaveDraft");
    if (saveDraftBtn && !locked) saveDraftBtn.onclick = async () => {
      saveDraftBtn.disabled = true;
      saveDraftBtn.textContent = "Saving…";
      const id = await saveDraftToFolder(true);
      if (id) {
        setStatus("Draft saved — admin will see your latest changes.", "ok");
        updateDraftTabBadge();
        S.formLocked = true;
        renderGenerate();
      } else {
        saveDraftBtn.disabled = false;
        saveDraftBtn.textContent = "💾 Save Draft";
        setStatus("Could not save draft — make sure the shared folder is connected.", "warn");
      }
    };

    // New Draft button at top
    const newDraftTopBtn = document.getElementById("btnNewDraftTop");
    if (newDraftTopBtn) newDraftTopBtn.onclick = () => {
      S.currentDraftId = null;
      S.currentDraftEmails = [];
      S.vals = {};
      S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = ""; S.piTableRows = []; S.currentPiMeta = null;
      S.formLocked = false;
      document.removeEventListener("paste", handlePaste);
      render();
    };
  }

  // Edit form button — present (both roles) whenever the letter is locked; unlocks it.
  const editFormBtn = document.getElementById("btnEditForm");
  if (editFormBtn) editFormBtn.onclick = () => {
    S.formLocked = false;
    renderGenerate();
  };

  // Previous / Next — cycle through pending drafts of the current letter
  // type, available to both admin and User1.
  const prevDraftBtn = document.getElementById("btnPrevDraft");
  if (prevDraftBtn) prevDraftBtn.onclick = async () => {
    const target = navList[navIndex - 1];
    if (!target) return;
    prevDraftBtn.disabled = true;
    const ok = await loadDraftIntoForm(target.id, { preserveLock: true });
    if (!ok) alert("Could not load that draft — the file may have been moved or deleted.");
    renderGenerate();
  };
  const nextDraftBtn = document.getElementById("btnNextDraft");
  if (nextDraftBtn) nextDraftBtn.onclick = async () => {
    const target = navList[navIndex === -1 ? 0 : navIndex + 1];
    if (!target) return;
    nextDraftBtn.disabled = true;
    const ok = await loadDraftIntoForm(target.id, { preserveLock: true });
    if (!ok) alert("Could not load that draft — the file may have been moved or deleted.");
    renderGenerate();
  };

  // Batch "Save All" — admin only.
  const saveAllWordBtn = document.getElementById("btnSaveAllWord");
  if (saveAllWordBtn) saveAllWordBtn.onclick = () => saveAllDraftsAs("docx");
  const saveAllPdfBtn = document.getElementById("btnSaveAllPdf");
  if (saveAllPdfBtn) saveAllPdfBtn.onclick = () => saveAllDraftsAs("pdf");

  const resetBtn = document.getElementById("btnReset");
  if (resetBtn) resetBtn.onclick = () => {
    S.vals = {}; S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = ""; S.piTableRows = []; S.currentPiMeta = null;
    S.currentDraftId = null; S.currentDraftEmails = [];
    S.formLocked = false;
    document.removeEventListener("paste", handlePaste);
    render();
  };

  updateDocName();
  updatePaper();
}

function handlePaste(e) {
  if (S.view !== "generate" || !T().hasPI) return;
  const items = (e.clipboardData || window.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith("image/")) { loadImageFile(item.getAsFile()); break; }
  }
}

function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = async ev => {
    S.piImageDataUrl = ev.target.result;
    S.piImageBytes = await dataUrlToUint8Array(S.piImageDataUrl);
    const img = new Image();
    img.onload = () => { S.piAspectRatio = img.height / img.width; updatePaper(); };
    img.src = S.piImageDataUrl;
    S.piStatus = "done";
    updatePIZone();
    updatePaper();
    scheduleDraftSave();
  };
  reader.readAsDataURL(file);
}

function fv(val, ph) {
  if (val && val.trim()) return esc(val);
  return `<span class="ph">${esc(ph || "[fill in]")}</span>`;
}
// Same idea as fv(), but for the (multi-line) recipient address — renders
// each non-empty line on its own line via <br>, since Word's paragraph-per-
// line address block is mirrored here as one block with line breaks.
function fvAddress(val, ph) {
  const lines = String(val || "").split("\n").map(s => s.trim()).filter(Boolean);
  if (!lines.length) return `<span class="ph">${esc(ph || "[fill in]")}</span>`;
  return lines.map(esc).join("<br>");
}
