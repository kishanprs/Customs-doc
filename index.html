<style>
:root {
  --ink: #1a1a18;
  --muted: #6b6b63;
  --line: #dedad0;
  --paper: #ffffff;
  --bg: #eeeae0;
  --accent: #7a3b2e;
  --accent-hover: #622f25;
  --accent-soft: #f3e9e5;
  --red: #c82020;
  --ok: #2d6636;
  --ok-bg: #e8f3ea;
  --warn: #8a5c10;
  --warn-bg: #fdf3e0;
  /* Secondary surface tones — soft panels-on-a-panel (docname preview, PI
     drop-zone footer, table stripes) and their hover state. Previously
     hardcoded as one-off hex values throughout the stylesheet, which is why
     they didn't adapt to dark mode; centralizing them here means dark mode
     only has to override the variable once. */
  --surface-alt: #f3f1ea;
  --surface-hover: #efece2;
  --border-soft: #cac6ba;
  --tabbar-bg: #e0dcd2;
  --row-mp-bg: #fdf3e0;
  --row-mp-bg-alt: #fbecd0;
  --row-mp-hover: #f8e4ba;
  --chip-bg: #f2f0e8;
  --highlight-bg: #fdf3d0;
  --stat-tint-neutral: #f3f1ea;
  --stat-tint-red: #fdf6f2;
  --stat-tint-green: #eef7ee;
  --shadow-sm: 0 1px 2px rgba(20,16,10,0.05), 0 1px 1px rgba(20,16,10,0.04);
  --shadow-md: 0 6px 20px -6px rgba(20,16,10,0.16);
  --shadow-lg: 0 16px 40px -12px rgba(20,16,10,0.28);
  --radius: 10px;
  --serif: Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--ink); font-family: var(--sans); min-height: 100vh; transition: background 0.15s ease, color 0.15s ease; }

/* ── Dark theme ──────────────────────────────────────────────────────────
   Overriding the same custom properties the whole app already uses for
   color (--ink/--muted/--line/--paper/--bg/--accent/etc.) re-skins the vast
   majority of the UI automatically. The generated letter preview
   (.letter-paper) deliberately stays white in both themes — it represents
   an actual printed document, the same way word processors keep the page
   white even in a dark UI. A handful of one-off inline styles elsewhere in
   the app hardcode a literal white background or light border instead of
   using the shared variables; the attribute-selector rules below catch the
   common ones so this doesn't require touching every template literal. */
html[data-theme="dark"] {
  --ink: #ece7de;
  --muted: #a49c8d;
  --line: #3c392f;
  --paper: #242018;
  --bg: #17140f;
  --accent: #d98a76;
  --accent-hover: #e3a08f;
  --accent-soft: #3a271f;
  --red: #e2665f;
  --ok: #6cc98a;
  --ok-bg: #17301d;
  --warn: #e0ab5c;
  --warn-bg: #3a2c10;
  --surface-alt: #2b271d;
  --surface-hover: #332e22;
  --border-soft: #4a4638;
  --tabbar-bg: #201d16;
  --row-mp-bg: #3a2c10;
  --row-mp-bg-alt: #34280e;
  --row-mp-hover: #46370f;
  --chip-bg: #332f24;
  --highlight-bg: #4a3c10;
  --stat-tint-neutral: #2b271d;
  --stat-tint-red: #33241d;
  --stat-tint-green: #1a2e1e;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
  --shadow-md: 0 6px 20px -6px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 44px -14px rgba(0,0,0,0.65);
}
/* A handful of one-off inline styles elsewhere in the app (mostly modals and
   dashboard cards built as raw HTML strings, rather than through the shared
   CSS classes above) hardcode a literal white background or light border
   instead of using the shared variables. These attribute-selector rules
   catch the common patterns so those don't require hunting down every
   template literal individually. */
html[data-theme="dark"] [style*="background:#fff"],
html[data-theme="dark"] [style*="background: #fff"],
html[data-theme="dark"] [style*="background:white"] {
  background: var(--paper) !important;
}
html[data-theme="dark"] [style*="border:1px solid #cac6ba"],
html[data-theme="dark"] [style*="border: 1px solid #cac6ba"] {
  border-color: var(--border-soft) !important;
}
html[data-theme="dark"] .letter-paper,
html[data-theme="dark"] .letter-paper * { background: #fff !important; color: #1a1a18 !important; }
html[data-theme="dark"] .letter-paper .pi-image { border-color: #aaa !important; }

.app { max-width: 1360px; margin: 0 auto; padding: 26px 24px 80px; }

header {
  display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  margin-bottom: 26px; padding-bottom: 18px; border-bottom: 1px solid var(--line);
  position: relative;
}
header::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent 55%);
  opacity: 0.55;
}
header .logo-mark { filter: drop-shadow(0 2px 5px rgba(122,59,46,0.35)); }
header h1 {
  font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
  font-weight: 900;
  font-size: 27px;
  letter-spacing: -0.5px;
  text-transform: uppercase;
  line-height: 1.05;
  color: var(--ink);
}
header .sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; }

.tabbar { display: flex; background: var(--tabbar-bg); padding: 4px; border-radius: 10px; gap: 4px; }
.tabbar button { background: transparent; border: none; padding: 7px 18px; border-radius: 8px; font-size: 13.5px; font-weight: 600; color: var(--muted); cursor: pointer; transition: background .15s ease, color .15s ease; }
.tabbar button:hover:not(.active) { color: var(--ink); }
.tabbar button.active { background: var(--paper); color: var(--ink); box-shadow: var(--shadow-sm); }

.layout { display: grid; grid-template-columns: 440px 1fr; gap: 22px; align-items: start; }
@media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }

.panel { background: var(--paper); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.panel-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--line); }

.field { margin-bottom: 13px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
input[type=text], input[type=date], select, textarea {
  width: 100%; padding: 9px 10px; border: 1px solid var(--border-soft); border-radius: 7px;
  font-size: 13.5px; font-family: var(--sans); background: var(--paper); color: var(--ink);
  transition: border-color .15s ease, box-shadow .15s ease;
}
textarea { resize: vertical; min-height: 52px; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
::placeholder { color: var(--muted); opacity: 0.8; }
input:disabled, select:disabled, textarea:disabled {
  background: var(--surface-alt); color: var(--muted); cursor: not-allowed; -webkit-text-fill-color: var(--muted);
}
/* Dark-mode-safe calendar icon on <input type=date> — the browser's default
   icon is a dark glyph meant for light backgrounds and disappears against a
   dark field. */
html[data-theme="dark"] input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.85); }

.typepicker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.typecard { border: 2px solid var(--line); border-radius: 9px; padding: 13px; cursor: pointer; background: var(--paper); box-shadow: var(--shadow-sm); transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease; }
.typecard:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.typecard.active { border-color: var(--accent); background: var(--accent-soft); }
.typecard h3 { font-size: 13.5px; font-weight: 700; margin-bottom: 3px; color: var(--ink); }
.typecard p { font-size: 11.5px; color: var(--muted); line-height: 1.4; }

.pi-zone { border: 2px dashed var(--border-soft); border-radius: 8px; padding: 0; background: var(--surface-alt); overflow: hidden; transition: border-color .15s ease; }
.pi-zone-inner { padding: 18px; text-align: center; }
.pi-zone-inner .icon { font-size: 26px; margin-bottom: 6px; opacity: 0.5; }
.pi-zone-inner p { font-size: 13px; color: var(--muted); line-height: 1.5; }
.pi-zone-inner .small { font-size: 11.5px; margin-top: 4px; }
.pi-zone.has-preview { border-style: solid; border-color: var(--line); }
.pi-progress { font-size: 12px; color: var(--muted); padding: 10px 14px; text-align: center; }
.pi-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 8px 10px; border-top: 1px solid var(--line); background: var(--surface-alt); }
.pi-actions button { font-size: 11.5px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border-soft); background: var(--paper); cursor: pointer; color: var(--ink); transition: background .15s ease; }
.pi-actions button:hover { background: var(--surface-hover); }

.btnrow { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; align-items: center; }
.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 11px 18px; font-size: 13.5px; font-weight: 700; cursor: pointer; box-shadow: var(--shadow-sm); transition: background .15s ease, box-shadow .15s ease, transform .1s ease; }
.btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-md); }
.btn-primary:active { transform: translateY(1px); }
.btn-secondary { background: var(--paper); color: var(--ink); border: 1px solid var(--border-soft); border-radius: 8px; padding: 11px 18px; font-size: 13.5px; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-sm); transition: background .15s ease, box-shadow .15s ease; }
.btn-secondary:hover { background: var(--surface-hover); box-shadow: var(--shadow-md); }
.btn-ghost { background: transparent; border: none; color: var(--muted); font-size: 13px; padding: 8px 6px; cursor: pointer; text-decoration: underline; transition: color .15s ease; }
.btn-ghost:hover { color: var(--ink); }
button:disabled { opacity: 0.42; cursor: not-allowed; }

.status { font-size: 12.5px; padding: 9px 12px; border-radius: 7px; margin-top: 10px; line-height: 1.5; }
.status.ok { background: var(--ok-bg); color: var(--ok); }
.status.warn { background: var(--warn-bg); color: var(--warn); }

.docname-preview { background: var(--surface-alt); border-radius: 7px; padding: 9px 11px; font-size: 12px; color: var(--muted); margin-top: 4px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.docname-preview strong { color: var(--ink); }

/* ── Letter preview: this MUST visually match the real printed letter.
     Filled-in values render in plain ink color, same weight as surrounding
     text — NOT red, NOT bold. Red/bold styling in the source template is
     only a "this is where edits go" marker for a blank template; once a
     value is filled in it reads as normal letter prose. ── */
.preview-wrap { background: #ccc8bb; border-radius: var(--radius); padding: 22px; display: flex; justify-content: center; }
.letter-paper {
  width: 100%; max-width: 680px; min-height: 880px;
  background: #fff; padding: 60px 52px;
  box-shadow: var(--shadow-lg);
  font-family: var(--serif); font-size: 13.5px; line-height: 1.58; color: #111;
  position: relative;
}
.letter-paper .ldate { margin-bottom: 28px; }
.letter-paper .appno-box {
  position: absolute; top: 60px; right: 52px;
  border: 1.5px solid #111; padding: 14px 20px; text-align: center; font-weight: 700; font-size: 16px;
  min-width: 195px; min-height: 70px; display: flex; flex-direction: column; justify-content: center;
}
.letter-paper .addr { margin-bottom: 16px; font-size: 13.5px; }
.letter-paper .salut { margin: 16px 0 12px; }
.letter-paper .heading { font-weight: 700; text-decoration: underline; text-align: justify; margin: 14px 0 16px; font-size: 13.5px; }
.letter-paper p { text-align: justify; margin: 12px 0; font-size: 13.5px; }
.letter-paper .bld { font-weight: 700; }
.letter-paper ol { margin: 10px 0 10px 20px; }
.letter-paper ol li { margin: 3px 0; }
.letter-paper .sig { margin-top: 44px; }
.letter-paper .sig p { margin: 2px 0; text-align: left; }
.letter-paper .pi-image { max-width: 100%; border: 1px solid #aaa; margin: 12px 0 6px; display: block; }
/* Placeholder text (not yet filled) is the ONLY thing styled distinctly,
   so you can see at a glance what still needs filling. */
.ph { color: #c82020; font-style: italic; font-weight: 400; }

.logwrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
table.log { width: 100%; border-collapse: collapse; font-size: 12px; }
table.log th, table.log td { border: 1px solid var(--line); padding: 7px 9px; text-align: left; white-space: nowrap; }
table.log th { background: #2c4a63; color: #ffffff; font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; }
table.log tbody tr:nth-child(even) { background: var(--surface-alt); }
table.log tbody tr.row-machine-parts { background: var(--row-mp-bg); }
table.log tbody tr.row-machine-parts:nth-child(even) { background: var(--row-mp-bg-alt); }
table.log tbody tr:hover { background: var(--surface-hover); }
table.log tbody tr.row-machine-parts:hover { background: var(--row-mp-hover); }
.log-empty { padding: 48px 20px; text-align: center; color: var(--muted); font-size: 13.5px; }

/* Print stylesheet: activated only while body has .print-letter-only,
   which handlePDF() in app.js applies right before calling window.print()
   (after hiding every other element on the page individually, so nothing
   else can bleed into a second printed page). The letter itself is
   restyled here with print-appropriate pt-based sizing, independent of
   its on-screen px-based preview styling. */
@media print {
  @page {
    size: A4;
    margin: 0.55in 0.7in 0.6in 0.7in;
    /* Defining any margin box tells Chrome/Edge (131+) to suppress their
       own default header/footer (date, title, URL) entirely and use ours
       instead. Empty boxes = blank; only the page number is shown. */
    @top-left { content: ""; }
    @top-center { content: ""; }
    @top-right { content: ""; }
    @bottom-left { content: ""; }
    @bottom-center { content: counter(page); font-size: 9pt; color: #555; font-family: Arial, sans-serif; }
    @bottom-right { content: ""; }
  }
  body.print-letter-only header,
  body.print-letter-only .panel,
  body.print-letter-only .no-print-banner,
  body.print-letter-only .tabbar { display: none !important; }
  body.print-letter-only .app { padding: 0; max-width: none; }
  body.print-letter-only .layout { display: block; }
  body.print-letter-only { background: #fff; }
  body.print-letter-only .letter-paper {
    width: auto; max-width: none; min-height: 0;
    background: #fff; padding: 0; box-shadow: none;
    font-size: 12pt; line-height: 1.5; color: #111;
  }
  body.print-letter-only .letter-paper .ldate { margin-bottom: 22pt; }
  body.print-letter-only .letter-paper .appno-box {
    position: static; float: right;
    border: 1.5pt solid #111; padding: 14pt 20pt; text-align: center;
    font-weight: 700; font-size: 16pt; min-width: 195pt; min-height: 70pt;
    display: flex; flex-direction: column; justify-content: center;
    margin-left: 14pt; margin-bottom: 10pt;
  }
  body.print-letter-only .letter-paper .addr { margin-bottom: 14pt; font-size: 12pt; }
  body.print-letter-only .letter-paper .salut { clear: both; margin: 14pt 0 10pt; }
  body.print-letter-only .letter-paper .heading { font-weight: 700; text-decoration: underline; text-align: justify; margin: 12pt 0 14pt; font-size: 12pt; }
  body.print-letter-only .letter-paper p { text-align: justify; margin: 10pt 0; font-size: 12pt; }
  body.print-letter-only .letter-paper .bld { font-weight: 700; }
  body.print-letter-only .letter-paper ol { margin: 8pt 0 8pt 20pt; }
  body.print-letter-only .letter-paper ol li { margin: 3pt 0; }
  body.print-letter-only .letter-paper .sig { margin-top: 36pt; }
  body.print-letter-only .letter-paper .sig p { margin: 2pt 0; text-align: left; }
  body.print-letter-only .letter-paper .pi-image { max-width: 100%; max-height: 3.4in; object-fit: contain; border: 1pt solid #999; margin: 10pt 0 6pt; display: block; }
  body.print-letter-only .preview-wrap { background: #fff; padding: 0; display: block; }
}

/* Dashboard */
.dash-stat { background: var(--paper); border:1px solid var(--line); border-radius:10px; padding:16px 20px; text-align:center; box-shadow: var(--shadow-sm); }
.dash-stat .num { font-size:32px; font-weight:700; font-family:var(--serif); color:var(--accent); }
.dash-stat .lbl { font-size:12px; color:var(--muted); margin-top:2px; }
.dash-filter { padding:7px 10px; border-radius:7px; border:1px solid var(--border-soft); font-size:12.5px; background: var(--paper); color:var(--ink); transition: border-color .15s ease; }
.dash-filter:focus { outline:2px solid var(--accent); outline-offset:1px; }

/* Saved-address picker — a custom dropdown (rather than a native <select>)
   so each row can carry its own inline delete (✕) button next to the
   address text, instead of listing removable chips separately below. */
#addressPickerBtn { cursor:pointer; }
#addressPickerBtn:disabled { cursor:not-allowed; opacity:0.6; }
.addr-row { transition: background-color .12s ease; }
.addr-row:hover, .addr-row:focus-within { background: var(--surface-hover); }
.addr-row .addr-remove { border-radius:5px; }
.addr-row .addr-remove:hover { color: var(--red); background: var(--stat-tint-red); }

/* Help modal ("?" button) content */
#helpModalBody p { margin: 0 0 10px; }
#helpModalBody ul { margin: 0 0 4px; padding-left: 20px; }
#helpModalBody li { margin-bottom: 8px; }
#helpModalBody li:last-child { margin-bottom: 0; }

/* Dashboard chart hover accents — donut arcs, column bars, and line-chart
   dots/paths all get a visible "pop" on hover, with the underlying <title>
   providing the browser's native tooltip. */
.donut-arc { cursor:pointer; transition: stroke-width 0.12s ease, filter 0.12s ease; }
.donut-arc:hover { stroke-width: 20; filter: brightness(1.12) drop-shadow(0 0 2px rgba(0,0,0,0.25)); }
.col-bar { cursor:pointer; transition: filter 0.12s ease, transform 0.12s ease; transform-box: fill-box; }
.col-bar:hover { filter: brightness(1.15); }
.line-chart-svg .line-series path { transition: stroke-width 0.12s ease, opacity 0.12s ease; }
.line-chart-svg .line-series:hover path { stroke-width: 3.4; }
.line-chart-svg:has(.line-series-a:hover) .line-series-b { opacity: 0.4; }
.line-chart-svg:has(.line-series-b:hover) .line-series-a { opacity: 0.4; }
.line-dot { cursor:pointer; transition: r 0.12s ease; }
.line-dot:hover { r: 5.2; }

/* PIN modal keypad button hover */
</style>
<style>
[data-key]:hover { background: var(--surface-hover) !important; }
.pin-dot { width:13px; height:13px; border-radius:50%; border:2px solid var(--border-soft); background: var(--surface-alt); transition: background .15s ease, border-color .15s ease; }
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
</style>

<body>
<div class="app" id="appRoot"></div>

<script id="app-script">
/* ═══════════════════════════════════════════
   EMBEDDED WORD TEMPLATES (base64-encoded real .docx files)
   These are the ACTUAL original Word documents with {{PLACEHOLDER}}

/* ═══════════════ PIN / ADMIN MODE ═══════════════
   Two-tier PIN system:
   - Regular admin PIN: unlocks admin mode day to day. Pre-seeded to a
     default on first use, and can be changed afterward.
   - Recovery (global) PIN: resets the regular PIN if it's forgotten. Also
     pre-seeded to a default on first use, and can (and should) be changed
     from Settings, same as the regular PIN — it never unlocks admin mode
     by itself, only the "verify identity" step of the reset flow.
   Both PINs are stored only as a SHA-256 hex hash in localStorage (never
   plain text, and never as a source constant — see the comment above
   GLOBAL_PIN_HASH_KEY for why). Once unlocked, the admin session is held
   in sessionStorage so it persists across page refreshes within the same
   tab, but not across new windows/tabs — User1 opening a fresh tab always
   starts in User1 mode. */

async function hashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode("morison_pin_salt:" + pin));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

function isAdminMode() {
  return sessionStorage.getItem(ADMIN_SESSION_KEY) === "unlocked";
}

// Whether the UI should currently behave as admin — true admin session AND
// not previewing the user view. Every admin-only UI/behavior check in the
// app should use this (not isAdminMode() directly), otherwise "Switch to
// user view" only changes the header/tabs while the rest of the page still
// renders as admin.
function isEffectiveAdmin() {
  return isAdminMode() && !S.viewingAsUser;
}

// Ensure the regular admin PIN is seeded. If the PIN_SEED_VERSION marker
// doesn't match the current version, the PIN is (re)set to the default —
// this handles both first-time use and forced resets when deploying a new
// app version (bump PIN_SEED_VERSION to trigger a reset on all devices).
async function ensurePinSeeded() {
  const seededVersion = localStorage.getItem("morison_pin_seed_ver");
  if (seededVersion !== PIN_SEED_VERSION) {
    localStorage.setItem(PIN_HASH_KEY, await hashPin(DEFAULT_ADMIN_PIN));
    localStorage.setItem("morison_pin_seed_ver", PIN_SEED_VERSION);
  }
  // Seed the recovery code once, the first time the app ever runs on this
  // device — but never overwrite one an admin has already chosen (unlike
  // the regular PIN above, which is intentionally reset on every version
  // bump; the recovery code has no such "force reset" mechanism, since
  // resetting it is exactly what it exists to let you do for the other PIN).
  if (!localStorage.getItem(GLOBAL_PIN_HASH_KEY)) {
    localStorage.setItem(GLOBAL_PIN_HASH_KEY, await hashPin(DEFAULT_GLOBAL_PIN));
  }
}

async function checkPin(pin) {
  await ensurePinSeeded();
  const stored = localStorage.getItem(PIN_HASH_KEY);
  return (await hashPin(pin)) === stored;
}

async function checkGlobalPin(pin) {
  await ensurePinSeeded();
  const stored = localStorage.getItem(GLOBAL_PIN_HASH_KEY);
  if (!stored) return false; // recovery code not configured on this device
  return (await hashPin(pin)) === stored;
}

// Whether the recovery code on this device is still the out-of-the-box
// default — used to nag the admin to change it, the same way an unchanged
// regular PIN is nagged about (see the Settings panel).
async function isGlobalPinDefault() {
  await ensurePinSeeded();
  return (await hashPin(DEFAULT_GLOBAL_PIN)) === localStorage.getItem(GLOBAL_PIN_HASH_KEY);
}

async function setPin(pin) {
  localStorage.setItem(PIN_HASH_KEY, await hashPin(pin));
}

async function setGlobalPin(pin) {
  localStorage.setItem(GLOBAL_PIN_HASH_KEY, await hashPin(pin));
}

function lockAdmin() {
  sessionStorage.removeItem(ADMIN_SESSION_KEY);
}

function unlockAdmin() {
  sessionStorage.setItem(ADMIN_SESSION_KEY, "unlocked");
}

// Show the PIN entry modal. Returns a promise that resolves to true (unlocked)
// or false (cancelled / wrong PIN).
// Generalized PIN-entry modal. `length` sets how many digits are required
// (4 for the regular admin PIN, 6 for the global admin PIN); `checkFn` is
// the async function used to validate the entered PIN. `opts.maxAttempts`
// caps how many wrong entries are allowed before giving up on this modal;
// if `opts.onMaxAttempts` is given, it's called instead (e.g. to hand off
// to the recovery-code flow) and its return value becomes this promise's
// result — otherwise reaching the cap just resolves false, same as Cancel.
function showPinModal(title, subtitle, length = 4, checkFn = checkPin, opts = {}) {
  const { maxAttempts = Infinity, onMaxAttempts = null } = opts;
  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.tabIndex = -1;
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;outline:none;";
    overlay.innerHTML = `
      <div style="background:var(--paper);border-radius:14px;padding:32px 28px;min-width:300px;box-shadow:var(--shadow-lg);text-align:center;color:var(--ink);">
        <div style="font-size:28px;margin-bottom:10px;">🔒</div>
        <div style="font-family:Georgia,serif;font-size:17px;font-weight:700;margin-bottom:6px;">${esc(title)}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">${esc(subtitle)}</div>
        <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;max-width:240px;margin-left:auto;margin-right:auto;" id="pinDots">
          ${Array.from({length}).map((_,i)=>`<div id="pd${i}" class="pin-dot"></div>`).join("")}
        </div>
        <div id="pinError" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:10px;"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto 16px;">
          ${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k => k === "" ? `<div></div>` :
            `<button data-key="${k}" style="padding:14px;border-radius:8px;border:1px solid var(--border-soft);background:var(--surface-alt);color:var(--ink);font-size:18px;font-weight:600;cursor:pointer;">${k}</button>`
          ).join("")}
        </div>
        <button id="pinCancel" style="font-size:13px;color:var(--muted);border:none;background:none;cursor:pointer;text-decoration:underline;">Cancel</button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.focus();

    let entered = "";
    let busy = false; // guards against double-submit while checkFn is pending
    let wrongAttempts = 0;
    const updateDots = () => {
      for (let i = 0; i < length; i++) {
        const dot = document.getElementById(`pd${i}`);
        if (dot) dot.classList.toggle("filled", i < entered.length);
      }
    };

    const cleanup = () => {
      overlay.removeEventListener("keydown", onKeyDown);
      if (overlay.parentNode) document.body.removeChild(overlay);
    };

    const pressKey = async (k) => {
      if (busy) return;
      if (k === "⌫") {
        entered = entered.slice(0,-1);
        updateDots();
        return;
      }
      if (entered.length >= length) return;
      entered += k;
      updateDots();
      if (entered.length === length) {
        busy = true;
        const ok = await checkFn(entered);
        busy = false;
        if (ok) {
          cleanup();
          resolve(true);
        } else {
          wrongAttempts++;
          if (wrongAttempts >= maxAttempts) {
            cleanup();
            if (onMaxAttempts) {
              resolve(await onMaxAttempts());
            } else {
              resolve(false);
            }
            return;
          }
          document.getElementById("pinError").textContent = "Incorrect PIN — try again";
          entered = "";
          setTimeout(() => {
            if (document.getElementById("pinError")) document.getElementById("pinError").textContent = "";
          }, 1800);
          updateDots();
        }
      }
    };

    overlay.querySelectorAll("[data-key]").forEach(btn => {
      btn.addEventListener("click", () => pressKey(btn.dataset.key));
    });
    document.getElementById("pinCancel").onclick = () => {
      cleanup();
      resolve(false);
    };

    // Keyboard input: digits 0-9 enter a digit, Backspace deletes the last
    // one, Escape cancels. (No Enter-to-submit — entry auto-submits once
    // `length` digits are typed, matching the on-screen keypad's behavior.)
    const onKeyDown = (e) => {
      if (e.key >= "0" && e.key <= "9") {
        e.preventDefault();
        pressKey(e.key);
      } else if (e.key === "Backspace") {
        e.preventDefault();
        pressKey("⌫");
      } else if (e.key === "Escape") {
        e.preventDefault();
        cleanup();
        resolve(false);
      }
    };
    overlay.addEventListener("keydown", onKeyDown);
  });
}

// Show the "set a new PIN" modal (first-time setup or change).
// Show the "set a new PIN" modal — used both for the regular 4-digit admin
// PIN (the default) and, with different args, for the 6-digit recovery
// code via the "Change recovery code" button in Settings.
function showSetPinModal(length = 4, title = "Set admin PIN", subtitle = `Choose a ${length}-digit PIN to protect admin mode.`, saveFn = setPin) {
  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.tabIndex = -1;
    overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9999;display:flex;align-items:center;justify-content:center;outline:none;";
    overlay.innerHTML = `
      <div style="background:var(--paper);border-radius:14px;padding:32px 28px;min-width:320px;box-shadow:var(--shadow-lg);text-align:center;color:var(--ink);">
        <div style="font-size:28px;margin-bottom:10px;">🔐</div>
        <div style="font-family:Georgia,serif;font-size:17px;font-weight:700;margin-bottom:6px;">${esc(title)}</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px;" id="setPinSubtitle">${esc(subtitle)}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">This is only stored on your device — User1 won't have it.</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;max-width:260px;margin-left:auto;margin-right:auto;" id="setPinDots">
          ${Array.from({length}).map((_,i)=>`<div id="spd${i}" class="pin-dot"></div>`).join("")}
        </div>
        <div id="setPinError" style="color:var(--red);font-size:12px;min-height:16px;margin-bottom:10px;"></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto 16px;">
          ${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k => k === "" ? `<div></div>` :
            `<button data-key="${k}" style="padding:14px;border-radius:8px;border:1px solid var(--border-soft);background:var(--surface-alt);color:var(--ink);font-size:18px;font-weight:600;cursor:pointer;">${k}</button>`
          ).join("")}
        </div>
        <button id="setPinCancel" style="font-size:13px;color:var(--muted);border:none;background:none;cursor:pointer;text-decoration:underline;">Cancel</button>
      </div>`;
    document.body.appendChild(overlay);
    overlay.focus();

    let first = "", second = "", stage = "first";
    const updateDots = (entered) => {
      for (let i = 0; i < length; i++) {
        const dot = document.getElementById(`spd${i}`);
        if (dot) dot.classList.toggle("filled", i < entered.length);
      }
    };

    const cleanup = () => {
      overlay.removeEventListener("keydown", onKeyDown);
      document.body.removeChild(overlay);
    };

    const pressKey = async (k) => {
      if (stage === "first") {
        if (k === "⌫") { first = first.slice(0,-1); updateDots(first); return; }
        if (first.length >= length) return;
        first += k; updateDots(first);
        if (first.length === length) {
          stage = "confirm";
          document.getElementById("setPinSubtitle").textContent = "Confirm it.";
          document.getElementById("setPinError").textContent = "";
          updateDots("");
        }
      } else {
        if (k === "⌫") { second = second.slice(0,-1); updateDots(second); return; }
        if (second.length >= length) return;
        second += k; updateDots(second);
        if (second.length === length) {
          if (first === second) {
            await saveFn(first);
            cleanup();
            resolve(true);
          } else {
            document.getElementById("setPinError").textContent = "Didn't match — start again";
            first = ""; second = ""; stage = "first";
            document.getElementById("setPinSubtitle").textContent = subtitle;
            setTimeout(() => {
              if (document.getElementById("setPinError")) document.getElementById("setPinError").textContent = "";
            }, 1800);
            updateDots("");
          }
        }
      }
    };

    overlay.querySelectorAll("[data-key]").forEach(btn => {
      btn.addEventListener("click", () => pressKey(btn.dataset.key));
    });
    document.getElementById("setPinCancel").onclick = () => {
      cleanup();
      resolve(false);
    };

    // Keyboard input mirrors the on-screen keypad: digits 0-9, Backspace to
    // delete, Escape to cancel. Auto-advances/submits once `length` digits
    // are typed, same as tapping the keypad would.
    const onKeyDown = (e) => {
      if (e.key >= "0" && e.key <= "9") {
        e.preventDefault();
        pressKey(e.key);
      } else if (e.key === "Backspace") {
        e.preventDefault();
        pressKey("⌫");
      } else if (e.key === "Escape") {
        e.preventDefault();
        cleanup();
        resolve(false);
      }
    };
    overlay.addEventListener("keydown", onKeyDown);
  });
}

// The subtle PIN reset flow — triggered only by the long-press on the admin
// mode button, never by a visible UI element. Steps:
//   1. Ask for the 6-digit global admin PIN (wrong = silently return)
//   2. If correct, open the set-new-PIN modal to choose a fresh regular PIN
// Useful when the regular PIN is forgotten and admin mode can't be entered
// at all (Settings' own "Change PIN" button needs an active admin session,
// so it can't help in that case).
async function showResetPinFlow() {
  // Use the generalized showPinModal with length=6 and the global check fn.
  // Show a vague, low-key title so it doesn't draw attention if seen.
  const globalOk = await showPinModal("Verify identity", "Enter the recovery code.", 6, checkGlobalPin);
  if (!globalOk) return; // wrong global PIN or cancelled — do nothing, no feedback
  // Global PIN accepted: now let admin set a new regular PIN.
  const newPinSet = await showSetPinModal();
  if (newPinSet) {
    // Brief, low-key confirmation — no celebration, just a quiet acknowledgement.
    const msg = document.createElement("div");
    msg.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;font-size:12.5px;padding:8px 18px;border-radius:8px;z-index:9999;opacity:0.92;";
    msg.textContent = "PIN updated.";
    document.body.appendChild(msg);
    setTimeout(() => { if (msg.parentNode) msg.parentNode.removeChild(msg); }, 2500);
  }
}

/* ═══════════════ WORKING FOLDER (auto-save log to a real file) ═══════════════
   Uses the File System Access API (Chrome/Edge) to let the user pick a folder
   once; from then on, every generated document automatically updates a real
   "Customs Waiver Log.xlsx" file in that folder — no manual export needed.
   The folder permission handle is kept in IndexedDB so it survives reloads;
   the browser will silently re-confirm permission on first use each session.
   The same mechanism also powers a separate, append-only ARCHIVE file (see
   further below) that every generated document is added to permanently —
   including ones later removed from the working log via Delete or Clear all —
   so it can be re-imported if records are ever cleared by mistake. */
const FOLDER_DB_NAME = "morison_customs_folder_db";
const FOLDER_STORE = "handles";
const FOLDER_KEY = "workingFolder";
const ARCHIVE_FOLDER_KEY = "archiveFolder";
const ARCHIVE_LOG_KEY = "morison_customs_archive_v1";
const ARCHIVE_FILENAME = "Customs Waiver ARCHIVE - do not edit.xlsx";

// One parent folder → these auto-created/auto-linked subfolders, so admin
// only has to grant folder access once instead of connecting each
// individually. Names are descriptive so they make sense to a person
// browsing the parent folder afterward (e.g. in File Explorer or OneDrive).
const GLOBAL_SUBFOLDER_MAP = {
  [DRAFT_FOLDER_KEY]:        "Drafts",
  [EMAIL_FOLDER_KEY]:        "Requester Emails",
  [SUPPLIER_PI_FOLDER_KEY]:  "Supplier PI",
  [OUTPUT_A_FOLDER_KEY]:     "Completed Letters - Word - Raw Material",
  [OUTPUT_B_FOLDER_KEY]:     "Completed Letters - Word - Machine Parts",
  [OUTPUT_A_PDF_FOLDER_KEY]: "Completed Letters - PDF - Raw Material",
  [OUTPUT_B_PDF_FOLDER_KEY]: "Completed Letters - PDF - Machine Parts",
  [FOLDER_KEY]:              "Change Log (Excel)",
  [ARCHIVE_FOLDER_KEY]:      "Change Log Archive",
};

function supportsFileSystemAccess() {
  return typeof window.showDirectoryPicker === "function";
}

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(FOLDER_DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(FOLDER_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FOLDER_STORE, "readonly");
    const req = tx.objectStore(FOLDER_STORE).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, val) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FOLDER_STORE, "readwrite");
    tx.objectStore(FOLDER_STORE).put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbDelete(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FOLDER_STORE, "readwrite");
    tx.objectStore(FOLDER_STORE).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

const _folderHandleCache = {}; // keyed by FOLDER_KEY / ARCHIVE_FOLDER_KEY

async function getFolderHandle(key) {
  if (_folderHandleCache[key]) return _folderHandleCache[key];
  try {
    const handle = await idbGet(key);
    _folderHandleCache[key] = handle || null;
    return _folderHandleCache[key];
  } catch { return null; }
}

async function connectFolder(key, onConnectedSave) {
  if (!supportsFileSystemAccess()) {
    alert("Your browser doesn't support saving directly to a folder. Click \"Save to Excel\" again — it will download the file instead, and you can re-run it any time to get an updated copy.");
    return false;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: "readwrite" });
    await idbSet(key, handle);
    _folderHandleCache[key] = handle;
    if (onConnectedSave) await onConnectedSave();
    return true;
  } catch (err) {
    if (err.name !== "AbortError") console.error("Folder connect error:", err);
    return false;
  }
}

async function disconnectFolder(key) {
  await idbDelete(key);
  _folderHandleCache[key] = null;
}

// Global parent folder: one folder-access grant that auto-creates (or reuses,
// if already present) every subfolder the app needs, and links each one to
// its usual storage key — the same keys the individual "Connect"/"Change"
// buttons elsewhere use, so everything downstream (Generate tab banners,
// Drafts tab, Change log, dashboard popups, etc.) just works afterward with
// no other code changes needed.
function getGlobalParentFolderHandle() { return getFolderHandle(GLOBAL_PARENT_FOLDER_KEY); }

async function connectGlobalParentFolder() {
  if (!supportsFileSystemAccess()) {
    alert("Your browser doesn't support saving directly to folders (needs Chrome or Edge).");
    return { ok: false };
  }
  try {
    const parentHandle = await window.showDirectoryPicker({ mode: "readwrite" });
    const permOk = await ensureFolderPermission(parentHandle);
    if (!permOk) return { ok: false };

    await idbSet(GLOBAL_PARENT_FOLDER_KEY, parentHandle);
    _folderHandleCache[GLOBAL_PARENT_FOLDER_KEY] = parentHandle;

    const created = [];
    const failed = [];
    for (const [storageKey, folderName] of Object.entries(GLOBAL_SUBFOLDER_MAP)) {
      try {
        const subHandle = await parentHandle.getDirectoryHandle(folderName, { create: true });
        await idbSet(storageKey, subHandle);
        _folderHandleCache[storageKey] = subHandle;
        created.push(folderName);
      } catch (err) {
        console.error(`Could not create/link subfolder "${folderName}":`, err);
        failed.push(folderName);
      }
    }
    return { ok: true, parentName: parentHandle.name, created, failed };
  } catch (err) {
    if (err.name !== "AbortError") console.error("Global parent folder connect failed:", err);
    return { ok: false };
  }
}

// Archive-folder wrappers.
function getArchiveFolderHandle() { return getFolderHandle(ARCHIVE_FOLDER_KEY); }
function connectArchiveFolder() { return connectFolder(ARCHIVE_FOLDER_KEY, autoSaveArchiveToFolder); }
function disconnectArchiveFolder() { return disconnectFolder(ARCHIVE_FOLDER_KEY); }

async function ensureFolderPermission(handle) {
  const opts = { mode: "readwrite" };
  if ((await handle.queryPermission(opts)) === "granted") return true;
  if ((await handle.requestPermission(opts)) === "granted") return true;
  return false;
}

// Auto-write the current log to "Customs Waiver Log.xlsx" inside the connected
// folder. Silent no-op if no folder is connected or permission isn't available
// (the in-app log + manual Export remain the source of truth either way).
async function autoSaveLogToFolder() {
  const handle = await getWorkingFolderHandle();
  if (!handle) return;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    const rows = loadLog();
    const blob = await buildStyledXlsxBlob(rows);
    const fileHandle = await handle.getFileHandle("Customs Waiver Log.xlsx", { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
  } catch (err) {
    console.error("Auto-save to folder failed:", err);
  }
}

/* ═══════════════ ARCHIVE LOG (append-only, survives Clear all) ═══════════════
   A second, separate record of every document ever generated. Unlike the
   main working log (which the user can delete rows from, or clear entirely),
   nothing ever removes an entry from the archive through the app's UI — it
   exists purely as a safety net to recover from an accidental Clear all. */
function loadArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_LOG_KEY) || "[]"); } catch { return []; }
}
function saveArchive(rows) { localStorage.setItem(ARCHIVE_LOG_KEY, JSON.stringify(rows)); }

function appendToArchive(row) {
  const rows = loadArchive();
  rows.unshift(row);
  saveArchive(rows);
  autoSaveArchiveToFolder();
}

/* ═══════════════ MULTI-DRAFT SYSTEM ═══════════════
