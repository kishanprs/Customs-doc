/* ═══════════════ DEMAND FORECAST (dashboard) ═══════════════
   A simple trend projection — NOT a real supply-chain forecasting model —
   used to give a rough "at this rate, expect about X next month" figure
   per raw material / machine part, from the letters already on record.
   Method: bucket each item's history into calendar months (zero-filled for
   any month with no activity, between its first and last order — so a
   material that's gone quiet shows a declining trend rather than just
   vanishing), fit a straight line through those monthly totals with
   ordinary least squares, and read the line's value one month past the
   last data point. Raw Materials are tracked by monthly value (LKR,
   matching how the rest of the dashboard already measures raw-material
   demand, since summing free-text quantities across mismatched units like
   "150,000 kg" vs "40 drums" isn't reliable); Machine Parts are tracked by
   monthly quantity (matching the existing "Most popular" chart), since PI
   line-item quantities are numeric and already summed that way elsewhere.
   Items with fewer than FORECAST_MIN_MONTHS distinct active months are
   left out entirely rather than shown with a projection built on noise. */
const FORECAST_MIN_MONTHS = 3;

function monthKeyOf(dateStr) {
  return String(dateStr || "").slice(0, 7); // "YYYY-MM"
}
function nextMonthKey(mk) {
  let [y, m] = mk.split("-").map(Number);
  m++; if (m > 12) { m = 1; y++; }
  return `${y}-${String(m).padStart(2, "0")}`;
}
function monthKeyLabel(mk) {
  const [y, m] = mk.split("-").map(Number);
  if (!y || !m) return mk;
  return new Date(y, m - 1, 1).toLocaleString("en-US", { month: "short", year: "numeric" });
}

// Ordinary least-squares fit of y = intercept + slope*x, x = 0..n-1.
function linearTrendFit(values) {
  const n = values.length;
  if (n === 0) return { slope: 0, intercept: 0 };
  const xMean = (n - 1) / 2;
  const yMean = values.reduce((s, v) => s + v, 0) / n;
  let num = 0, den = 0;
  for (let i = 0; i < n; i++) {
    num += (i - xMean) * (values[i] - yMean);
    den += (i - xMean) ** 2;
  }
  const slope = den === 0 ? 0 : num / den;
  return { slope, intercept: yMean - slope * xMean };
}

// Turns a Map<"YYYY-MM", number> into a zero-filled, chronologically
// contiguous { months, values } series spanning first..last active month.
function buildMonthlySeries(monthTotals) {
  const months = [...monthTotals.keys()].sort();
  if (months.length === 0) return { months: [], values: [] };
  const [firstY, firstM] = months[0].split("-").map(Number);
  const [lastY, lastM] = months[months.length - 1].split("-").map(Number);
  const all = [];
  let y = firstY, m = firstM;
  while (y < lastY || (y === lastY && m <= lastM)) {
    all.push(`${y}-${String(m).padStart(2, "0")}`);
    m++; if (m > 12) { m = 1; y++; }
  }
  return { months: all, values: all.map(mk => monthTotals.get(mk) || 0) };
}

// Computes forecast items for one kind ("raw" or "mp") from the full,
// unfiltered log — the projection is deliberately independent of the
// dashboard's active filter bar, since narrowing to one supplier/year would
// usually leave too little history to trend on.
function computeForecastItems(allRows, kind, fxRates) {
  const mergeMap = loadMergeMap();
  const byItem = new Map(); // canon name -> Map(monthKey -> total)

  if (kind === "raw") {
    allRows.filter(r => r.letterType === "Raw Material").forEach(r => {
      const mk = monthKeyOf(r.dateGenerated);
      if (!mk) return;
      const { currency, amount } = parseValue(r.value);
      if (!amount) return;
      const lkr = convertToLKR(amount, currency, fxRates);
      if (lkr == null) return; // no live rate for this currency — leave it out rather than guess
      const canon = canonicalPartName(r.clearanceOf || r.rawMaterialName || r.rawMaterial || "Unspecified", mergeMap, "raw");
      if (!byItem.has(canon)) byItem.set(canon, new Map());
      const m = byItem.get(canon);
      m.set(mk, (m.get(mk) || 0) + lkr);
    });
  } else {
    allRows.filter(r => r.letterType === "Machine Parts").forEach(r => {
      const mk = monthKeyOf(r.dateGenerated);
      if (!mk) return;
      (r.piTableRows || []).forEach(row => {
        const canon = canonicalPartName(row.description, mergeMap, "mp");
        if (!byItem.has(canon)) byItem.set(canon, new Map());
        const m = byItem.get(canon);
        m.set(mk, (m.get(mk) || 0) + parseQty(row.quantity));
      });
    });
  }

  const items = [];
  byItem.forEach((monthTotals, canon) => {
    const { months, values } = buildMonthlySeries(monthTotals);
    if (months.length < FORECAST_MIN_MONTHS) return; // not enough history to trend on
    const { slope, intercept } = linearTrendFit(values);
    const projected = Math.max(0, intercept + slope * values.length);
    const recentSpan = values.slice(-3);
    const recentAvg = recentSpan.reduce((s, v) => s + v, 0) / recentSpan.length;
    const trendPct = recentAvg > 0 ? ((projected - recentAvg) / recentAvg) * 100 : (projected > 0 ? 100 : 0);
    items.push({
      canon, months, values, projected, recentAvg, trendPct,
      nextLabel: monthKeyLabel(nextMonthKey(months[months.length - 1])),
      direction: trendPct > 8 ? "up" : trendPct < -8 ? "down" : "flat",
    });
  });

  return items.sort((a, b) => b.projected - a.projected);
}

// A compact inline sparkline (SVG polyline) for one forecast item's monthly
// history, with the projected next point drawn as a hollow dot past the end.
function buildForecastSparkline(item, color) {
  const w = 120, h = 34, pad = 3;
  const allVals = [...item.values, item.projected];
  const maxV = Math.max(...allVals, 1);
  const n = item.values.length;
  const stepX = n > 1 ? (w - pad * 2) / n : 0;
  const yOf = v => h - pad - (v / maxV) * (h - pad * 2);
  const histPts = item.values.map((v, i) => `${pad + i * stepX},${yOf(v)}`);
  const lastX = pad + (n - 1) * stepX;
  const nextX = pad + n * stepX;
  const projPts = [`${lastX},${yOf(item.values[n - 1])}`, `${nextX},${yOf(item.projected)}`];
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:block;overflow:visible;">
    <polyline points="${histPts.join(" ")}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="${projPts.join(" ")}" fill="none" stroke="${color}" stroke-width="1.6" stroke-dasharray="3,2" stroke-linecap="round"/>
    <circle cx="${nextX}" cy="${yOf(item.projected)}" r="3" fill="var(--paper)" stroke="${color}" stroke-width="1.6"/>
  </svg>`;
}

function renderDashboard() {
  const root = document.getElementById("viewRoot");
  const allRows = loadLog();
  refreshFxRatesIfStale(); // fire-and-forget background refresh; re-renders itself when new rates land

  // ── Vivid, distinct palette for dashboard data viz (separate from the
  // app's muted working palette, since charts benefit from more contrast) ──
  const PALETTE = {
    rawMaterial: "#c0392b",   // warm red
    machineParts: "#2980b9",  // blue
    supplierColors: ["#e67e22","#16a085","#8e44ad","#f1c40f","#27ae60","#d35400","#2c3e50","#c0392b","#2980b9","#7f8c8d"],
  };

  const F = S.dashFilters || { type:"", supplier:"", year:"", month:"" };
  S.dashFilters = F;

  // Faceted filter option lists: each dropdown's choices are narrowed to
  // what's actually available given the OTHER active filters (excluding
  // itself), so picking e.g. a year updates what shows in the type/supplier
  // dropdowns instead of always listing every value regardless of context.
  // The currently-selected value is always kept in its own list even if it
  // would otherwise be excluded, so an existing selection is never silently
  // dropped out from under the person.
  function rowsMatchingExcept(exclude) {
    return allRows.filter(r => {
      if (exclude !== "type" && F.type && r.letterType !== F.type) return false;
      if (exclude !== "supplier" && F.supplier && r.importedFrom !== F.supplier) return false;
      if (exclude !== "year" && F.year && !(r.dateGenerated||"").startsWith(F.year)) return false;
      if (exclude !== "month" && F.month && !(r.dateGenerated||"").slice(0,7).endsWith(F.month)) return false;
      return true;
    });
  }
  function withCurrent(list, current) {
    return current && !list.includes(current) ? [current, ...list] : list;
  }

  const types     = withCurrent([...new Set(rowsMatchingExcept("type").map(r => r.letterType).filter(Boolean))], F.type);
  const suppliers = withCurrent([...new Set(rowsMatchingExcept("supplier").map(r => r.importedFrom).filter(Boolean))].sort(), F.supplier);
  const years     = withCurrent([...new Set(rowsMatchingExcept("year").map(r => (r.dateGenerated||"").slice(0,4)).filter(Boolean))].sort().reverse(), F.year);
  const monthsAvailable = new Set(rowsMatchingExcept("month").map(r => (r.dateGenerated||"").slice(5,7)).filter(Boolean));
  // Unfiltered year list for the independent per-chart year dropdowns below
  // (pie / raw materials / machine parts charts) — these aren't affected by
  // the global filter bar, so their own year options shouldn't be narrowed by it.
  const allYears = [...new Set(allRows.map(r => (r.dateGenerated||"").slice(0,4)).filter(Boolean))].sort().reverse();

  let rows = allRows.filter(r => {
    if (F.type && r.letterType !== F.type) return false;
    if (F.supplier && r.importedFrom !== F.supplier) return false;
    if (F.year && !(r.dateGenerated||"").startsWith(F.year)) return false;
    if (F.month && !(r.dateGenerated||"").slice(0,7).endsWith(F.month)) return false;
    return true;
  });

  const totalA = rows.filter(r => r.letterType === "Raw Material").length;
  const totalB = rows.filter(r => r.letterType === "Machine Parts").length;
  const total  = totalA + totalB;
  const distinctSuppliersFiltered = new Set(rows.map(r => r.importedFrom).filter(Boolean)).size;
  const pendingDraftsCount = loadDraftMeta().filter(d => d.status === "pending").length;

  // ── Per-chart filters (each chart/card has its own control, as requested) ──
  const CF = S.dashChartFilters || {
    period: "week", pieYear: "", rawYear: "", mpYear: "", totalLettersType: "", popularYear: "",
    dayFrom: "", dayTo: "", weekCount: 12, monthCount: 12, yearCount: 6,
  };
  S.dashChartFilters = CF;
  const dashCurrency = S.dashCurrency || "LKR";
  S.dashCurrency = dashCurrency;
  const fxCache = getCachedFxRates();
  const fxRates = fxCache ? fxCache.rates : null;

  // ── Estimated future requirements: simple trend projection per material/
  // part (see computeForecastItems for method + caveats). Independent of
  // the dashboard's filter bar — always based on the full order history. ──
  const forecastRawAll = computeForecastItems(allRows, "raw", fxRates);
  const forecastMpAll = computeForecastItems(allRows, "mp", fxRates);
  const FORECAST_SHOW = 8;
  const forecastRaw = forecastRawAll.slice(0, FORECAST_SHOW);
  const forecastMp = forecastMpAll.slice(0, FORECAST_SHOW);

  // ── Chart 1: value spent over time (2 lines), day/week/month/year ──
  const lineBaseRows = allRows.filter(r => !F.supplier || r.importedFrom === F.supplier);
  const timeBuckets = buildTimeBuckets(lineBaseRows, CF.period, {
    dayFrom: CF.dayFrom, dayTo: CF.dayTo, weekCount: CF.weekCount, monthCount: CF.monthCount, yearCount: CF.yearCount,
  });
  const lineChartHtml = buildLineChartSvg(timeBuckets, PALETTE.rawMaterial, PALETTE.machineParts);

  // ── Chart 2: most imported FROM — supplier by value, filter by year ──
  const pieRows = allRows.filter(r => !CF.pieYear || (r.dateGenerated||"").startsWith(CF.pieYear));
  const supplierValueMap = new Map();
  pieRows.forEach(r => {
    const name = (r.importedFrom || "").trim();
    if (!name) return;
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    if (!supplierValueMap.has(name)) supplierValueMap.set(name, { sum: 0, totals: {} });
    const entry = supplierValueMap.get(name);
    entry.sum += amount;
    entry.totals[currency] = (entry.totals[currency] || 0) + amount;
  });
  const sortedSupplierValues = Array.from(supplierValueMap.entries()).sort((a,b) => b[1].sum - a[1].sum);
  const topSupplierValues = sortedSupplierValues.slice(0, 6);
  const otherSupplierValueSum = sortedSupplierValues.slice(6).reduce((s,[,v]) => s+v.sum, 0);
  const pieSegments = topSupplierValues.map(([name, v], i) => ({
    value: v.sum, color: PALETTE.supplierColors[i % PALETTE.supplierColors.length], label: name, tooltip: fmtCurrencyTotalsWithLKR(v.totals, fxRates)
  }));
  if (otherSupplierValueSum > 0) pieSegments.push({ value: otherSupplierValueSum, color: "#bdc3c7", label: "Other", tooltip: otherSupplierValueSum.toLocaleString() });
  const pieTotalSum = pieSegments.reduce((s,x)=>s+x.value,0);
  const pieChartHtml = buildDonut(pieSegments, pieTotalSum ? pieTotalSum.toLocaleString(undefined,{maximumFractionDigits:0}) : "0", "value (combined)");
  const pieLegend = pieSegments.length === 0
    ? `<div style="color:var(--muted);font-size:12px;">No supplier value data yet</div>`
    : `<div style="display:flex;flex-direction:column;gap:5px;font-size:11.5px;margin-top:8px;max-height:130px;overflow-y:auto;">
        ${pieSegments.map(s => `<div title="${esc(s.tooltip)}"><span style="display:inline-block;width:10px;height:10px;background:${s.color};border-radius:50%;margin-right:6px;"></span><strong>${esc(s.tooltip)}</strong> ${esc(truncateLabel(s.label,22))}</div>`).join("")}
      </div>`;

  // ── Chart 3: most imported RAW MATERIALS by value, filter by year (Raw Material letters only) ──
  const rawRows = allRows.filter(r => r.letterType === "Raw Material" && (!CF.rawYear || (r.dateGenerated||"").startsWith(CF.rawYear)));
  const rawMaterialMap = new Map();
  rawRows.forEach(r => {
    const name = (r.clearanceOf || r.rawMaterialName || r.rawMaterial || "Unspecified").trim() || "Unspecified";
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    if (!rawMaterialMap.has(name)) rawMaterialMap.set(name, { sum: 0, totals: {} });
    const entry = rawMaterialMap.get(name);
    entry.sum += amount;
    entry.totals[currency] = (entry.totals[currency] || 0) + amount;
  });
  const sortedRawMaterials = Array.from(rawMaterialMap.entries()).sort((a,b) => b[1].sum - a[1].sum);
  const topRawMaterials = sortedRawMaterials.slice(0, 6);
  const otherRawMaterialSum = sortedRawMaterials.slice(6).reduce((s,[,v]) => s+v.sum, 0);
  const rawMaterialSegments = topRawMaterials.map(([name, v], i) => ({
    value: v.sum, color: PALETTE.supplierColors[i % PALETTE.supplierColors.length], label: name, tooltip: fmtCurrencyTotalsWithLKR(v.totals, fxRates)
  }));
  if (otherRawMaterialSum > 0) rawMaterialSegments.push({ value: otherRawMaterialSum, color: "#bdc3c7", label: "Other", tooltip: otherRawMaterialSum.toLocaleString() });
  const rawMaterialTotalSum = rawMaterialSegments.reduce((s,x)=>s+x.value,0);
  const rawMaterialChartHtml = buildDonut(rawMaterialSegments, rawMaterialTotalSum ? rawMaterialTotalSum.toLocaleString(undefined,{maximumFractionDigits:0}) : "0", "value (combined)");
  const rawMaterialLegend = rawMaterialSegments.length === 0
    ? `<div style="color:var(--muted);font-size:12px;">No Raw Material letters with a value for this year</div>`
    : `<div style="display:flex;flex-direction:column;gap:5px;font-size:11.5px;margin-top:8px;max-height:130px;overflow-y:auto;">
        ${rawMaterialSegments.map(s => `<div title="${esc(s.tooltip)}"><span style="display:inline-block;width:10px;height:10px;background:${s.color};border-radius:50%;margin-right:6px;"></span><strong>${esc(s.tooltip)}</strong> ${esc(truncateLabel(s.label,22))}</div>`).join("")}
      </div>`;

  // ── Chart 4: most imported MACHINE PARTS supplier by value, filter by year (Machine Parts letters only) ──
  const mpRows = allRows.filter(r => r.letterType === "Machine Parts" && (!CF.mpYear || (r.dateGenerated||"").startsWith(CF.mpYear)));
  const mpSupplierMap = new Map();
  mpRows.forEach(r => {
    const name = (r.importedFrom || "").trim();
    if (!name) return;
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    if (!mpSupplierMap.has(name)) mpSupplierMap.set(name, { sum: 0, totals: {} });
    const entry = mpSupplierMap.get(name);
    entry.sum += amount;
    entry.totals[currency] = (entry.totals[currency] || 0) + amount;
  });
  const sortedMpSuppliers = Array.from(mpSupplierMap.entries()).sort((a,b) => b[1].sum - a[1].sum);
  const topMpSuppliers = sortedMpSuppliers.slice(0, 6);
  const otherMpSupplierSum = sortedMpSuppliers.slice(6).reduce((s,[,v]) => s+v.sum, 0);
  const mpSupplierSegments = topMpSuppliers.map(([name, v], i) => ({
    value: v.sum, color: PALETTE.supplierColors[i % PALETTE.supplierColors.length], label: name, tooltip: fmtCurrencyTotalsWithLKR(v.totals, fxRates)
  }));
  if (otherMpSupplierSum > 0) mpSupplierSegments.push({ value: otherMpSupplierSum, color: "#bdc3c7", label: "Other", tooltip: otherMpSupplierSum.toLocaleString() });
  const mpSupplierTotalSum = mpSupplierSegments.reduce((s,x)=>s+x.value,0);
  const mpSupplierChartHtml = buildDonut(mpSupplierSegments, mpSupplierTotalSum ? mpSupplierTotalSum.toLocaleString(undefined,{maximumFractionDigits:0}) : "0", "value (combined)");
  const mpSupplierLegend = mpSupplierSegments.length === 0
    ? `<div style="color:var(--muted);font-size:12px;">No Machine Parts letters with a value for this year</div>`
    : `<div style="display:flex;flex-direction:column;gap:5px;font-size:11.5px;margin-top:8px;max-height:130px;overflow-y:auto;">
        ${mpSupplierSegments.map(s => `<div title="${esc(s.tooltip)}"><span style="display:inline-block;width:10px;height:10px;background:${s.color};border-radius:50%;margin-right:6px;"></span><strong>${esc(s.tooltip)}</strong> ${esc(truncateLabel(s.label,22))}</div>`).join("")}
      </div>`;

  // ── Chart 5: MOST POPULAR / MOST REQUESTED materials & machine parts,
  // combined — a demand-by-frequency view (not value), so a raw material
  // requested in many small letters and a machine part ordered in bulk can
  // both surface here even if their monetary value is modest. Raw Materials
  // are counted by number of letters mentioning them; Machine Parts are
  // counted by total quantity requested across every attached PI table
  // (parseQty and canonicalPartName are shared with the Materials & Parts
  // page, so a manual name-merge there is reflected here too). ──
  const popularRows = allRows.filter(r => !CF.popularYear || (r.dateGenerated||"").startsWith(CF.popularYear));
  const popularityMap = new Map();
  const partMergeMap = loadMergeMap();
  popularRows.filter(r => r.letterType === "Raw Material").forEach(r => {
    const name = canonicalPartName(r.clearanceOf || r.rawMaterialName || r.rawMaterial || "Unspecified", partMergeMap, "raw");
    const key = "raw::" + normalizePartKey(name);
    if (!popularityMap.has(key)) popularityMap.set(key, { label: name, sum: 0, kind: "Raw Material", totals: {} });
    const entry = popularityMap.get(key);
    entry.sum += 1;
    const { currency, amount } = parseValue(r.value);
    if (amount) entry.totals[currency] = (entry.totals[currency] || 0) + amount;
  });
  popularRows.filter(r => r.letterType === "Machine Parts").forEach(r => {
    (r.piTableRows || []).forEach(row => {
      const name = canonicalPartName(row.description, partMergeMap, "mp");
      const key = "mp::" + normalizePartKey(name);
      if (!popularityMap.has(key)) popularityMap.set(key, { label: name, sum: 0, kind: "Machine Parts", totals: {} });
      popularityMap.get(key).sum += parseQty(row.quantity);
    });
  });
  const popularItems = Array.from(popularityMap.values())
    .sort((a, b) => b.sum - a.sum)
    .slice(0, 12)
    .map(it => {
      const qtyLabel = `${it.sum.toLocaleString(undefined,{maximumFractionDigits:0})} ${it.kind === "Raw Material" ? "letter" + (it.sum!==1?"s":"") : "unit" + (it.sum!==1?"s":"")}`;
      // Raw Materials have a real monetary value on record — show it in its
      // original currency plus the LKR equivalent, like the other charts.
      // Machine Parts line items don't carry a price, only a quantity, so
      // currency simply isn't applicable there — show the quantity instead.
      const hasValue = it.kind === "Raw Material" && Object.keys(it.totals).length > 0;
      const displayValue = hasValue ? fmtCurrencyTotalsWithLKR(it.totals, fxRates) : qtyLabel;
      return {
        label: it.label,
        sum: it.sum,
        color: it.kind === "Raw Material" ? PALETTE.rawMaterial : PALETTE.machineParts,
        displayValue,
        tooltip: `${it.label} — ${it.kind} — ${displayValue}${hasValue ? ` (${qtyLabel})` : ""}`,
      };
    });
  const popularChartHtml = buildColumnChart(popularItems, PALETTE.machineParts, "No requested materials or parts yet for this filter");

  // ── "Total letters" card has its own type filter (Raw Material / Machine Parts / All) ──
  const totalLettersFiltered = rows.filter(r => !CF.totalLettersType || r.letterType === CF.totalLettersType).length;

  // ── "Total value" card: convert every filtered row's value into the
  // selected currency using the latest cached FX rates ──
  const { converted: convertedValueTotal, unconvertible: unconvertibleValueTotals } = computeConvertedTotal(rows, dashCurrency, fxRates);
  const fxNeeded = dashCurrency !== "LKR";
  let totalValueDisplay, totalValueNote;
  if (!fxNeeded) {
    totalValueDisplay = fmtMoney(convertedValueTotal, "LKR");
    totalValueNote = fxCache ? `FX rates as of ${esc(new Date(fxCache.fetchedAt).toLocaleString())}` : "";
  } else if (fxRates && convertedValueTotal != null) {
    totalValueDisplay = fmtMoney(convertedValueTotal, dashCurrency);
    totalValueNote = `FX rates as of ${esc(new Date(fxCache.fetchedAt).toLocaleString())}`;
  } else if (_fxLastAttempt.ok === false) {
    // We tried (possibly more than once) and every provider failed —
    // most likely a connectivity/firewall issue, not an app bug.
    totalValueDisplay = fxCache ? fmtMoney(convertedValueTotal, dashCurrency) : "Rates unavailable";
    totalValueNote = `Couldn't reach the exchange-rate service (check your internet connection). ${fxCache ? `Showing rates last fetched ${esc(new Date(fxCache.fetchedAt).toLocaleString())}.` : "No cached rates yet."}`;
  } else {
    totalValueDisplay = "Fetching live rates…";
    totalValueNote = "Live FX rates aren't cached yet — showing this as soon as they load.";
  }
  const unconvertibleNote = Object.keys(unconvertibleValueTotals).length
    ? `+ ${esc(fmtCurrencyTotals(unconvertibleValueTotals))} in currencies without a live rate (not converted)`
    : "";

  // ── Summary stat cards ──
  const statCardsHtml = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px;">
      <div class="dash-stat" style="background:linear-gradient(135deg,var(--paper),var(--stat-tint-red));border-color:${PALETTE.rawMaterial}33;">
        <div class="num" style="color:${PALETTE.rawMaterial};">${pendingDraftsCount}</div>
        <div class="lbl">Pending drafts waiting</div>
      </div>
      <div class="dash-stat" style="background:linear-gradient(135deg,var(--paper),var(--stat-tint-neutral));">
        <div class="num" style="color:var(--accent);">${distinctSuppliersFiltered}</div>
        <div class="lbl">Distinct suppliers</div>
      </div>
      <div class="dash-stat" style="background:linear-gradient(135deg,var(--paper),var(--stat-tint-green));">
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;">
          <div class="num" style="color:var(--ok);">${totalLettersFiltered}</div>
        </div>
        <div class="lbl">Total letters (filtered)</div>
        <select id="fTotalLettersType" class="dash-filter" style="font-size:10.5px;padding:3px 6px;margin-top:6px;">
          <option value="">All types</option>
          <option value="Raw Material" ${CF.totalLettersType==="Raw Material"?"selected":""}>Raw Material</option>
          <option value="Machine Parts" ${CF.totalLettersType==="Machine Parts"?"selected":""}>Machine Parts</option>
        </select>
      </div>
      <div class="dash-stat" style="background:linear-gradient(135deg,var(--paper),var(--stat-tint-neutral));">
        <div class="num" style="color:var(--accent);font-size:20px;">${esc(totalValueDisplay)}</div>
        <div class="lbl">Total value (filtered)</div>
        <select id="fDashCurrency" class="dash-filter" style="font-size:10.5px;padding:3px 6px;margin-top:6px;">
          ${["LKR", ...FX_SUPPORTED_CURRENCIES].map(c => `<option value="${c}" ${dashCurrency===c?"selected":""}>${c}</option>`).join("")}
        </select>
        ${totalValueNote ? `<div style="font-size:9.5px;color:var(--muted);margin-top:4px;">${totalValueNote}</div>` : ""}
        ${unconvertibleNote ? `<div style="font-size:9.5px;color:var(--muted);margin-top:2px;">${unconvertibleNote}</div>` : ""}
        ${(_fxLastAttempt.ok === false || (fxNeeded && !fxRates)) ? `<button id="btnFxRetry" class="btn-ghost" style="font-size:10px;padding:2px 8px;margin-top:5px;">↻ Retry fetching live rates</button>` : ""}
      </div>
    </div>`;

  // ── Most Requested Materials and Parts (per supplier + type, total business done + docs/emails) ──
  const materialGroups = groupRowsBySupplierAndType(rows);

  root.innerHTML = `
    <div class="panel">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
        <div style="font-size:14px;font-weight:700;">Dashboard ${F.type||F.supplier||F.year||F.month ? "— filtered view" : ""}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <select id="fType" class="dash-filter" style="flex:1 1 140px;min-width:120px;">
            <option value="">All types</option>
            ${types.map(t => `<option value="${esc(t)}" ${F.type===t?"selected":""}>${esc(t)}</option>`).join("")}
          </select>
          <select id="fSupplier" class="dash-filter" style="flex:1 1 140px;min-width:120px;">
            <option value="">All suppliers</option>
            ${suppliers.map(s => `<option value="${esc(s)}" ${F.supplier===s?"selected":""}>${esc(s)}</option>`).join("")}
          </select>
          <select id="fYear" class="dash-filter" style="flex:1 1 140px;min-width:120px;">
            <option value="">All years</option>
            ${years.map(y => `<option value="${y}" ${F.year===y?"selected":""}>${y}</option>`).join("")}
          </select>
          <select id="fMonth" class="dash-filter" style="flex:1 1 140px;min-width:120px;">
            <option value="">All months</option>
            ${["01","02","03","04","05","06","07","08","09","10","11","12"].map((m,i) => {
              const name = new Date(2000,i,1).toLocaleString("en-US",{month:"long"});
              const available = monthsAvailable.has(m) || F.month === "-" + m;
              return `<option value="-${m}" ${F.month==="-"+m?"selected":""} ${available?"":"disabled"}>${name}${available?"":" (no data)"}</option>`;
            }).join("")}
          </select>
          ${F.type||F.supplier||F.year||F.month ? `<button class="btn-ghost" id="btnClearFilters" style="font-size:12px;">✕ Clear filters</button>` : ""}

              <select id="fPeriod" class="dash-filter" style="font-size:11.5px;padding:5px 8px;">
                <option value="day" ${CF.period==="day"?"selected":""}>By day</option>
                <option value="week" ${CF.period==="week"?"selected":""}>By week</option>
                <option value="month" ${CF.period==="month"?"selected":""}>By month</option>
                <option value="year" ${CF.period==="year"?"selected":""}>By year</option>
                <option value="all" ${CF.period==="all"?"selected":""}>All Time</option>
              </select>
              ${CF.period==="day" ? `
                <input type="date" id="fDayFrom" class="dash-filter" value="${esc(CF.dayFrom||"")}" style="font-size:11px;padding:5px 6px;" title="From date">
                <span style="font-size:11px;color:var(--muted);">to</span>
                <input type="date" id="fDayTo" class="dash-filter" value="${esc(CF.dayTo||"")}" style="font-size:11px;padding:5px 6px;" title="To date">
              ` : ""}

function setStatusLog(msg, kind) {
  // Lightweight transient confirmation banner for the log view (separate
  // from the generate view's status box).
  const root = document.getElementById("viewRoot");
  if (!root) return;
  const existing = root.querySelector(".log-status-toast");
  if (existing) existing.remove();
  const toast = document.createElement("div");
  toast.className = `status ${kind} log-status-toast`;
  toast.style.marginBottom = "12px";
  toast.textContent = msg;
  root.querySelector(".panel").insertBefore(toast, root.querySelector(".logwrap"));
  setTimeout(() => toast.remove(), 3500);
}

function buildLogTable(rows) {
  const dateGeneratedCol = LOG_COLS.find(c => c.k === "dateGenerated");
  const otherCols = LOG_COLS.filter(c => c.k !== "dateGenerated");
  const ths = "<th>Docs</th>" + otherCols.map(c => `<th>${esc(c.h)}</th>`).join("") + `<th>${esc(dateGeneratedCol.h)}</th>` + "<th>Emails</th><th></th>";
  const trs = rows.map((r, i) => {
    const rowClass = r.letterType === "Machine Parts" ? ' class="row-machine-parts"' : "";
    const formatsRecorded = r.formats && r.formats.length > 0;
    const hasWord = !formatsRecorded || r.formats.includes("docx");
    const hasPdf = !formatsRecorded || r.formats.includes("pdf");
    const docBtn = (label, enabled, cls, title) => `<button class="${enabled ? cls : ""}" data-log-doc-idx="${i}" style="font-size:10.5px;padding:2px 7px;margin-right:3px;border-radius:5px;border:1px solid ${enabled ? "var(--accent)" : "var(--line)"};background:${enabled ? "var(--paper)" : "var(--surface-alt)"};color:${enabled ? "var(--accent)" : "var(--muted)"};cursor:${enabled ? "pointer" : "not-allowed"};" ${enabled ? "" : "disabled"} title="${esc(title)}">${label}</button>`;
    const docsCell = docBtn("Word", hasWord, "log-doc-open-word", hasWord ? (formatsRecorded ? "Open the saved Word document" : "Format wasn't recorded for this older entry — click to try the connected folder") : "No Word document was generated for this letter")
      + docBtn("PDF", hasPdf, "log-doc-open-pdf", hasPdf ? (formatsRecorded ? "Open the saved PDF" : "Format wasn't recorded for this older entry — click to try the connected folder") : "No PDF was generated for this letter");
    const emails = r.attachedEmails || [];
    const emailsCell = emails.length
      ? emails.map((em, j) => `<span class="log-email-open" data-log-row-idx="${i}" data-log-email-idx="${j}" style="cursor:pointer;text-decoration:underline;color:var(--accent);display:block;white-space:nowrap;" title="Click to open this email">${esc(em.originalName || em.name || "")}</span>`).join("")
      : `<span style="color:var(--muted);">—</span>`;
    return `<tr${rowClass}><td>${docsCell}</td>${otherCols.map(c => `<td>${esc(r[c.k]||"")}</td>`).join("")}
     <td>${esc(r[dateGeneratedCol.k]||"")}</td>
     <td>${emailsCell}</td>
     <td><button style="font-size:11px;padding:3px 8px;border:1px solid var(--border-soft);border-radius:5px;cursor:pointer;background:var(--paper);" data-del="${i}">Delete</button></td></tr>`;
  }).join("");
  setTimeout(() => {
    document.querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = () => {
        const rows2 = loadLog();
        rows2.splice(+btn.dataset.del, 1);
        saveLog(rows2);
        autoSaveLogToFolder();
        renderLog();
      };
    });
    document.querySelectorAll(".log-doc-open-word").forEach(el => {
      el.onclick = () => openSavedDocument(rows[+el.dataset.logDocIdx], "docx");
    });
    document.querySelectorAll(".log-doc-open-pdf").forEach(el => {
      el.onclick = () => openSavedDocument(rows[+el.dataset.logDocIdx], "pdf");
    });
    document.querySelectorAll(".log-email-open").forEach(el => {
      el.onclick = () => openSavedEmail((rows[+el.dataset.logRowIdx].attachedEmails || [])[+el.dataset.logEmailIdx]);
    });
  }, 0);
  return `<table class="log"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

/* ═══════════════ EXCEL EXPORT (hand-rolled .xlsx with real styling) ═══════════════
   NOTE: the free/community build of SheetJS (xlsx.full.min.js) does not reliably
   write cell styles — fills and fonts get silently dropped on export, which is
   why headers previously came out unstyled. To guarantee professional header
   formatting (solid navy fill, bold white text) actually appears in Excel/Word 365,
   we build the .xlsx file's OOXML parts directly and zip them with JSZip. This is
   a small, fully valid, spec-compliant Excel workbook. */
function xmlEsc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function colLetter(idx) { // 0-based -> A, B, ... Z, AA, AB...
  let s = "";
  idx += 1;
  while (idx > 0) {
    const rem = (idx - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    idx = Math.floor((idx - 1) / 26);
  }
  return s;
}

async function buildStyledXlsxBlob(rows, cols = LOG_COLS, sheetName = "Customs Log") {
  const headers = cols.map(c => c.h);
  const nCols = headers.length;
  const nRows = rows.length;

  // ── sheet1.xml ──
  let sheetRows = "";
  // Header row (style index 1 = navy header style)
  let headerCells = "";
  headers.forEach((h, c) => {
    headerCells += `<c r="${colLetter(c)}1" s="1" t="inlineStr"><is><t>${xmlEsc(h)}</t></is></c>`;
  });
  sheetRows += `<row r="1">${headerCells}</row>`;

  // Data rows (style index 2 = bordered body cell, alternating handled via style 2/3)
  rows.forEach((r, ri) => {
    const rowNum = ri + 2;
    const styleIdx = (ri % 2 === 0) ? "2" : "3"; // alternate row banding
    let cells = "";
    cols.forEach((c, ci) => {
      const raw = r[c.k];
      const val = (raw === undefined || raw === null || String(raw).trim() === "") ? "N/A" : raw;
      cells += `<c r="${colLetter(ci)}${rowNum}" s="${styleIdx}" t="inlineStr"><is><t>${xmlEsc(val)}</t></is></c>`;
    });
    sheetRows += `<row r="${rowNum}">${cells}</row>`;
  });

  const lastCol = colLetter(nCols - 1);
  const colsXml = cols.map((c, i) =>
    `<col min="${i+1}" max="${i+1}" width="24" customWidth="1"/>`
  ).join("");

  const sheetXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<dimension ref="A1:${lastCol}${nRows+1}"/>
<sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/><selection pane="bottomLeft" activeCell="A2" sqref="A2"/></sheetView></sheetViews>
<sheetFormatPr baseColWidth="10" defaultRowHeight="18"/>
<cols>${colsXml}</cols>
<sheetData>${sheetRows}</sheetData>
<pageMargins left="0.7" right="0.7" top="0.75" bottom="0.75" header="0.3" footer="0.3"/>
</worksheet>`;

  // ── styles.xml ──
  const stylesXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<numFmts count="0"/>
<fonts count="2">
  <font><sz val="11"/><name val="Calibri"/></font>
  <font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>
</fonts>
<fills count="4">
  <fill><patternFill patternType="none"/></fill>
  <fill><patternFill patternType="gray125"/></fill>
  <fill><patternFill patternType="solid"><fgColor rgb="FF1F3864"/><bgColor indexed="64"/></patternFill></fill>
  <fill><patternFill patternType="solid"><fgColor rgb="FFF3F4F6"/><bgColor indexed="64"/></patternFill></fill>
</fills>
<borders count="2">
  <border><left/><right/><top/><bottom/><diagonal/></border>
  <border><left style="thin"><color rgb="FFD1D5DB"/></left><right style="thin"><color rgb="FFD1D5DB"/></right><top style="thin"><color rgb="FFD1D5DB"/></top><bottom style="thin"><color rgb="FFD1D5DB"/></bottom></border>
</borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="4">
  <xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
  <xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1" applyAlignment="1"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>
  <xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyBorder="1" applyAlignment="1"><alignment vertical="center"/></xf>
  <xf numFmtId="0" fontId="0" fillId="3" borderId="1" xfId="0" applyFill="1" applyBorder="1" applyAlignment="1"><alignment vertical="center"/></xf>
</cellXfs>
<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`;

  // ── workbook.xml ──
  const workbookXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets><sheet name="${xmlEsc(sheetName)}" sheetId="1" r:id="rId1"/></sheets>
</workbook>`;

  const workbookRelsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  const rootRelsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

  const contentTypesXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`;

  const zip = new JSZip();
  zip.file("[Content_Types].xml", contentTypesXml);
  zip.file("_rels/.rels", rootRelsXml);
  zip.file("xl/workbook.xml", workbookXml);
  zip.file("xl/_rels/workbook.xml.rels", workbookRelsXml);
  zip.file("xl/styles.xml", stylesXml);
  zip.file("xl/worksheets/sheet1.xml", sheetXml);

  return zip.generateAsync({
    type: "blob",
    mimeType: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  });
}

async function exportExcel() {
  const rows = loadLog();
  if (!rows.length) { alert("No records to export yet."); return; }
  try {
    const blob = await buildStyledXlsxBlob(rows);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Customs Waiver Log ${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } catch (err) {
    console.error(err);
    alert("Could not generate the Excel file. Please try again.");
  }
}

function importExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: "array" });
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const imported = data.map(d => {
        const obj = {};
        LOG_COLS.forEach(c => {
          const val = d[c.h];
          obj[c.k] = (val === undefined || val === null || String(val).trim() === "N/A") ? "" : val;
        });
        return obj;
      });
      saveLog(loadLog().concat(imported));
      autoSaveLogToFolder();
      renderLog();
      alert(`Imported ${imported.length} record(s).`);
    } catch { alert("Could not read the file. Please use a .xlsx exported from this app."); }
  };
  reader.readAsArrayBuffer(file);
}
