  document.getElementById("appRoot").innerHTML = `
    <header>
      <div style="display:flex;align-items:center;gap:12px;">
        <svg width="38" height="38" viewBox="0 0 38 38" aria-hidden="true" style="flex-shrink:0;">
          <rect x="1" y="1" width="36" height="36" rx="9" fill="#7a3b2e"/>
          <path d="M11 9.5 H23 L27 13.5 V28.5 A1.5 1.5 0 0 1 25.5 30 H11 A1.5 1.5 0 0 1 9.5 28.5 V11 A1.5 1.5 0 0 1 11 9.5 Z"
                fill="none" stroke="#f3e9e5" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M23 9.5 V12.5 A1 1 0 0 0 24 13.5 H27" fill="none" stroke="#f3e9e5" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M13.5 21 L17 24.5 L24 17" fill="none" stroke="#f3e9e5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div>
          <h1>Customs Waiver Letter Generator</h1>
          <div class="sub">Morison Limited &mdash; PAL / SSC / Customs Duty waiver applications</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="tabbar">
          <button id="tbGen" class="${S.view==="generate"?"active":""}">Generate letter</button>
          <button id="tbDrafts" class="${S.view==="drafts"?"active":""}">Drafts${draftBadge}</button>
          <button id="tbEmails" class="${S.view==="emails"?"active":""}">Requester emails</button>
          ${admin ? `<button id="tbLog" class="${S.view==="log"?"active":""}">Change log</button>` : ""}
          ${admin ? `<button id="tbDash" class="${S.view==="dashboard"?"active":""}">Dashboard</button>` : ""}
          ${admin ? `<button id="tbSettings" class="${S.view==="settings"?"active":""}">Settings</button>` : ""}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          ${admin
            ? `<button id="btnModeToggle" style="font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid #a3c9aa;background:#e8f3ea;color:#2d6636;cursor:pointer;white-space:nowrap;">
                ${S.viewingAsUser ? "🔓 Switch to admin view" : "👤 Switch to user view"}
               </button>
               <button id="btnLockSession" title="Lock admin mode and clear session — next unlock will require the PIN" style="font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid #cac6ba;background:#fff;color:#a33;cursor:pointer;" >🔒</button>`
            : `<button id="btnModeToggle" style="font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid #cac6ba;background:#fff;color:#6b6b63;cursor:pointer;white-space:nowrap;">
                🔒 Admin mode
               </button>`}
        </div>
      </div>
    </header>
    <div id="viewRoot"></div>
  `;

  document.getElementById("tbGen").onclick = () => { S.view = "generate"; render(); };
  document.getElementById("tbDrafts").onclick = () => { S.view = "drafts"; render(); };
  document.getElementById("tbEmails").onclick = () => { S.view = "emails"; render(); };
  if (admin) {
    document.getElementById("tbLog").onclick = () => { S.view = "log"; render(); };
    document.getElementById("tbDash").onclick = () => { S.view = "dashboard"; render(); };
    document.getElementById("tbSettings").onclick = () => { S.view = "settings"; render(); };
    startDraftPolling();
  } else {
    stopDraftPolling();
  }

  document.getElementById("btnModeToggle").onclick = async () => {
    if (adminSession) {
      // Session is alive — just flip the view without touching the session.
      S.viewingAsUser = !S.viewingAsUser;
      // If switching to user view while on an admin-only tab, go to generate.
      if (S.viewingAsUser && (S.view === "log" || S.view === "dashboard" || S.view === "settings")) {
        S.view = "generate";
      }
      render();
    } else {
      // Not unlocked yet — ask for the PIN.
      const ok = await showPinModal("Admin mode", "Enter your 4-digit PIN to unlock.");
      if (ok) { unlockAdmin(); S.viewingAsUser = false; render(); }
    }
  };

  // Explicit lock button (only visible in admin session) — clears the session
  // so the next unlock requires the PIN again.
  const lockBtn = document.getElementById("btnLockSession");
  if (lockBtn) lockBtn.onclick = () => {
    if (confirm("Lock admin mode? You'll need to enter the PIN again to unlock.")) {
      lockAdmin();
      S.viewingAsUser = false;
      S.view = "generate";
      render();
    }
  };

  // Subtle PIN reset: press and hold the mode button for ~1.5s to reveal
  // the reset flow. Deliberately not a visible button or menu item — this
  // is a recovery path, not a feature to advertise.
  (function wireSubtleReset() {
    const btn = document.getElementById("btnModeToggle");
    let pressTimer = null;
    const start = () => { pressTimer = setTimeout(() => showResetPinFlow(), 1500); };
    const cancel = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
    btn.addEventListener("mousedown", start);
    btn.addEventListener("touchstart", start);
    ["mouseup","mouseleave","touchend","touchcancel"].forEach(evt => btn.addEventListener(evt, cancel));
  })();

  if (S.view === "generate") renderGenerate();
  else if (S.view === "drafts") renderDrafts();
  else if (S.view === "emails") renderEmails();
  else if (S.view === "log") renderLog();
  else if (S.view === "dashboard") renderDashboard();
  else if (S.view === "settings") renderSettings();
}

/* ═══════════════ GENERATE VIEW ═══════════════ */
async function renderGenerate() {
  const root = document.getElementById("viewRoot");
  const type = T();
  const admin = isEffectiveAdmin();
  const locked = S.formLocked;
  const draftHandle = await getDraftFolderHandle();
  const draftFolderConnected = !!draftHandle;

  // Previous/Next navigation — cycles through pending drafts of the
  // currently-selected letter type, available to both admin and User1.
  const navList = loadDraftMeta().filter(d => d.status === "pending" && d.typeId === S.typeId);
  const navIndex = S.currentDraftId ? navList.findIndex(d => d.id === S.currentDraftId) : -1;

  // Batch "Save All" — admin only, only offered when more than one pending
  // draft of the current type already has an Application No. filled in.
  const eligibleDrafts = admin ? loadDraftMeta().filter(d => d.status === "pending" && d.typeId === S.typeId && d.appNo && d.appNo.trim()) : [];

  root.innerHTML = `
    <div class="layout">
      <div>
        ${!admin && !draftFolderConnected ? `
        <div class="no-print-banner" style="background:#fdf3e0;border:1px solid #e8d4a8;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;color:#8a5c10;">
          📁 Waiting for the admin to connect the shared folder — once connected, your drafts will save there automatically.
        </div>` : ""}
        ${!admin && draftFolderConnected ? `
        <div class="no-print-banner" style="background:#e8f3ea;border:1px solid #a3c9aa;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#2d6636;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>✓ Drafts saved to${draftHandle.name ? ` "<strong>${esc(draftHandle.name)}</strong>"` : " shared folder"}
            <span id="draftSaveStatus" style="margin-left:8px;opacity:0.7;"></span>
          </div>
        </div>` : ""}
        ${!admin ? `
        <div class="no-print-banner" style="display:flex;align-items:center;justify-content:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:14px;">
          <button class="btn-secondary" id="btnNewDraftTop" style="font-size:19px;padding:11px 21px;">+ New Draft</button>
          <div style="font-size:13px;color:var(--muted);">
            ${S.currentDraftId ? `Editing: <strong style="color:var(--ink);">${esc(buildDraftName())}</strong>` : "No draft open"}
          </div>
        </div>` : ""}
        <div class="panel">
          <div class="panel-title">Letter type</div>
          <div class="typepicker" id="typePicker"></div>
        </div>

        ${navList.length > 0 ? `
        <div class="no-print-banner" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;background:#f3f1ea;border:1px solid var(--line);border-radius:8px;padding:8px 14px;font-size:12.5px;">
          <button class="btn-ghost" id="btnPrevDraft" style="font-size:12.5px;" ${navIndex > 0 ? "" : "disabled"}>◀ Previous</button>
          <span style="color:var(--muted);">${navIndex >= 0 ? `Pending draft ${navIndex + 1} of ${navList.length} (${esc(type.name)})` : `${navList.length} pending ${esc(type.name)} draft${navList.length!==1?"s":""} — open one to navigate`}</span>
          <button class="btn-ghost" id="btnNextDraft" style="font-size:12.5px;" ${navIndex >= 0 && navIndex < navList.length - 1 ? "" : "disabled"}>Next ▶</button>
        </div>` : ""}

        <div class="panel" style="margin-top:14px;">
          <div class="panel-title">Fill in the variable fields</div>
          <div id="formFields"></div>

          ${type.hasPI && !admin ? `
          <div class="field" style="margin-top:4px;">
            <label>Proforma invoice PDF</label>
            <div class="pi-zone" id="piZone"></div>
          </div>
          ` : ""}

          <div style="margin-top:16px;">
            <div class="field"><label>Generated doc name</label>
              <div class="docname-preview" id="docNamePreview">&mdash;</div>
            </div>
          </div>

          <div class="btnrow">
            ${admin
              ? locked
                ? `<button class="btn-primary" id="btnWord">💾 Save as Word</button>
                   <button class="btn-secondary" id="btnPdf">💾 Save as PDF</button>
                   <button class="btn-secondary" id="btnEditForm">✏️ Edit form</button>
                   <button class="btn-ghost" id="btnReset">Clear form</button>`
                : `<button class="btn-primary" id="btnWord">💾 Save as Word</button>
                   <button class="btn-secondary" id="btnPdf">💾 Save as PDF</button>
                   <button class="btn-ghost" id="btnReset">Clear form</button>`
              : locked
                ? `<button class="btn-primary" id="btnSaveDraft" style="min-width:160px;" disabled>✓ Draft saved</button>
                   <button class="btn-secondary" id="btnEditForm">✏️ Edit form</button>`
                : `<button class="btn-primary" id="btnSaveDraft" style="min-width:160px;">💾 Save Draft</button>
                   <button class="btn-ghost" id="btnReset">Clear form</button>`}
          </div>
          ${locked ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;">This letter is locked so it isn't changed by mistake. Tap "Edit form" to make changes.</div>` : ""}
          ${admin && eligibleDrafts.length > 1 ? `
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:8px;">Batch generate — ${eligibleDrafts.length} pending ${esc(type.name)} drafts have an Application No. filled in</div>
            <div class="btnrow">
              <button class="btn-secondary" id="btnSaveAllWord">💾 Save All as Word (${eligibleDrafts.length})</button>
              <button class="btn-secondary" id="btnSaveAllPdf">💾 Save All as PDF (${eligibleDrafts.length})</button>
            </div>
          </div>` : ""}
          <div id="statusMsg"></div>
        </div>
      </div>

      <div class="preview-wrap">
        <div class="letter-paper" id="letterPaper"></div>
      </div>
    </div>
  `;

  LETTER_TYPES.forEach(t => {
    const el = document.createElement("div");
    el.className = "typecard" + (t.id === S.typeId ? " active" : "");
    el.innerHTML = `<h3>${esc(t.name)}</h3><p style="margin-bottom:5px;font-weight:600;font-size:11px;color:var(--accent)">${esc(t.badge)}</p><p>${esc(t.desc)}</p>`;
    el.onclick = () => { if (t.id !== S.typeId) { S.typeId = t.id; S.vals = {}; S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = ""; S.formLocked = false; render(); } };
    document.getElementById("typePicker").appendChild(el);
  });

  type.fields.forEach(f => {
    // Admin only handles the Application No.; every other fillable field
    // belongs to User1. Hide everything else from admin, and hide appNo
    // from User1, so each side only sees the field(s) relevant to them.
    if (admin && f.k !== "appNo") return;
    if (!admin && f.k === "appNo") return;

    const wrap = document.createElement("div");
    wrap.className = "field";
    wrap.innerHTML = `
      <label for="f_${f.k}">${esc(f.label)}${f.k === "appNo" ? ' <span style="font-size:10px;background:#7a3b2e;color:#fff;padding:2px 6px;border-radius:4px;font-weight:700;vertical-align:middle;">Admin only</span>' : ""}</label>
      <input type="${f.type === "date" ? "date" : "text"}" id="f_${f.k}"
        placeholder="${esc(f.ph || "")}" value="${esc(S.vals[f.k] || "")}" ${locked ? "disabled" : ""}
        style="${locked ? "background:#e9e6dd;color:#8a8a80;cursor:not-allowed;" : ""}">
    `;
    document.getElementById("formFields").appendChild(wrap);
    wrap.querySelector("input").addEventListener("input", e => {
      S.vals[f.k] = e.target.value;
      updateDocName();
      updatePaper();
      scheduleDraftSave();
    });
  });

  if (type.hasPI && !admin) {
    updatePIZone();
    const zone = document.getElementById("piZone");
    if (locked) {
      zone.style.opacity = "0.5";
      zone.style.pointerEvents = "none";
      document.removeEventListener("paste", handlePaste);
    } else {
      zone.addEventListener("dragover", e => { e.preventDefault(); zone.style.borderColor = "var(--accent)"; });
      zone.addEventListener("dragleave", () => { zone.style.borderColor = ""; });
      zone.addEventListener("drop", e => {
        e.preventDefault(); zone.style.borderColor = "";
        const file = Array.from(e.dataTransfer.files).find(f => f.type === "application/pdf" || f.name.endsWith(".pdf"));
        const img  = Array.from(e.dataTransfer.files).find(f => f.type.startsWith("image/"));
        if (file) processPI(file);
        else if (img) loadImageFile(img);
      });
      document.removeEventListener("paste", handlePaste);
      document.addEventListener("paste", handlePaste);
    }
  } else {
    document.removeEventListener("paste", handlePaste);
  }

  if (admin) {
    document.getElementById("btnPdf").onclick  = handlePDF;
    document.getElementById("btnWord").onclick = handleWord;
  } else {
    // User1 Save Draft button — saves immediately, then locks the form
    // (greyed out, read-only) so it isn't changed by mistake after saving.
    const saveDraftBtn = document.getElementById("btnSaveDraft");
    if (saveDraftBtn && !locked) saveDraftBtn.onclick = async () => {
      saveDraftBtn.disabled = true;
      saveDraftBtn.textContent = "Saving…";
      const id = await saveDraftToFolder(true);
      if (id) {
        setStatus("Draft saved — admin will see your latest changes.", "ok");
        updateDraftTabBadge();
        S.formLocked = true;
        renderGenerate();
      } else {
        saveDraftBtn.disabled = false;
        saveDraftBtn.textContent = "💾 Save Draft";
        setStatus("Could not save draft — make sure the shared folder is connected.", "warn");
      }
    };

    // New Draft button at top
    const newDraftTopBtn = document.getElementById("btnNewDraftTop");
    if (newDraftTopBtn) newDraftTopBtn.onclick = () => {
      S.currentDraftId = null;
      S.currentDraftEmails = [];
      S.vals = {};
      S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = "";
      S.formLocked = false;
      document.removeEventListener("paste", handlePaste);
      render();
    };
  }

  // Edit form button — present (both roles) whenever the letter is locked; unlocks it.
  const editFormBtn = document.getElementById("btnEditForm");
  if (editFormBtn) editFormBtn.onclick = () => {
    S.formLocked = false;
    renderGenerate();
  };

  // Previous / Next — cycle through pending drafts of the current letter
  // type, available to both admin and User1.
  const prevDraftBtn = document.getElementById("btnPrevDraft");
  if (prevDraftBtn) prevDraftBtn.onclick = async () => {
    const target = navList[navIndex - 1];
    if (!target) return;
    prevDraftBtn.disabled = true;
    const ok = await loadDraftIntoForm(target.id);
    if (!ok) alert("Could not load that draft — the file may have been moved or deleted.");
    renderGenerate();
  };
  const nextDraftBtn = document.getElementById("btnNextDraft");
  if (nextDraftBtn) nextDraftBtn.onclick = async () => {
    const target = navList[navIndex === -1 ? 0 : navIndex + 1];
    if (!target) return;
    nextDraftBtn.disabled = true;
    const ok = await loadDraftIntoForm(target.id);
    if (!ok) alert("Could not load that draft — the file may have been moved or deleted.");
    renderGenerate();
  };

  // Batch "Save All" — admin only.
  const saveAllWordBtn = document.getElementById("btnSaveAllWord");
  if (saveAllWordBtn) saveAllWordBtn.onclick = () => saveAllDraftsAs("docx");
  const saveAllPdfBtn = document.getElementById("btnSaveAllPdf");
  if (saveAllPdfBtn) saveAllPdfBtn.onclick = () => saveAllDraftsAs("pdf");

  const resetBtn = document.getElementById("btnReset");
  if (resetBtn) resetBtn.onclick = () => {
    S.vals = {}; S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = "";
    S.currentDraftId = null; S.currentDraftEmails = [];
    S.formLocked = false;
    document.removeEventListener("paste", handlePaste);
    render();
  };

  updateDocName();
  updatePaper();
}

function handlePaste(e) {
  if (S.view !== "generate" || !T().hasPI) return;
  const items = (e.clipboardData || window.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith("image/")) { loadImageFile(item.getAsFile()); break; }
  }
}

function loadImageFile(file) {
  const reader = new FileReader();
  reader.onload = async ev => {
    S.piImageDataUrl = ev.target.result;
    S.piImageBytes = await dataUrlToUint8Array(S.piImageDataUrl);
    const img = new Image();
    img.onload = () => { S.piAspectRatio = img.height / img.width; updatePaper(); };
    img.src = S.piImageDataUrl;
    S.piStatus = "done";
    updatePIZone();
    updatePaper();
    scheduleDraftSave();
  };
  reader.readAsDataURL(file);
}

function updatePIZone() {
  const zone = document.getElementById("piZone");
  if (!zone) return;

  if (S.piStatus === "loading") {
    zone.classList.remove("has-preview");
    zone.innerHTML = `<div class="pi-progress">Extracting goods table from PDF…</div>`;
    return;
  }

  if (S.piStatus === "done" && S.piImageDataUrl) {
    zone.classList.add("has-preview");
    const detectedDesc = S.piGoodsDesc || "";
    zone.innerHTML = `
      <canvas id="piPreviewCanvas" style="display:block;width:100%;max-height:200px;object-fit:contain;"></canvas>
      <div style="padding:8px 10px;border-top:1px solid var(--line);background:#fbfaf6;font-size:11.5px;">
        <span style="color:var(--muted);">Detected goods description (for the change log):</span>
        <input type="text" id="piGoodsDescInput" value="${esc(detectedDesc)}" placeholder="Couldn't auto-detect — type a short description"
          style="margin-top:4px;width:100%;padding:6px 8px;border:1px solid #cac6ba;border-radius:6px;font-size:12px;">

function validate() {
  const missing = [];
  const admin = isEffectiveAdmin();
  T().fields.forEach(f => {
    if (f.k === "appNo" && !admin) return; // appNo is admin-only — user1 can generate without it
    if (f.req && !S.vals[f.k]?.trim()) missing.push(f.label);
  });
  if (T().hasPI && !S.piImageDataUrl) missing.push("Proforma Invoice PDF / image");
  if (admin && missing.length) {
    // Admin only fills the Application No.; everything else should already
    // be present from a loaded draft, so a clearer nudge is more useful
    // than the raw field-name list.
    return ["the rest of the letter — load a draft from the Drafts tab first, then add the Application No."];
  }

}

/* ═══════════════ LOG A DOCUMENT ═══════════════ */
// Identifies "the same letter" for log de-duplication purposes: same letter
// type, same field values, same PI description/image. If this hasn't
// changed since the last time it was logged, generating both a Word doc and
// a PDF for one sitting should produce one log row, not two.
function fingerprintCurrentLetter() {
  return JSON.stringify({
    typeId: S.typeId,
    vals: S.vals,
    piGoodsDesc: S.piGoodsDesc,
    // Identify the PI image by length+a cheap hash-ish slice rather than the
    // full data URL, which would make the fingerprint unnecessarily huge.
    piImageSig: S.piImageDataUrl ? S.piImageDataUrl.length + ":" + S.piImageDataUrl.slice(-64) : null,
  });
}

let _lastLoggedFingerprint = null;

function logDocument(format = "pdf") {
  const fingerprint = fingerprintCurrentLetter();
  const emailSnapshot = (S.currentDraftEmails || []).map(e => ({
    savedName: e.name || e.originalName,       // actual filename in the email folder
    originalName: e.originalName || e.name,    // human-readable display name
    savedAt: e.savedAt || null,
  }));

  if (fingerprint === _lastLoggedFingerprint) {
    // Same letter as the last thing logged (e.g. Word just downloaded, now
    // generating the PDF for that identical letter) — don't add a second row,
    // but do fold in the newly-generated format and any newly-attached
    // emails into the existing row, and keep the saved-to-folder copies current.
    const rows = loadLog();
    if (rows[0]) {
      rows[0].formats = Array.from(new Set([...(rows[0].formats || []), format]));
      const existingNames = new Set((rows[0].attachedEmails || []).map(e => e.savedName || e.name));
      emailSnapshot.forEach(e => { if (!existingNames.has(e.savedName)) (rows[0].attachedEmails = rows[0].attachedEmails || []).push(e); });
      saveLog(rows);
    }
    autoSaveLogToFolder();
    autoSaveArchiveToFolder();
    return;
  }

  const type = T();
  const v = S.vals;
  const clearanceOf = type.id === "A" ? (v.rawMaterial || "") : (S.piGoodsDesc || "");
  const row = {
    dateGenerated:  new Date().toISOString().slice(0,10),
    dateOnLetter:   v.date || "",
    docName:        buildDocName(type, v),
    importedFrom:   v.importedFrom || "",
    manufacturerOf: type.id === "A" ? (v.mfrOf || "") : "",
    invoiceNumber:  v.invoiceNumber || "",
    invoiceDate:    v.invoiceDate || "",
    appNo:          v.appNo || "",
    value:          v.value || "",
    clearanceOf,
    letterType:     type.name,
    formats:        [format],
    attachedEmails: emailSnapshot,
  };

  // Working log: newest entries on top; the user can delete rows from this
  // or clear it entirely.
  const rows = loadLog();
  rows.unshift(row);
  saveLog(rows);
  autoSaveLogToFolder(); // fire-and-forget; no-op if no folder connected

  // Permanent archive: every generated document, forever — nothing in the
  // app's UI ever removes a row from this, so it can restore the working
  // log if it's ever cleared by mistake.
  appendToArchive({ ...row });

  _lastLoggedFingerprint = fingerprint;
}

/* ═══════════════ PDF (print) ═══════════════ */
async function handlePDF() {
  const missing = validate();
  if (missing.length) { setStatus("Please fill in: " + missing.join(", "), "warn"); return; }
  logDocument("pdf");
  updateDocName();
  const docName = buildDocName(T(), S.vals);

  if (isEffectiveAdmin() && S.currentDraftId) {
    completeDraft(S.currentDraftId, docName);
  }

  // Try auto-saving a real PDF copy to the connected PDF output folder
  // first. If that succeeds, there's no need to also open the browser's
  // Print dialog — the file is already saved where it needs to be.
  let savedToOutput = false;
  if (isEffectiveAdmin()) {
    setStatus("Generating PDF…", "ok");
    const blob = await buildLetterPdfBlob();
    if (blob) savedToOutput = await saveCompletedPdfToFolder(blob, docName);
  }

  if (savedToOutput) {
    setStatus(
      `Logged. Saved as PDF: ${docName}.pdf (in the completed PDF letters folder).` +
      (S.currentDraftId ? " Draft marked as completed." : ""),
      "ok"
    );
    S.formLocked = true;
    renderGenerate();
    return;
  }

  // Fallback: no PDF folder connected (or PDF generation failed) — print the
  // main window directly (not a popup or iframe). Chrome uses the
  // TOP-LEVEL document's title for the "Save as PDF" suggested filename —
  // when printing happens inside an iframe or a separate popup, that title
  // can be ignored in favor of the outer page's title, which is exactly the
  // bug this caused before. Printing window.print() on this same document,
  // after setting document.title, is the one approach guaranteed to control
  // the filename, since there's no cross-document ambiguity about which
  // title applies.
  //
  // Visual isolation (showing only the letter, not the rest of the app) is
  // handled entirely by the @media print stylesheet via the
  // .print-letter-only class, using individual display:none rules on each
  // sibling section — not a blanket `body * { visibility:hidden }`, which is
  // what caused the earlier blank-second-page bug (it keeps every hidden
  // element's layout height reserved instead of removing it).
  const originalTitle = document.title;
  document.title = docName;
  document.body.classList.add("print-letter-only");

  const restore = () => {
    document.body.classList.remove("print-letter-only");
    document.title = originalTitle;
    window.removeEventListener("afterprint", restore);
    // Lock the form only once printing is done — locking (which re-renders
    // the tab) any earlier would tear out the #letterPaper DOM mid-print.
    S.formLocked = true;
    if (S.view === "generate") renderGenerate();
  };
  window.addEventListener("afterprint", restore);
  // Fallback in case afterprint doesn't fire in some browser/driver combos.
  setTimeout(restore, 60000);

  setStatus(`Logged. The print dialog should open in a moment — choose "Save as PDF". The filename is already set to: ${docName}. The page shows just a page number at the bottom; no date/URL/filename. (On an older Chrome/Edge version you may still see those — turn off "Headers and footers" under "More settings" in the dialog; it remembers that choice afterwards.)`, "ok");

  setTimeout(() => window.print(), 50);
}

// Batch-generate Word or PDF copies for every pending draft of the current
// letter type that already has an Application No. filled in. Reuses the
// same generation/save logic as the single-letter buttons, just looped —
// each draft is loaded into the form in turn, generated, saved to the
// connected output folder, and marked completed, before moving to the next.
async function saveAllDraftsAs(kind) {
  if (!isEffectiveAdmin()) return;
  const eligible = loadDraftMeta().filter(d => d.status === "pending" && d.typeId === S.typeId && d.appNo && d.appNo.trim());
  if (!eligible.length) return;
  const label = kind === "docx" ? "Word document" : "PDF";
  if (!confirm(`Generate ${label}s for ${eligible.length} pending draft${eligible.length!==1?"s":""} with an Application No. filled in? Each will be saved to the connected output folder and marked as completed.`)) return;

  setStatus(`Generating ${eligible.length} ${label}${eligible.length!==1?"s":""}…`, "ok");

  let success = 0, failed = 0;
  for (const meta of eligible) {
    try {
      const ok = await loadDraftIntoForm(meta.id);
      if (!ok) { failed++; continue; }
      updateDocName();
      updatePaper();
      if (validate().length) { failed++; continue; } // skip drafts missing required fields rather than generate an incomplete document
      // Let the browser actually paint the updated #letterPaper before the
      // PDF path screenshots it via html2canvas.
      await new Promise(r => setTimeout(r, 60));

      const docName = buildDocName(T(), S.vals);
      if (kind === "docx") {
        const blob = await buildDocxBlob();
        logDocument("docx");
        const saved = await saveCompletedLetterToFolder(blob, docName);
        if (saved) { await completeDraft(meta.id, docName); success++; } else failed++;
      } else {
        logDocument("pdf");
        const blob = await buildLetterPdfBlob();
        if (blob) {
          const saved = await saveCompletedPdfToFolder(blob, docName);
          if (saved) { await completeDraft(meta.id, docName); success++; } else failed++;
        } else failed++;
      }
    } catch (err) {
      console.error("Batch save failed for draft", meta.id, err);
      failed++;
    }
  }

  // Return to a blank, unlocked new-draft state afterward.
  S.currentDraftId = null; S.currentDraftEmails = [];
  S.vals = {}; S.piImageDataUrl = null; S.piImageBytes = null; S.piStatus = ""; S.piGoodsDesc = "";
  S.formLocked = false;

  setStatus(
    `Batch ${label} generation done: ${success} saved` + (failed ? `, ${failed} failed — check the output folder connection and try those individually.` : ".") ,
    failed ? "warn" : "ok"
  );
  renderGenerate();
}

/* ═══════════════════════════════════════════
   REAL .DOCX GENERATION
   Loads the embedded original template (as a zip), substitutes the
   {{PLACEHOLDER}} tokens directly inside word/document.xml, swaps the
   PI snip image bytes for Type B, and re-zips as a genuine .docx file
   — so formatting, spacing, fonts, and margins are byte-identical to
   the source Word document.
═══════════════════════════════════════════ */
function b64ToUint8Array(b64) {
  const raw = atob(b64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

async function buildDocxBlob() {
  const type = T();
  const v = S.vals;
  const templateB64 = TEMPLATE_DOCX_B64[type.id];
  const zipBytes = b64ToUint8Array(templateB64);
  const zip = await JSZip.loadAsync(zipBytes);

  let xml = await zip.file("word/document.xml").async("string");

  const replacements = {
    "{{DATE}}": fmtDate(v.date),
    "{{APP_NO}}": v.appNo || "",
    "{{VALUE}}": v.value || "",
    "{{IMPORTED_FROM}}": v.importedFrom || "",
    "{{INVOICE_NO_DATE}}": buildInvoiceRef(v),
  };
  if (type.id === "A") {
    replacements["{{RAW_MATERIAL}}"] = v.rawMaterial || "";
    replacements["{{MANUFACTURER_OF}}"] = v.mfrOf || "";
  }

  for (const [token, value] of Object.entries(replacements)) {
    xml = xml.split(token).join(escXml(value));
  }

  if (type.id === "B") {
    // Swap the placeholder PI image bytes for the real cropped table image
    if (S.piImageBytes) {
      zip.file("word/media/image1.png", S.piImageBytes);
    }
    // Resize the image's drawing extent to match the real image's aspect ratio,
    // keeping a fixed sensible width so it never overflows the page margins.
    const TARGET_WIDTH_EMU = 5943600; // ~6.49in, matches original template width
    const ratio = S.piAspectRatio || (3877310 / 5943600);
    const targetHeight = Math.round(TARGET_WIDTH_EMU * ratio);
    xml = xml.split("{{PI_CX}}").join(String(TARGET_WIDTH_EMU));
    xml = xml.split("{{PI_CY}}").join(String(targetHeight));
  }

  zip.file("word/document.xml", xml);

  const blob = await zip.generateAsync({
    type: "blob",
    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  });
  return blob;
}

// Save the completed Word doc blob to the admin's chosen output folder for
// this letter type (Raw Material vs Machine Parts get separate folders).
async function saveCompletedLetterToFolder(blob, docName) {
  const type = T();
  const getHandle = type.id === "A" ? getOutputAFolderHandle : getOutputBFolderHandle;
  const handle = await getHandle();
  if (!handle) return false;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return false;
    const fileHandle = await handle.getFileHandle(fileSafe(docName) + ".docx", { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
    return true;
  } catch (err) {
    console.error("Save to output folder failed:", err);
    return false;
  }
}

// Same idea as saveCompletedLetterToFolder, but for the PDF copy — saved to
// its own dedicated Raw Material / Machine Parts PDF folder (separate from
// the Word output folders), since the admin connects these independently.
async function saveCompletedPdfToFolder(blob, docName) {
  const type = T();
  const getHandle = type.id === "A" ? getOutputAPdfFolderHandle : getOutputBPdfFolderHandle;
  const handle = await getHandle();
  if (!handle) return false;
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return false;
    const fileHandle = await handle.getFileHandle(fileSafe(docName) + ".pdf", { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
    return true;
  } catch (err) {
    console.error("Save to PDF output folder failed:", err);
    return false;
  }
}

// Renders the on-screen letter preview into an actual PDF file (via
// html2canvas + jsPDF), so a real PDF can be auto-saved to a folder the
// same way the Word copy is — the browser's own Print dialog only lets the
// person save a PDF wherever they choose each time, with nothing left for
// the app to store or reopen later.
async function buildLetterPdfBlob() {
  if (typeof html2canvas === "undefined" || !window.jspdf) {
    console.warn("html2canvas/jsPDF not available (offline or blocked by network) — skipping auto-saved PDF copy.");
    return null;
  }
  const el = document.getElementById("letterPaper");
  if (!el) return null;
  try {
    const canvas = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
    const { jsPDF } = window.jspdf;
    const pxToMm = 25.4 / 96; // canvas px (at CSS 96dpi baseline) -> mm
    const widthMm = canvas.width / 2 * pxToMm;   // /2 to undo the scale:2 above
    const heightMm = canvas.height / 2 * pxToMm;
    const doc = new jsPDF({
      orientation: heightMm >= widthMm ? "portrait" : "landscape",
      unit: "mm",
      format: [widthMm, heightMm],
    });
    doc.addImage(canvas.toDataURL("image/jpeg", 0.95), "JPEG", 0, 0, widthMm, heightMm);
    return doc.output("blob");
  } catch (err) {
    console.error("PDF generation failed:", err);
    return null;
  }
}

async function handleWord() {
  const missing = validate();
  if (missing.length) { setStatus("Please fill in: " + missing.join(", "), "warn"); return; }

  setStatus("Generating Word document…", "ok");
  try {
    const blob = await buildDocxBlob();
    logDocument("docx");
    const docName = buildDocName(T(), S.vals);

    // Admin: save a copy to the type-specific completed-letters folder, and
    // mark the originating draft (if any) as completed.
    let savedToOutput = false;
    if (isEffectiveAdmin()) {
      savedToOutput = await saveCompletedLetterToFolder(blob, docName);
      if (S.currentDraftId) await completeDraft(S.currentDraftId, docName);
    }

    // Only fall back to a browser download when there's no connected folder
    // to save into (or the save failed) — otherwise the file is already
    // sitting in the right place, and a second downloaded copy is unwanted.
    if (!savedToOutput) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = fileSafe(docName) + ".docx";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    setStatus(
      (savedToOutput
        ? `Logged. Saved as Word: ${docName}.docx (in the completed letters folder).`
        : `Logged. Downloaded: ${docName}.docx`) +
      (isEffectiveAdmin() && S.currentDraftId ? " — draft marked as completed." : ""),
      "ok"
    );
    S.formLocked = true;
    renderGenerate();
  } catch (err) {
    console.error(err);
    setStatus("Could not generate the Word document. Please try again.", "warn");
  }
}

            <input type="file" id="importInput" accept=".xlsx,.xls" style="display:none">
          </label>
          <button class="btn-ghost" id="btnClearAll" style="font-size:12px;padding:6px 4px;color:#a33;">Clear all</button>
        </div>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin-bottom:14px;">Folder connections (Excel export, archive, drafts, emails, output) are managed in <strong>Settings</strong>.</div>
      ${rows.length > 0 ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11.5px;color:var(--muted);">
        <span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:#fdf3e0;border:1px solid #e8d4a8;"></span> Machine Parts entries
      </div>` : ``}

      <div class="logwrap">
        ${rows.length === 0
          ? `<div class="log-empty">No documents generated yet — letters you generate will appear here automatically, newest first.</div>`
          : buildLogTable(rows)}
      </div>
    </div>
  `;

  document.getElementById("importInput").onchange = importExcel;
  document.getElementById("btnClearAll").onclick = async () => {
    if (rows.length === 0) return;

    const archiveNote = archiveConnected
      ? `Your archive has a permanent copy of everything — if you need it back, use "Import (missing files)" and select the archive Excel file.`
      : `Note: you don't have an archive set up, so this cannot be recovered afterward unless you've exported a backup separately.`;

    const confirmed = confirm(
      `Clear all ${rows.length} log record${rows.length !== 1 ? "s" : ""} from the working log shown here?\n\n${archiveNote}`
    );
    if (confirmed) {
      saveLog([]);
      autoSaveLogToFolder();
      renderLog();
    }
  };

  const saveBtn = document.getElementById("btnSaveExcel");
  saveBtn.onclick = async () => {
    saveBtn.disabled = true;
    const originalText = saveBtn.textContent;
    saveBtn.textContent = "Saving…";
    try {
      if (folderConnected) {
        // Already connected: just (re)write the file now, in case auto-save
        // ever missed an update, and confirm to the user it's current.
        await autoSaveLogToFolder();
        setStatusLog("Excel file is up to date.", "ok");
      } else if (supportsFileSystemAccess()) {
        const ok = await connectWorkingFolder();
        if (ok) { renderLog(); return; }
      } else {
        // Browser doesn't support live folder access — fall back to a
        // one-off download instead, so Save to Excel still works.
        await exportExcel();
      }
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = originalText;
    }
  };
}

function buildDraftsTable(drafts, admin, isCompleted) {
  const rows = drafts.map(d => {
    const typeName = LETTER_TYPES.find(t => t.id === d.typeId)?.name || d.typeId;
    const when = d.savedAt ? new Date(d.savedAt).toLocaleString() : "";
    const emailBadge = d.emailCount > 0
      ? `<button data-view-emails-for="${esc(d.id)}" style="font-size:11px;background:#f3f1ea;border:1px solid var(--line);border-radius:99px;padding:2px 9px;cursor:pointer;">📧 ${d.emailCount}</button>`
      : `<span style="font-size:11px;color:var(--muted);">—</span>`;
    const deleteBtn = `<button data-delete-draft="${esc(d.id)}" class="btn-ghost" style="font-size:11px;padding:3px 8px;color:#a33;">Delete</button>`;
    return `<tr class="${d.typeId==='B'?'row-machine-parts':''}">
      <td>${esc(d.draftName || "Unnamed draft")}</td>
      <td>${esc(typeName)}</td>
      <td>${esc(when)}</td>
      <td>${emailBadge}</td>
      ${isCompleted
        ? `<td>${esc(d.completedDocName || "")}</td><td>${esc(d.completedAt ? new Date(d.completedAt).toLocaleDateString() : "")}</td>`
        : `<td>${admin ? `<button data-load-draft="${esc(d.id)}" class="btn-secondary" style="font-size:12px;padding:5px 12px;">Load into form</button>` : `<button data-load-draft="${esc(d.id)}" class="btn-secondary" style="font-size:12px;padding:5px 12px;">Continue editing</button>`}</td>`}
      <td>${deleteBtn}</td>
    </tr>`;
  }).join("");

  return `<table class="log"><thead><tr>
    <th>Draft name</th><th>Type</th><th>Last saved</th><th>Emails</th>
    ${isCompleted ? `<th>Generated as</th><th>Completed</th>` : `<th></th>`}
    <th></th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// Manually link a saved requester email to a draft — used when the
// automatic linking (attaching an email while that draft is open) didn't
// happen, e.g. the email was uploaded before any draft existed, or for a
// different draft than intended. Available to both admin and User1.
// Passing draftId = null unlinks the email instead.
async function linkEmailToDraft(emailSavedName, draftId) {
  const emails = loadEmailMeta();
  const email = emails.find(e => e.name === emailSavedName);
  if (!email) return;

  if (!draftId) {
    email.linkedDraftId = null;
    saveEmailMeta(emails);
    renderEmails();
    return;
  }

  const draftData = await readDraftFromFolder(draftId);
  if (!draftData) {
    alert("Could not open that draft from the shared folder — make sure it's still connected and the draft file hasn't been moved or deleted.");
    return;
  }

  const entry = { name: email.name, originalName: email.originalName || email.name, savedAt: email.savedAt || null, size: email.size || null };
  draftData.attachedEmails = draftData.attachedEmails || [];
  if (!draftData.attachedEmails.some(e => e.name === entry.name)) draftData.attachedEmails.push(entry);

  const handle = await getDraftFolderHandle();
  if (!handle) { alert("The shared draft folder isn't connected in this browser."); return; }
  try {
    const ok = await ensureFolderPermission(handle);
    if (!ok) return;
    const fileHandle = await handle.getFileHandle(makeDraftFilename(draftId), { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(draftData, null, 0));
    await writable.close();
  } catch (err) {
    console.error("Could not update the draft file with the linked email:", err);
    alert("Could not save the link — check the shared folder connection and try again.");
    return;
  }

  // Keep the local draft-meta email count (used for the 📧 N badge) in sync.
  const allMeta = loadDraftMeta();
  const meta = allMeta.find(d => d.id === draftId);
  if (meta) { meta.emailCount = draftData.attachedEmails.length; saveDraftMeta(allMeta); }

  email.linkedDraftId = draftId;
  saveEmailMeta(emails);

  // If this is the draft currently open in the Generate form, refresh its
  // in-memory attached-emails list too, so it's reflected immediately.
  if (S.currentDraftId === draftId) S.currentDraftEmails = draftData.attachedEmails;

  renderEmails();
}

async function renderEmails() {
  const root = document.getElementById("viewRoot");

  const emailHandle = await getEmailFolderHandle();
  const emailFolderConnected = !!emailHandle;
  const emails = loadEmailMeta();
  const linkedDraftName = S.currentDraftId ? buildDraftName() : null;
  const availableDrafts = loadDraftMeta().slice().sort((a, b) => (b.savedAt||"").localeCompare(a.savedAt||""));

  root.innerHTML = `
    <div class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:14px;">
        <div style="font-size:13.5px;color:var(--muted);">${emails.length} requester email${emails.length!==1?"s":""} saved</div>
        <div class="btnrow" style="margin:0;">
          ${!admin ? (emailFolderConnected
            ? `<span style="font-size:12px;color:var(--muted);">📁 Saved to${emailHandle.name ? ` "<strong style="color:var(--ink);">${esc(emailHandle.name)}</strong>"` : " your chosen folder"}</span>`
            : `<span style="font-size:12px;color:var(--muted);">📁 Waiting for the admin to connect a save folder.</span>`) : ""}
        </div>
      </div>

      <div style="background:${linkedDraftName ? "#e8f3ea" : "#f6f4ee"};border:1px solid ${linkedDraftName ? "#a3c9aa" : "var(--line)"};border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:${linkedDraftName ? "#2d6636" : "var(--muted)"};">
        ${linkedDraftName
          ? `📎 New emails you upload will be linked to your current draft: <strong>${esc(linkedDraftName)}</strong>`
          : `No draft is currently open — go to the Generate tab and start filling in a letter first if you want uploaded emails linked to it. Emails uploaded now will be saved but not linked to any draft.`}
      </div>

      <div id="emailDropZone" style="border:2px dashed #cac6ba;border-radius:8px;padding:28px;text-align:center;background:#faf9f5;margin-bottom:16px;cursor:pointer;">
        <div style="font-size:28px;opacity:0.4;margin-bottom:8px;">📧</div>
        <div style="font-size:13.5px;color:var(--muted);">Drag &amp; drop requester email files (.msg) here</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">or click to choose a file</div>
        <input type="file" id="emailFileInput" accept=".msg,.eml" multiple style="display:none;">
      </div>

      <div id="emailStatus"></div>

      <div class="logwrap">
        ${emails.length === 0
          ? `<div class="log-empty">No requester emails saved yet — drag and drop .msg files above.</div>`
          : `<table class="log"><thead><tr><th>Original filename</th><th>Saved as</th><th>Saved</th><th>Size</th><th>Linked letter</th></tr></thead><tbody>
            ${emails.map((e, i) => {
              const draftMeta = e.linkedDraftId ? loadDraftMeta().find(d => d.id === e.linkedDraftId) : null;
              const linkText = draftMeta
                ? (draftMeta.status === "completed"
                    ? `✓ ${esc(draftMeta.completedDocName || draftMeta.draftName)}`
                    : `⏳ ${esc(draftMeta.draftName)} (pending)`)
                : `<select class="email-link-select" data-email-idx="${i}" style="font-size:11.5px;padding:3px 6px;max-width:220px;">
                    <option value="">— not linked — link to a draft…</option>
                    ${availableDrafts.map(d => `<option value="${esc(d.id)}">${d.status==="completed" ? "✓ " : "⏳ "}${esc(d.draftName || "Unnamed draft")}${d.status==="completed" ? " (completed)" : " (pending)"}</option>`).join("")}
                  </select>`;
              return `<tr>
              <td>${esc(e.originalName || e.name)}</td>
              <td style="font-family:monospace;font-size:11px;">${esc(e.name)}</td>
              <td>${esc(e.savedAt ? new Date(e.savedAt).toLocaleString() : "")}</td>
              <td>${esc(e.size ? (e.size/1024).toFixed(1) + " KB" : "")}</td>
              <td style="font-size:11.5px;">${linkText}</td>
            </tr>`;
            }).join("")}
          </tbody></table>`}
      </div>
    </div>
  `;

  // Drag & drop
  const zone = document.getElementById("emailDropZone");
  const fileInput = document.getElementById("emailFileInput");

  zone.onclick = (e) => { if (e.target !== fileInput) fileInput.click(); };
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.style.borderColor = "var(--accent)"; zone.style.background = "#f3e9e5"; });
  zone.addEventListener("dragleave", () => { zone.style.borderColor = "#cac6ba"; zone.style.background = "#faf9f5"; });
  zone.addEventListener("drop", async e => {
    e.preventDefault(); zone.style.borderColor = "#cac6ba"; zone.style.background = "#faf9f5";
    const files = Array.from(e.dataTransfer.files).filter(f => f.name.match(/\.(msg|eml)$/i));
    if (files.length) await handleEmailFiles(files);
  });
  fileInput.addEventListener("change", async e => {
    const files = Array.from(e.target.files);
    if (files.length) await handleEmailFiles(files);
  });

  // Manual "link to draft" dropdowns (shown only for emails not already linked)
  root.querySelectorAll(".email-link-select").forEach(sel => {
    sel.onchange = () => {
      const email = emails[+sel.dataset.emailIdx];
      sel.disabled = true;
      linkEmailToDraft(email.name, sel.value || null);
    };
  });
}

async function handleEmailFiles(files, draftId = null) {
  const statusEl = document.getElementById("emailStatus");
  if (statusEl) statusEl.innerHTML = `<div class="status ok">Saving ${files.length} file${files.length!==1?"s":""}…</div>`;
  let saved = 0;
  for (const file of files) {
    const result = await saveEmailFile(file, draftId);
    if (result) saved++;
  }
  if (statusEl) statusEl.innerHTML = `<div class="status ${saved > 0 ? "ok" : "warn"}">${saved} of ${files.length} email${files.length!==1?"s":""} saved${saved > 0 && (draftId || S.currentDraftId) ? " and linked to current draft" : ""}.${saved > 0 ? "" : " Check your email save folder connection."}</div>`;
  renderEmails();
}

// Shorten a label for chart axes/legends while keeping the full text in a
// tooltip (title attribute) placed by the caller.
function truncateLabel(s, n = 12) {
  const str = String(s || "");
  return str.length > n ? str.slice(0, n - 1) + "…" : str;
}

// Group a set of log rows into buckets over time (day/week/month/year),
// summing the parsed monetary value separately for Raw Material and
// Machine Parts letters — this feeds the "value spent" line chart.
// NOTE: amounts are combined across currencies for the line's height; hover
// a point to see the exact per-currency breakdown for that bucket.
function buildTimeBuckets(rows, period) {
  const now = new Date();
  const nowDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const counts = { day: 14, week: 12, month: 12, year: 6 };
  let n = counts[period] || 12;
  if (period === "all") {
    // Span every year present in the data (year-granularity, like "year" but
    // without capping to the last 6) so nothing gets cut off.
    const years = rows.map(r => new Date(r.dateGenerated || "")).filter(d => !isNaN(d)).map(d => d.getFullYear());
    const minYear = years.length ? Math.min(...years) : nowDay.getFullYear();
    n = Math.max(1, Math.min(40, nowDay.getFullYear() - minYear + 1));
  }

  function labelFor(d) {
    if (period === "day" || period === "week") return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
    if (period === "month") return d.toLocaleDateString("en-GB", { month: "short", year: "2-digit" });
    return String(d.getFullYear());
  }

  const buckets = [];
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(nowDay);
    if (period === "day") d.setDate(d.getDate() - i);
    else if (period === "week") d.setDate(d.getDate() - i * 7);
    else if (period === "month") d.setMonth(d.getMonth() - i);
    else d.setFullYear(d.getFullYear() - i);
    buckets.push({ d, label: labelFor(d), aTotals: {}, bTotals: {}, a: 0, b: 0 });
  }

  function indexFor(rowDate) {
    if (period === "day") {
      const diff = Math.floor((nowDay - new Date(rowDate.getFullYear(), rowDate.getMonth(), rowDate.getDate())) / 86400000);
      const idx = n - 1 - diff;
      return idx >= 0 && idx < n ? idx : -1;
    }
    if (period === "week") {
      const diff = Math.floor((nowDay - rowDate) / (7 * 86400000));
      const idx = n - 1 - diff;
      return idx >= 0 && idx < n ? idx : -1;
    }
    if (period === "month") {
      const diff = (nowDay.getFullYear() - rowDate.getFullYear()) * 12 + (nowDay.getMonth() - rowDate.getMonth());
      const idx = n - 1 - diff;
      return idx >= 0 && idx < n ? idx : -1;
    }
    const diff = nowDay.getFullYear() - rowDate.getFullYear();
    const idx = n - 1 - diff;
    return idx >= 0 && idx < n ? idx : -1;
  }

  rows.forEach(r => {
    const d = new Date(r.dateGenerated || "");
    if (isNaN(d)) return;
    const idx = indexFor(d);
    if (idx < 0) return;
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    const bucket = buckets[idx];
    if (r.letterType === "Raw Material") { bucket.a += amount; bucket.aTotals[currency] = (bucket.aTotals[currency]||0)+amount; }
    else if (r.letterType === "Machine Parts") { bucket.b += amount; bucket.bTotals[currency] = (bucket.bTotals[currency]||0)+amount; }
  });

  return buckets;
}

// SVG line chart: two series (Raw Material / Machine Parts value) over time.
function buildLineChartSvg(buckets, colorA, colorB) {
  const n = buckets.length;
  if (n === 0 || buckets.every(b => !b.a && !b.b)) {
    return `<div style="text-align:center;color:var(--muted);padding:44px 10px;font-size:12.5px;">No value data for this period</div>`;
  }
  const w = 620, h = 170, padL = 44, padR = 12, padT = 14, padB = 22;
  const maxVal = Math.max(1, ...buckets.map(b => b.a), ...buckets.map(b => b.b));
  const stepX = n > 1 ? (w - padL - padR) / (n - 1) : 0;
  const x = i => padL + i * stepX;
  const y = v => padT + (1 - v / maxVal) * (h - padT - padB);
  const pathFor = key => buckets.map((b, i) => `${i === 0 ? "M" : "L"} ${x(i).toFixed(1)} ${y(b[key]).toFixed(1)}`).join(" ");

  const gridLines = [0, 0.5, 1].map(f => {
    const gy = padT + (1 - f) * (h - padT - padB);
    return `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${w - padR}" y2="${gy.toFixed(1)}" stroke="#eee" stroke-width="1"/>
      <text x="${padL - 6}" y="${(gy + 3).toFixed(1)}" text-anchor="end" font-size="8" fill="#999">${Math.round(maxVal * f).toLocaleString()}</text>`;
  }).join("");

  const showEvery = Math.max(1, Math.ceil(n / 8));
  const xLabels = buckets.map((b, i) => {
    if (i % showEvery !== 0 && i !== n - 1) return "";
    return `<text x="${x(i).toFixed(1)}" y="${h - 6}" text-anchor="middle" font-size="8" fill="#999">${esc(b.label)}</text>`;
  }).join("");

  const dotsFor = (key, totalsKey, color) => buckets.map((b, i) =>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(b[key]).toFixed(1)}" r="2.6" fill="${color}"><title>${esc(b.label)}: ${esc(fmtCurrencyTotals(b[totalsKey]))}</title></circle>`
  ).join("");

  return `
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="xMidYMid meet">
      ${gridLines}
      <path d="${pathFor("a")}" fill="none" stroke="${colorA}" stroke-width="2"/>
      <path d="${pathFor("b")}" fill="none" stroke="${colorB}" stroke-width="2"/>
      ${dotsFor("a", "aTotals", colorA)}
      ${dotsFor("b", "bTotals", colorB)}
      ${xLabels}
    </svg>`;
}

// Vertical column (bar) chart for a single value series, e.g. top
// suppliers/materials by imported value.
function buildColumnChart(items, color, emptyMsg = "No data for this filter") {
  if (!items.length) {
    return `<div style="text-align:center;color:var(--muted);padding:44px 10px;font-size:12.5px;">${esc(emptyMsg)}</div>`;
  }
  const maxVal = Math.max(1, ...items.map(it => it.sum));
  return `
    <div style="display:flex;align-items:flex-end;gap:8px;height:150px;padding-bottom:34px;position:relative;">
      ${items.map(it => {
        const pct = Math.max((it.sum / maxVal) * 100, it.sum ? 4 : 0);
        return `<div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;position:relative;" title="${esc(it.label)}: ${esc(fmtCurrencyTotals(it.totals))}">
          <div style="font-size:9px;color:var(--muted);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${esc(fmtCurrencyTotals(it.totals))}</div>
          <div style="background:linear-gradient(180deg,${color},${color}bb);width:100%;max-width:36px;height:${pct}%;border-radius:4px 4px 0 0;"></div>
          <div style="font-size:9px;color:var(--muted);position:absolute;bottom:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${esc(truncateLabel(it.label, 11))}</div>
        </div>`;
      }).join("")}
    </div>`;
}

// Donut/pie chart — kept from the original implementation, reused here for
// the "most imported from — supplier by value" chart.
function buildDonut(segments, centerLabel, centerSubLabel, size = 130) {
  const sum = segments.reduce((s, x) => s + x.value, 0);
  const r = 40, cx = 50, cy = 50, strokeW = 17;
  const circumference = 2 * Math.PI * r;
  if (sum === 0) {
    return `<div style="text-align:center;color:var(--muted);padding:30px 10px;font-size:12.5px;">No data for this filter</div>`;
  }
  let offsetAccum = 0;
  const arcs = segments.filter(s => s.value > 0).map(s => {
    const frac = s.value / sum;
    const dash = frac * circumference;
    const gap = circumference - dash;
    const rotation = -90 + (offsetAccum / circumference) * 360;
    offsetAccum += dash;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${strokeW}"
      stroke-dasharray="${dash} ${gap}" transform="rotate(${rotation} ${cx} ${cy})" stroke-linecap="butt">
      <title>${esc(s.label)}: ${esc(s.tooltip != null ? s.tooltip : String(s.value))}</title>
    </circle>`;
  }).join("");
  return `
    <svg viewBox="0 0 100 100" width="${size}" height="${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f0ede4" stroke-width="${strokeW}" />
      ${arcs}
      <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a18">${esc(String(centerLabel))}</text>
      <text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="6.5" fill="#6b6b63">${esc(centerSubLabel||"total")}</text>
    </svg>`;
}

// Group filtered log rows by Application Number for the "Recent letters"
// table — one card per application, aggregating every letter generated
// under that app no (supplier, type, combined value, and every generated
// document + attached email so they can be reviewed in one popup).
// Group filtered log rows by Supplier for the "Recent letters" table — one
// card per supplier, showing the total business done with them (summed per
// currency) plus every generated document + attached email so they can be
// reviewed in one popup.
function groupRowsBySupplier(rows) {
  const map = new Map();
  rows.forEach(r => {
    const key = (r.importedFrom || "").trim() || "(unspecified supplier)";
    if (!map.has(key)) {
      map.set(key, { supplier: key, entries: [], typeCounts: {}, latestDate: r.dateGenerated || "" });
    }
    const g = map.get(key);
    g.entries.push(r);
    const t = r.letterType || "Unknown";
    g.typeCounts[t] = (g.typeCounts[t] || 0) + 1;
    if ((r.dateGenerated || "") > g.latestDate) g.latestDate = r.dateGenerated;
  });
  const groups = Array.from(map.values()).map(g => {
    const { totals, sum } = sumCurrencyTotals(g.entries);
    return { ...g, totals, sum };
  });
  groups.sort((a, b) => b.sum - a.sum); // rank by total business done, biggest first
  return groups;
}

// Opens (downloads) the Word or PDF copy of a generated letter from the
// appropriate output folder (Raw Material vs Machine Parts, Word vs PDF —
// each is its own connected folder), if one was saved there. Deliberately
// does NOT gate on the row's recorded `formats` metadata first — older log
// entries (from before that tracking existed) show "format not recorded"
// even when the actual file is sitting right there in a now-connected
// folder, so the folder itself is the real source of truth here.
async function openSavedDocument(entry, kind = "docx") {
  if (!entry) return;
  const isRawMaterial = entry.letterType === "Raw Material";
  const getHandle = kind === "docx"
    ? (isRawMaterial ? getOutputAFolderHandle : getOutputBFolderHandle)
    : (isRawMaterial ? getOutputAPdfFolderHandle : getOutputBPdfFolderHandle);
  const folderHandle = await getHandle();
  if (!folderHandle) {
    alert(`The completed ${kind === "docx" ? "Word" : "PDF"} letters folder for ${entry.letterType || "this letter type"} isn't connected in this browser. Connect it from the Generate tab (admin view) first.`);
    return;
  }
  try {
    const ok = await ensureFolderPermission(folderHandle);
    if (!ok) return;
    const fileHandle = await folderHandle.getFileHandle(fileSafe(entry.docName) + "." + kind);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href = url; a.download = file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  } catch (err) {
    console.error("Could not open saved document:", err);
    alert(`Could not find this ${kind === "docx" ? "Word document" : "PDF"} in the completed-letters folder — it may have been moved, renamed, deleted, or never actually saved there (e.g. if this letter was generated before the folder was connected, or as the other format only).`);
  }
}

// Opens (downloads) an attached requester email from the connected email
// folder, matched by the actual filename it was saved under (not the
// original/display name, since a timestamp suffix is added to avoid clashes).
async function openSavedEmail(email) {
  if (!email) return;
  const folderHandle = await getEmailFolderHandle();
  if (!folderHandle) {
    alert("The email save folder isn't connected in this browser. Connect it from the Requester Emails tab first.");
    return;
  }
  const savedName = email.savedName || email.name;
  if (!savedName) { alert("This email entry doesn't have a saved filename on record."); return; }
  try {
    const ok = await ensureFolderPermission(folderHandle);
    if (!ok) return;
    const fileHandle = await folderHandle.getFileHandle(savedName);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    const a = document.createElement("a");
    a.href = url; a.download = email.originalName || file.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  } catch (err) {
    console.error("Could not open saved email:", err);
    alert("Could not find this email in the save folder — it may have been moved, renamed, or deleted since.");
  }
}

            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">

function renderDashboard() {
  const root = document.getElementById("viewRoot");
  const allRows = loadLog();
  refreshFxRatesIfStale(); // fire-and-forget background refresh; re-renders itself when new rates land

  // ── Vivid, distinct palette for dashboard data viz (separate from the
  // app's muted working palette, since charts benefit from more contrast) ──
  const PALETTE = {
    rawMaterial: "#c0392b",   // warm red
    machineParts: "#2980b9",  // blue
    supplierColors: ["#e67e22","#16a085","#8e44ad","#f1c40f","#27ae60","#d35400","#2c3e50","#c0392b","#2980b9","#7f8c8d"],
  };

  const F = S.dashFilters || { type:"", supplier:"", year:"", month:"" };
  S.dashFilters = F;

  // Faceted filter option lists: each dropdown's choices are narrowed to
  // what's actually available given the OTHER active filters (excluding
  // itself), so picking e.g. a year updates what shows in the type/supplier
  // dropdowns instead of always listing every value regardless of context.
  // The currently-selected value is always kept in its own list even if it
  // would otherwise be excluded, so an existing selection is never silently
  // dropped out from under the person.
  function rowsMatchingExcept(exclude) {
    return allRows.filter(r => {
      if (exclude !== "type" && F.type && r.letterType !== F.type) return false;
      if (exclude !== "supplier" && F.supplier && r.importedFrom !== F.supplier) return false;
      if (exclude !== "year" && F.year && !(r.dateGenerated||"").startsWith(F.year)) return false;
      if (exclude !== "month" && F.month && !(r.dateGenerated||"").slice(0,7).endsWith(F.month)) return false;
      return true;
    });
  }
  function withCurrent(list, current) {
    return current && !list.includes(current) ? [current, ...list] : list;
  }

  const types     = withCurrent([...new Set(rowsMatchingExcept("type").map(r => r.letterType).filter(Boolean))], F.type);
  const suppliers = withCurrent([...new Set(rowsMatchingExcept("supplier").map(r => r.importedFrom).filter(Boolean))].sort(), F.supplier);
  const years     = withCurrent([...new Set(rowsMatchingExcept("year").map(r => (r.dateGenerated||"").slice(0,4)).filter(Boolean))].sort().reverse(), F.year);
  const monthsAvailable = new Set(rowsMatchingExcept("month").map(r => (r.dateGenerated||"").slice(5,7)).filter(Boolean));
  // Unfiltered year list for the independent per-chart year dropdowns below
  // (pie / raw materials / machine parts charts) — these aren't affected by
  // the global filter bar, so their own year options shouldn't be narrowed by it.
  const allYears = [...new Set(allRows.map(r => (r.dateGenerated||"").slice(0,4)).filter(Boolean))].sort().reverse();

  let rows = allRows.filter(r => {
    if (F.type && r.letterType !== F.type) return false;
    if (F.supplier && r.importedFrom !== F.supplier) return false;
    if (F.year && !(r.dateGenerated||"").startsWith(F.year)) return false;
    if (F.month && !(r.dateGenerated||"").slice(0,7).endsWith(F.month)) return false;
    return true;
  });

  const totalA = rows.filter(r => r.letterType === "Raw Material").length;
  const totalB = rows.filter(r => r.letterType === "Machine Parts").length;
  const total  = totalA + totalB;
  const distinctSuppliersFiltered = new Set(rows.map(r => r.importedFrom).filter(Boolean)).size;
  const pendingDraftsCount = loadDraftMeta().filter(d => d.status === "pending").length;

  // ── Per-chart filters (each chart/card has its own control, as requested) ──
  const CF = S.dashChartFilters || { period: "week", pieYear: "", rawYear: "", mpYear: "", totalLettersType: "" };
  S.dashChartFilters = CF;
  const dashCurrency = S.dashCurrency || "LKR";
  S.dashCurrency = dashCurrency;
  const fxCache = getCachedFxRates();
  const fxRates = fxCache ? fxCache.rates : null;

  // ── Chart 1: value spent over time (2 lines), day/week/month/year ──
  const lineBaseRows = allRows.filter(r => !F.supplier || r.importedFrom === F.supplier);
  const timeBuckets = buildTimeBuckets(lineBaseRows, CF.period);
  const lineChartHtml = buildLineChartSvg(timeBuckets, PALETTE.rawMaterial, PALETTE.machineParts);

  // ── Chart 2: most imported FROM — supplier by value, filter by year ──
  const pieRows = allRows.filter(r => !CF.pieYear || (r.dateGenerated||"").startsWith(CF.pieYear));
  const supplierValueMap = new Map();
  pieRows.forEach(r => {
    const name = (r.importedFrom || "").trim();
    if (!name) return;
    const { currency, amount } = parseValue(r.value);
    if (!amount) return;
    if (!supplierValueMap.has(name)) supplierValueMap.set(name, { sum: 0, totals: {} });
    const entry = supplierValueMap.get(name);
    entry.sum += amount;
    entry.totals[currency] = (entry.totals[currency] || 0) + amount;
  });
  const sortedSupplierValues = Array.from(supplierValueMap.entries()).sort((a,b) => b[1].sum - a[1].sum);
  const topSupplierValues = sortedSupplierValues.slice(0, 6);
  const otherSupplierValueSum = sortedSupplierValues.slice(6).reduce((s,[,v]) => s+v.sum, 0);

function setStatusLog(msg, kind) {
  // Lightweight transient confirmation banner for the log view (separate
  // from the generate view's status box).
  const root = document.getElementById("viewRoot");
  if (!root) return;
  const existing = root.querySelector(".log-status-toast");
  if (existing) existing.remove();
  const toast = document.createElement("div");
  toast.className = `status ${kind} log-status-toast`;
  toast.style.marginBottom = "12px";
  toast.textContent = msg;
  root.querySelector(".panel").insertBefore(toast, root.querySelector(".logwrap"));
  setTimeout(() => toast.remove(), 3500);
}

function buildLogTable(rows) {
  const ths = LOG_COLS.map(c => `<th>${esc(c.h)}</th>`).join("") + "<th>Docs</th><th>Emails</th><th></th>";
  const trs = rows.map((r, i) => {
    const rowClass = r.letterType === "Machine Parts" ? ' class="row-machine-parts"' : "";
    const formatsRecorded = r.formats && r.formats.length > 0;
    const hasWord = !formatsRecorded || r.formats.includes("docx");
    const hasPdf = !formatsRecorded || r.formats.includes("pdf");
    const docBtn = (label, enabled, cls, title) => `<button class="${enabled ? cls : ""}" data-log-doc-idx="${i}" style="font-size:10.5px;padding:2px 7px;margin-right:3px;border-radius:5px;border:1px solid ${enabled ? "var(--accent)" : "var(--line)"};background:${enabled ? "#fff" : "#f3f1ea"};color:${enabled ? "var(--accent)" : "var(--muted)"};cursor:${enabled ? "pointer" : "not-allowed"};" ${enabled ? "" : "disabled"} title="${esc(title)}">${label}</button>`;
    const docsCell = docBtn("Word", hasWord, "log-doc-open-word", hasWord ? (formatsRecorded ? "Open the saved Word document" : "Format wasn't recorded for this older entry — click to try the connected folder") : "No Word document was generated for this letter")
      + docBtn("PDF", hasPdf, "log-doc-open-pdf", hasPdf ? (formatsRecorded ? "Open the saved PDF" : "Format wasn't recorded for this older entry — click to try the connected folder") : "No PDF was generated for this letter");
    const emails = r.attachedEmails || [];
    const emailsCell = emails.length
      ? emails.map((em, j) => `<span class="log-email-open" data-log-row-idx="${i}" data-log-email-idx="${j}" style="cursor:pointer;text-decoration:underline;color:var(--accent);display:block;white-space:nowrap;" title="Click to open this email">${esc(em.originalName || em.name || "")}</span>`).join("")
      : `<span style="color:var(--muted);">—</span>`;
    return `<tr${rowClass}>${LOG_COLS.map(c => `<td>${esc(r[c.k]||"")}</td>`).join("")}
     <td>${docsCell}</td>
     <td>${emailsCell}</td>
     <td><button style="font-size:11px;padding:3px 8px;border:1px solid #ccc;border-radius:5px;cursor:pointer;background:#fff;" data-del="${i}">Delete</button></td></tr>`;
  }).join("");
  setTimeout(() => {
    document.querySelectorAll("[data-del]").forEach(btn => {
      btn.onclick = () => {
        const rows2 = loadLog();
        rows2.splice(+btn.dataset.del, 1);
        saveLog(rows2);
        autoSaveLogToFolder();
        renderLog();
      };
    });
    document.querySelectorAll(".log-doc-open-word").forEach(el => {
      el.onclick = () => openSavedDocument(rows[+el.dataset.logDocIdx], "docx");
    });
    document.querySelectorAll(".log-doc-open-pdf").forEach(el => {
      el.onclick = () => openSavedDocument(rows[+el.dataset.logDocIdx], "pdf");
    });
    document.querySelectorAll(".log-email-open").forEach(el => {
      el.onclick = () => openSavedEmail((rows[+el.dataset.logRowIdx].attachedEmails || [])[+el.dataset.logEmailIdx]);
    });
  }, 0);
  return `<table class="log"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

/* ═══════════════ EXCEL EXPORT (hand-rolled .xlsx with real styling) ═══════════════
   NOTE: the free/community build of SheetJS (xlsx.full.min.js) does not reliably
   write cell styles — fills and fonts get silently dropped on export, which is
   why headers previously came out unstyled. To guarantee professional header
   formatting (solid navy fill, bold white text) actually appears in Excel/Word 365,
   we build the .xlsx file's OOXML parts directly and zip them with JSZip. This is
   a small, fully valid, spec-compliant Excel workbook. */
function xmlEsc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function colLetter(idx) { // 0-based -> A, B, ... Z, AA, AB...
  let s = "";
  idx += 1;
  while (idx > 0) {
    const rem = (idx - 1) % 26;
    s = String.fromCharCode(65 + rem) + s;
    idx = Math.floor((idx - 1) / 26);
  }
  return s;
}

async function buildStyledXlsxBlob(rows) {
  const headers = LOG_COLS.map(c => c.h);
  const nCols = headers.length;
  const nRows = rows.length;

  // ── sheet1.xml ──
  let sheetRows = "";
  // Header row (style index 1 = navy header style)
  let headerCells = "";
  headers.forEach((h, c) => {
    headerCells += `<c r="${colLetter(c)}1" s="1" t="inlineStr"><is><t>${xmlEsc(h)}</t></is></c>`;
  });
  sheetRows += `<row r="1">${headerCells}</row>`;

  // Data rows (style index 2 = bordered body cell, alternating handled via style 2/3)
  rows.forEach((r, ri) => {
    const rowNum = ri + 2;
    const styleIdx = (ri % 2 === 0) ? "2" : "3"; // alternate row banding
    let cells = "";
    LOG_COLS.forEach((c, ci) => {
      const raw = r[c.k];
      const val = (raw === undefined || raw === null || String(raw).trim() === "") ? "N/A" : raw;
      cells += `<c r="${colLetter(ci)}${rowNum}" s="${styleIdx}" t="inlineStr"><is><t>${xmlEsc(val)}</t></is></c>`;
    });
    sheetRows += `<row r="${rowNum}">${cells}</row>`;
  });

  const lastCol = colLetter(nCols - 1);
  const cols = LOG_COLS.map((c, i) =>
    `<col min="${i+1}" max="${i+1}" width="24" customWidth="1"/>`
  ).join("");

  const sheetXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<dimension ref="A1:${lastCol}${nRows+1}"/>
<sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/><selection pane="bottomLeft" activeCell="A2" sqref="A2"/></sheetView></sheetViews>
<sheetFormatPr baseColWidth="10" defaultRowHeight="18"/>
<cols>${cols}</cols>
<sheetData>${sheetRows}</sheetData>
<pageMargins left="0.7" right="0.7" top="0.75" bottom="0.75" header="0.3" footer="0.3"/>
</worksheet>`;

  // ── styles.xml ──
  const stylesXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<numFmts count="0"/>
<fonts count="2">
  <font><sz val="11"/><name val="Calibri"/></font>
  <font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>
</fonts>
<fills count="4">
  <fill><patternFill patternType="none"/></fill>
  <fill><patternFill patternType="gray125"/></fill>
  <fill><patternFill patternType="solid"><fgColor rgb="FF1F3864"/><bgColor indexed="64"/></patternFill></fill>
  <fill><patternFill patternType="solid"><fgColor rgb="FFF3F4F6"/><bgColor indexed="64"/></patternFill></fill>
</fills>
<borders count="2">
  <border><left/><right/><top/><bottom/><diagonal/></border>
  <border><left style="thin"><color rgb="FFD1D5DB"/></left><right style="thin"><color rgb="FFD1D5DB"/></right><top style="thin"><color rgb="FFD1D5DB"/></top><bottom style="thin"><color rgb="FFD1D5DB"/></bottom></border>
</borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="4">
  <xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
  <xf numFmtId="0" fontId="1" fillId="2" borderId="1" xfId="0" applyFont="1" applyFill="1" applyBorder="1" applyAlignment="1"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>
  <xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyBorder="1" applyAlignment="1"><alignment vertical="center"/></xf>
  <xf numFmtId="0" fontId="0" fillId="3" borderId="1" xfId="0" applyFill="1" applyBorder="1" applyAlignment="1"><alignment vertical="center"/></xf>
</cellXfs>
<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`;

  // ── workbook.xml ──
  const workbookXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets><sheet name="Customs Log" sheetId="1" r:id="rId1"/></sheets>
</workbook>`;

  const workbookRelsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  const rootRelsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;

  const contentTypesXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`;

  const zip = new JSZip();
  zip.file("[Content_Types].xml", contentTypesXml);
  zip.file("_rels/.rels", rootRelsXml);
  zip.file("xl/workbook.xml", workbookXml);
  zip.file("xl/_rels/workbook.xml.rels", workbookRelsXml);
  zip.file("xl/styles.xml", stylesXml);
  zip.file("xl/worksheets/sheet1.xml", sheetXml);

  return zip.generateAsync({
    type: "blob",
    mimeType: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  });
}

async function exportExcel() {
  const rows = loadLog();
  if (!rows.length) { alert("No records to export yet."); return; }
  try {
    const blob = await buildStyledXlsxBlob(rows);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `Customs Waiver Log ${new Date().toISOString().slice(0,10)}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } catch (err) {
    console.error(err);
    alert("Could not generate the Excel file. Please try again.");
  }
}

function importExcel(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: "array" });
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const imported = data.map(d => {
        const obj = {};
        LOG_COLS.forEach(c => {
          const val = d[c.h];
          obj[c.k] = (val === undefined || val === null || String(val).trim() === "N/A") ? "" : val;
        });
        return obj;
      });
      saveLog(loadLog().concat(imported));
      autoSaveLogToFolder();
      renderLog();
      alert(`Imported ${imported.length} record(s).`);
    } catch { alert("Could not read the file. Please use a .xlsx exported from this app."); }
  };
  reader.readAsArrayBuffer(file);
}
